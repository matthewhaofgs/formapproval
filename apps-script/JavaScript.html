<script>
  const state = window.INITIAL_STATE || { mode: 'request' };
  const WEB_APP_URL = window.WEB_APP_URL || state.webAppUrl || '';
  const app = document.getElementById('app');
  const notice = document.getElementById('notice');
  const globalProgress = document.getElementById('global-progress');
  const globalProgressLabel = globalProgress ? globalProgress.querySelector('[data-progress-label]') : null;
  const globalProgressHelp = globalProgress ? globalProgress.querySelector('[data-progress-help]') : null;
  const globalProgressBar = globalProgress ? globalProgress.querySelector('.progress-bar') : null;
  let activeProgressCount = 0;
  let progressHideTimer = 0;
  let progressTickTimer = 0;
  let progressStartedAt = 0;
  let progressBaseMessage = '';
  let progressMethod = '';
  let progressEstimateMs = 0;
  let progressStorageKey = '';
  let draggedWorkflowStep = null;

  function mealBreakRulesHtml(planned) {
    return `
      <div class="info-block">
        <h3>Meal Break Rules</h3>
        <p>You must take an unpaid meal break of 30 minutes if you work more than 5 hours in a single day (Clause 21.1). This is your first unpaid meal break. You cannot work through your meal break to claim it as overtime.</p>
        <p>If you are required to work more than 1.5 hours of overtime after your ordinary finish time, the School will provide a suitable meal or pay you a Meal Allowance (Clause 15.11).</p>
        <p>If your duties extend into the evening and you work past 6:00pm, you are entitled to a second unpaid meal break for an "evening meal" under Clause 21.1. The timing of this break must be mutually agreed upon between you and the School.</p>
        <p>${planned ? 'Ensure all planned unpaid meal breaks are deducted from the total hours requested.' : 'Ensure all unpaid meal breaks are deducted from the total hours claimed.'}</p>
      </div>
    `;
  }

  const ROLE_LABELS = {
    requester: 'My Requests',
    approver: 'Approvals',
    admin: 'Admin'
  };

  const dashboardState = {
    role: state.role || 'requester',
    email: state.currentUserEmail || '',
    selectedProcess: state.selectedProcess || '',
    adminView: state.adminView || 'forms',
    workflowProcess: state.workflowProcess || '',
    workflowStage: state.workflowStage || '',
    roleAvailability: normalizeRoleAvailability(state.roleAvailability),
    data: null,
    adminChooserData: null,
    adminDashboards: {}
  };

  bindGlobalLoadingIndicators();
  applyTopNavRoleVisibility();
  render();

  function render() {
    if (state.mode === 'dashboard') {
      renderDashboardShell();
      bindDashboardShell();
      loadDashboard();
      return;
    }

    if (state.mode === 'chooser') {
      app.innerHTML = renderFormChooser(state.processes || []);
      return;
    }

    if (state.mode === 'approve') {
      app.innerHTML = renderApproval();
      bindApproval();
      return;
    }

    if (state.mode === 'actual' || state.mode === 'checklist') {
      app.innerHTML = renderActualHours();
      bindActualHours();
      return;
    }

    if (state.mode === 'edit') {
      app.innerHTML = renderRequestForm();
      bindRequestForm();
      return;
    }

    if (state.mode === 'closed') {
      app.innerHTML = renderMessagePanel(state.title, state.message, `${state.request ? renderRequestSummary(state.request, true) : ''}${renderClosedAction(state.closedAction)}`);
      return;
    }

    if (state.mode === 'error') {
      showNotice(state.message, 'error');
      app.innerHTML = renderMessagePanel(
        state.title || 'Link unavailable',
        state.message || 'The link could not be opened.',
        `<div class="actions inline"><a class="button secondary" href="${escapeHtml(appUrl('dashboard', { role: 'approver' }))}">Workflow dashboard</a><a class="button secondary" href="${escapeHtml(appUrl('dashboard', { role: 'requester' }))}">My Requests</a></div>`
      );
      return;
    }

    app.innerHTML = renderRequestForm();
    bindRequestForm();
  }

  function renderFormChooser(processes) {
    return `
      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>Start a request</h2>
            <p>Select the form you need.</p>
          </div>
        </div>
        ${renderProcessCardGrid(processes, process => appUrl('request', { process: process.key }), 'Open form')}
      </section>
    `;
  }

  function renderProcessCardGrid(processes, hrefBuilder, actionLabel, attributesBuilder) {
    if (!processes.length) {
      return '<p class="muted">No request forms are currently available.</p>';
    }

    return `
      <div class="process-grid">
        ${processes.map(process => renderProcessCard(process, hrefBuilder(process), actionLabel, attributesBuilder ? attributesBuilder(process) : '')).join('')}
      </div>
    `;
  }

  function renderProcessCard(process, href, actionLabel, extraAttributes) {
    const action = actionLabel ? `<em>${escapeHtml(actionLabel)}</em>` : '';
    const counts = process.requestCount === undefined ? '' : `
      <div class="process-counts">
        <span>${escapeHtml(String(process.requestCount))} total</span>
        <span>${escapeHtml(String(process.pendingCount || 0))} open</span>
      </div>
    `;
    return `
      <a class="process-card" href="${escapeHtml(href)}" ${extraAttributes || ''}>
        <strong>${escapeHtml(process.name || process.key)}</strong>
        ${process.description ? `<span>${escapeHtml(process.description)}</span>` : ''}
        ${counts}
        ${action}
      </a>
    `;
  }

  function renderDashboardShell() {
    const tabs = availableDashboardRoles().map(role => dashboardTab(role)).join('');
    app.innerHTML = `
      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>${escapeHtml(ROLE_LABELS[dashboardState.role] || 'Dashboard')} dashboard</h2>
            ${state.currentUserEmail ? `<p>Signed in as ${escapeHtml(state.currentUserEmail)}</p>` : ''}
          </div>
          <div class="tabs" role="tablist" aria-label="Dashboard role">
            ${tabs}
          </div>
        </div>
        <div id="dashboard-body" class="stack"></div>
      </section>
    `;
  }

  function dashboardTab(role) {
    return `<button type="button" class="${dashboardState.role === role ? 'active' : ''}" data-role="${role}">${escapeHtml(ROLE_LABELS[role])}</button>`;
  }

  function availableDashboardRoles() {
    return ['requester', 'approver', 'admin'].filter(role => {
      return role === 'requester' ||
        dashboardState.roleAvailability[role] ||
        dashboardState.role === role;
    });
  }

  function normalizeRoleAvailability(availability) {
    const known = availability && typeof availability === 'object';
    return {
      requester: true,
      approver: known ? Boolean(availability.approver) : true,
      admin: known ? Boolean(availability.admin) : true
    };
  }

  function applyTopNavRoleVisibility() {
    document.querySelectorAll('[data-nav-role]').forEach(link => {
      const role = link.dataset.navRole;
      if (role === 'requester') {
        link.hidden = false;
        return;
      }
      link.hidden = !dashboardState.roleAvailability[role];
    });
  }

  function bindDashboardShell() {
    document.querySelectorAll('[data-role]').forEach(button => {
      button.addEventListener('click', event => {
        const role = event.currentTarget.dataset.role;
        showGlobalProgress('Loading dashboard...');
        window.top.location.href = appUrl('dashboard', { role });
      });
    });
  }

  function loadDashboard() {
    const body = document.getElementById('dashboard-body');
    clearNotice();

    body.innerHTML = renderLoading('Loading dashboard');
    const payload = dashboardLoadPayload();
    runServer('getDashboardData', payload, dashboardLoadTimeoutMs(payload))
      .then(result => {
        renderLoadedDashboardData(body, result);
      })
      .catch(error => {
        body.innerHTML = renderAuthError(error);
      });
  }

  function dashboardLoadPayload() {
    const payload = {
      role: dashboardState.role,
      email: dashboardState.email,
      process: dashboardState.selectedProcess
    };
    if (dashboardState.role === 'admin' && !dashboardState.selectedProcess) {
      payload.preloadAdminDashboards = true;
    }
    return payload;
  }

  function dashboardLoadTimeoutMs(payload) {
    if (payload && payload.role === 'admin' && payload.preloadAdminDashboards) {
      return 330000;
    }
    if (payload && payload.role === 'admin') {
      return 180000;
    }
    return 45000;
  }

  function renderLoadedDashboardData(body, result) {
    if (!result || !result.ok) {
      throw new Error((result && result.message) || 'Dashboard could not be loaded.');
    }
    dashboardState.data = result;
    dashboardState.email = result.email || dashboardState.email;
    dashboardState.roleAvailability = normalizeRoleAvailability(result.roleAvailability || dashboardState.roleAvailability);
    applyTopNavRoleVisibility();
    if (result.role === 'admin' && !result.selectedProcess) {
      dashboardState.adminChooserData = result;
      dashboardState.adminDashboards = result.adminDashboards || {};
    }
    if (result.role === 'admin' && result.selectedProcess) {
      updateCachedAdminDashboard(result);
    }
    body.innerHTML = renderDashboardData(result);
    bindDashboardActions();
  }

  function updateCachedAdminDashboard(result) {
    if (!result || !result.selectedProcess || !dashboardState.adminChooserData) {
      return;
    }
    dashboardState.adminDashboards[result.selectedProcess] = result;
    dashboardState.adminChooserData.adminDashboards = dashboardState.adminDashboards;
    (dashboardState.adminChooserData.adminProcesses || []).forEach(process => {
      if (process.key !== result.selectedProcess) {
        return;
      }
      process.requestCount = result.counts ? result.counts.total : (result.requests || []).length;
      process.pendingCount = result.counts ? result.counts.pending : (result.requests || []).filter(request => request.isPending).length;
      process.stoppedCount = (result.requests || []).filter(request => request.isStopped).length;
    });
  }

  function renderDashboardData(data) {
    dashboardState.selectedProcess = data.selectedProcess || '';
    if (data.role === 'admin' && !data.selectedProcess) {
      return renderAdminProcessChooser(data);
    }

    const requests = data.requests || [];
    const counts = data.counts || {};
    const awaitingActual = requests.filter(request => request.waitingOnType === 'employee').length;
    const stoppedRequests = requests.filter(request => request.isStopped);
    const completedRequests = requests.filter(request => request.isClosed && !request.isStopped);
    let sections = '';
    let metrics = '';

    if (data.role === 'approver') {
      const assigned = requests.filter(request => request.canApprove);
      const relatedInProgress = requests.filter(request => request.isPending && !request.canApprove);
      sections += renderRequestSection('Assigned to me', assigned, data.role, { collapsible: true, open: false });
      sections += renderRequestSection('In-progress / related requests', relatedInProgress, data.role, { collapsible: true, open: false });
      sections += renderRequestSection('Completed requests', completedRequests, data.role, { collapsible: true, open: false });
      sections += renderRequestSection('Cancelled / denied requests', stoppedRequests, data.role, { collapsible: true, open: false });
      metrics = `
        ${kpi(counts.total || 0, 'Visible requests')}
        ${kpi(counts.waitingForMe || 0, 'Needs my decision')}
        ${kpi(relatedInProgress.length, 'In progress')}
        ${kpi(completedRequests.length, 'Completed')}
      `;
    } else if (data.role === 'requester') {
      sections += renderRequestSection('Active requests', requests.filter(request => request.isPending), data.role);
      sections += renderRequestSection('Closed requests', requests.filter(request => request.isClosed), data.role);
      metrics = `
        ${kpi(counts.total || 0, 'My Requests')}
        ${kpi(counts.pending || 0, 'In progress')}
        ${kpi(awaitingActual, 'Need actual hours')}
        ${kpi(counts.closed || 0, 'Closed')}
      `;
    } else {
      sections += renderRequestSection('Incomplete requests', requests.filter(request => request.isPending), data.role, { collapsible: true, open: false });
      sections += renderRequestSection('Completed requests', completedRequests, data.role, { collapsible: true, open: false });
      sections += renderRequestSection('Cancelled / denied requests', stoppedRequests, data.role, { collapsible: true, open: false });
      metrics = `
        ${kpi(counts.total || 0, 'All requests')}
        ${kpi(counts.pending || 0, 'Incomplete')}
        ${kpi(completedRequests.length, 'Completed')}
        ${kpi(stoppedRequests.length, 'Cancelled / denied')}
      `;
    }

    return `
      ${data.role === 'admin' ? renderAdminDashboardContext(data) : ''}
      <div class="kpi-row">
        ${metrics}
      </div>
      ${data.role === 'admin' || data.role === 'approver' ? renderDashboardFilter(requests.length) : ''}
      ${sections || '<p class="muted">No requests found.</p>'}
    `;
  }

  function renderAdminProcessChooser(data) {
    const processes = Array.isArray(data) ? data : (data.adminProcesses || []);
    const dashboards = Array.isArray(data) ? {} : (data.adminDashboards || {});
    const activeView = data.canManageUsers && ['users', 'workflows'].indexOf(dashboardState.adminView) !== -1
      ? dashboardState.adminView
      : 'forms';
    return `
      <div class="stack">
        ${renderAdminSubmenu(activeView, data.canManageUsers)}
        ${activeView === 'users'
          ? renderAdminUserManagement(data.userManagement || {})
          : (activeView === 'workflows'
            ? renderAdminWorkflowManagement(data.workflowManagement || {})
            : renderAdminDashboardChooserContent(data, processes, dashboards))}
      </div>
    `;
  }

  function renderAdminSubmenu(activeView, canManageUsers) {
    if (!canManageUsers) {
      return '';
    }
    return `
      <nav class="admin-submenu" aria-label="Admin menu">
        ${adminSubmenuButton('forms', 'Form dashboards', activeView)}
        ${adminSubmenuButton('users', 'User access', activeView)}
        ${adminSubmenuButton('workflows', 'Approval flows', activeView)}
      </nav>
    `;
  }

  function adminSubmenuButton(view, label, activeView) {
    return `<button class="button secondary ${activeView === view ? 'active' : ''}" type="button" data-admin-view="${escapeHtml(view)}" ${activeView === view ? 'aria-current="page"' : ''}>${escapeHtml(label)}</button>`;
  }

  function renderAdminDashboardChooserContent(data, processes, dashboards) {
    return `
      <div>
        <h3>Admin sections</h3>
        <p class="muted">Select a form to view its requests and admin actions.</p>
      </div>
      ${renderAdminDatabaseStatus(data)}
      ${renderProcessCardGrid(
        processes,
        process => appUrl('dashboard', { role: 'admin', process: process.key }),
        '',
        process => `data-admin-process="${escapeHtml(process.key)}" data-admin-cached="${dashboards[process.key] ? 'true' : 'false'}"`
      )}
    `;
  }

  function renderAdminUserManagement(userManagement) {
    const globalAdmins = userManagement.globalAdmins || [];
    const processes = userManagement.processes || [];
    return `
      <section class="admin-users" data-admin-user-management>
        <div class="admin-users-heading">
          <div>
            <h3>User access</h3>
            <p class="muted">Manage global admins and process dashboard admins.</p>
          </div>
        </div>
        <form class="stack" data-admin-user-form novalidate>
          ${renderAdminAddPanel(processes)}
          ${renderAdminAccessTable(globalAdmins, processes)}
          <div class="actions inline">
            <button class="button primary" type="submit">Save changes</button>
          </div>
        </form>
      </section>
    `;
  }

  function renderAdminAddPanel(processes) {
    const processOptions = (processes || []).map(process => {
      return `<option value="processAdmins::${escapeHtml(process.key)}">${escapeHtml(process.name || process.key)} dashboard</option>`;
    }).join('');
    return `
      <fieldset class="admin-add-panel" data-admin-add-panel>
        <legend>Add admin</legend>
        <div class="admin-add-grid">
          <label class="field">
            <span>Email</span>
            <input type="email" inputmode="email" autocomplete="off" placeholder="name@example.edu" data-admin-email-input>
          </label>
          <label class="field">
            <span>Access</span>
            <select data-admin-scope-select>
              <option value="globalAdmins::global">Global admins</option>
              ${processOptions}
            </select>
          </label>
          <button class="button secondary" type="button" data-add-admin-email>Add admin</button>
        </div>
      </fieldset>
    `;
  }

  function renderAdminAccessTable(globalAdmins, processes) {
    const rows = [
      renderAdminAccessTableRow({
        scope: 'globalAdmins',
        key: 'global',
        title: 'Global admins',
        description: 'All dashboards and user access',
        emails: globalAdmins || []
      })
    ].concat((processes || []).map(process => renderAdminAccessTableRow({
      scope: 'processAdmins',
      key: process.key,
      title: `${process.name || process.key} dashboard`,
      description: process.description || 'Dashboard access',
      emails: process.adminEmails || []
    })));
    return `
      <div class="admin-access-table-wrap">
        <table class="admin-access-table">
          <caption>Admin access</caption>
          <thead>
            <tr>
              <th scope="col">Access</th>
              <th scope="col">Admins</th>
            </tr>
          </thead>
          <tbody>
            ${rows.join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  function renderAdminAccessTableRow(options) {
    const count = (options.emails || []).length;
    return `
      <tr data-admin-access-group>
        <th scope="row">
          <div class="admin-access-label">
            <strong>${escapeHtml(options.title)}</strong>
            <span>${escapeHtml(options.description || '')}</span>
            <span class="admin-access-count" data-admin-count>${escapeHtml(adminCountLabel(count))}</span>
          </div>
        </th>
        <td>
          ${renderAdminEmailList(options.scope, options.key, options.emails || [])}
        </td>
      </tr>
    `;
  }

  function renderAdminEmailList(scope, key, emails) {
    return `
      <div class="admin-user-list" data-admin-list="${escapeHtml(scope)}" data-process-key="${escapeHtml(key || '')}">
        ${(emails || []).map(renderAdminEmailRow).join('')}
        <p class="admin-empty" data-admin-empty ${emails && emails.length ? 'hidden' : ''}>No admins assigned.</p>
      </div>
    `;
  }

  function renderAdminEmailRow(email) {
    return `
      <div class="admin-user-row" data-admin-email="${escapeHtml(email)}">
        <span class="admin-user-email">${escapeHtml(email)}</span>
        <button class="button secondary" type="button" data-remove-admin-email>Remove</button>
      </div>
    `;
  }

  function adminCountLabel(count) {
    return `${count} admin${count === 1 ? '' : 's'}`;
  }

  function renderAdminWorkflowManagement(workflowManagement) {
    const processes = workflowManagement.processes || [];
    if (!processes.length) {
      return '<p class="muted">No enabled processes are available.</p>';
    }

    let selectedKey = dashboardState.workflowProcess;
    if (!processes.some(process => process.key === selectedKey)) {
      selectedKey = processes[0].key;
      dashboardState.workflowProcess = selectedKey;
    }
    const process = processes.find(item => item.key === selectedKey) || processes[0];
    const stages = process.stages && process.stages.length
      ? process.stages
      : [{ key: 'approval', label: 'Approval', steps: [] }];
    const conditionFields = process.conditionFields || [];
    const recipientFields = process.recipientFields || [];
    let activeStage = dashboardState.workflowStage;
    if (!stages.some(stage => stage.key === activeStage)) {
      activeStage = stages[0].key;
      dashboardState.workflowStage = activeStage;
    }

    return `
      <section class="admin-workflows" data-admin-workflow-management>
        <div class="admin-users-heading">
          <div>
            <h3>Approval flows</h3>
            <p class="muted">Configure approval, action, acknowledgement, and notification steps.</p>
          </div>
        </div>
        <form class="workflow-editor stack" data-admin-workflow-form data-process-key="${escapeHtml(process.key)}" novalidate>
          <div class="workflow-editor-toolbar">
            <label class="field workflow-process-field">
              <span>Process</span>
              <select data-workflow-process-select>
                ${processes.map(item => `<option value="${escapeHtml(item.key)}" ${item.key === process.key ? 'selected' : ''}>${escapeHtml(item.name || item.key)}</option>`).join('')}
              </select>
            </label>
            <div class="workflow-editor-meta">
              <strong>${escapeHtml(process.name || process.key)}</strong>
              <span>${escapeHtml(process.description || 'Workflow configuration')}</span>
            </div>
          </div>
          ${renderWorkflowStageTabs(stages, activeStage)}
          <div class="workflow-stage-panels">
            ${stages.map(stage => renderWorkflowStagePanel(stage, activeStage, stages, conditionFields, recipientFields)).join('')}
          </div>
          <div class="actions inline">
            <button class="button primary" type="submit">Save workflow</button>
          </div>
        </form>
      </section>
    `;
  }

  function renderWorkflowStageTabs(stages, activeStage) {
    return `
      <div class="workflow-stage-tabs" role="tablist" aria-label="Workflow stages">
        ${stages.map(stage => `
          <button class="button secondary ${stage.key === activeStage ? 'active' : ''}" type="button" role="tab" data-workflow-stage-tab="${escapeHtml(stage.key)}" ${stage.key === activeStage ? 'aria-selected="true"' : 'aria-selected="false"'}>
            ${escapeHtml(stage.label || stage.key)}
          </button>
        `).join('')}
      </div>
    `;
  }

  function renderWorkflowStagePanel(stage, activeStage, stages, conditionFields, recipientFields) {
    const steps = stage.steps || [];
    return `
      <section class="workflow-stage-editor" data-workflow-stage-panel data-workflow-stage="${escapeHtml(stage.key)}" ${stage.key === activeStage ? '' : 'hidden'}>
        <div class="workflow-stage-editor-heading">
          <div>
            <h4>${escapeHtml(stage.label || stage.key)}</h4>
            <p class="muted">${escapeHtml(workflowStageHelp(stage.key))}</p>
          </div>
          <button class="button secondary" type="button" data-add-workflow-step data-stage-key="${escapeHtml(stage.key)}">Add step</button>
        </div>
        <div class="workflow-step-list-editor" data-workflow-step-list>
          ${steps.map((step, index) => renderWorkflowStepEditor(step, index, stages, false, conditionFields, recipientFields)).join('')}
          <p class="admin-empty" data-workflow-empty ${steps.length ? 'hidden' : ''}>No steps in this stage.</p>
        </div>
      </section>
    `;
  }

  function renderWorkflowStepEditor(step, index, stages, openDetails, conditionFields, recipientFields) {
    const normalized = step || {};
    const type = normalized.type || 'notification';
    const name = normalized.name || '';
    const order = index + 1;
    const isBlockingStep = isWorkflowEditorBlockingType(type);
    const waitingLabel = isBlockingStep ? (normalized.waitingLabel || workflowDefaultWaitingLabelTemplate()) : '';
    const copyMode = workflowEmailCopyMode(normalized);
    return `
      <article class="workflow-editor-step" data-workflow-step>
        <input type="hidden" data-step-field="followUpStage" value="${escapeHtml(normalized.followUpStage || '')}">
        <div class="workflow-step-topline">
          <button class="workflow-drag-handle" type="button" data-workflow-drag-handle draggable="true" title="Drag to reorder" aria-label="Drag step">Drag</button>
          <span class="workflow-step-order" data-step-order>${escapeHtml(String(order))}</span>
          <label class="field workflow-step-name">
            <span>Step name</span>
            <input type="text" data-step-field="name" value="${escapeHtml(name)}" required>
          </label>
          <label class="field workflow-step-type">
            <span>Type</span>
            <select data-step-field="type">
              ${workflowStepTypeOptions(type)}
            </select>
          </label>
          <div class="workflow-step-actions">
            <button class="button secondary" type="button" data-move-workflow-step="up">Up</button>
            <button class="button secondary" type="button" data-move-workflow-step="down">Down</button>
            <button class="button danger" type="button" data-remove-workflow-step>Remove</button>
          </div>
        </div>
        <p class="workflow-step-preview">${escapeHtml(workflowStepPreview(normalized))}</p>
        <details class="workflow-step-details" ${openDetails ? 'open' : ''}>
          <summary>Step settings</summary>
          <div class="workflow-step-editor-body">
            ${renderWorkflowRecipientControls(normalized, type, recipientFields || [])}
            <details class="workflow-optional-panel" data-workflow-waiting-panel ${isBlockingStep ? '' : 'hidden'}>
              <summary>Dashboard text</summary>
              <div class="workflow-waiting-preview" data-workflow-waiting-preview>
                ${escapeHtml(workflowWaitingLabelPreview(Object.assign({}, normalized, { waitingLabel })))}
              </div>
              <div class="workflow-step-grid">
                <label class="field workflow-span-2">
                  <span>Waiting message</span>
                  <textarea rows="2" data-step-field="waitingLabel" required>${escapeHtml(waitingLabel)}</textarea>
                </label>
              </div>

  function renderWorkflowRecipientControls(step, type, recipientFields) {
    const normalized = step || {};
    const emails = Array.isArray(normalized.emails) ? normalized.emails.join('\n') : String(normalized.emails || '');
    const emailFields = Array.isArray(normalized.emailFields) ? normalized.emailFields : splitWorkflowFieldList(normalized.emailFields || '');
    const mode = workflowRecipientMode(normalized, type);
    return `
      <section class="workflow-recipient-section" data-workflow-recipient-section>
        <div class="workflow-section-heading">
          <div>
            <h5>Recipient</h5>
            <p class="muted" data-recipient-help>${escapeHtml(workflowRecipientHelp(type))}</p>
          </div>
        </div>
        <div class="workflow-step-grid">
          <label class="field workflow-recipient-mode">
            <span>Send to</span>

            </select>
          </label>
          <label class="field" data-recipient-panel data-recipient-modes="fixed-email advanced">
            <span>Email address</span>
            <input type="email" inputmode="email" autocomplete="off" data-step-field="email" value="${escapeHtml(normalized.email || '')}" placeholder="person@example.edu">
          </label>
          <label class="field" data-recipient-panel data-recipient-modes="request-field advanced">
            <span>Request email field</span>
            <select data-step-field="emailField" data-recipient-field>
              ${workflowRecipientFieldOptions(recipientFields, normalized.emailField || '')}

          </label>
          <label class="field workflow-span-2" data-recipient-panel data-recipient-modes="fixed-emails advanced">
            <span>Email addresses</span>
            <textarea rows="3" data-step-field="emails" placeholder="one@example.edu">${escapeHtml(emails)}</textarea>
          </label>
          <label class="field workflow-span-2" data-recipient-panel data-recipient-modes="request-fields advanced">
            <span>Request email fields</span>
            <select multiple size="${Math.min(Math.max((recipientFields || []).length, 3), 6)}" data-step-field="emailFields" data-recipient-field>
              ${workflowRecipientFieldOptions(recipientFields, emailFields)}
            </select>
          </label>
        </div>
      </section>
    `;
  }

  function workflowRecipientFieldOptions(recipientFields, selected) {
    const selectedList = Array.isArray(selected)
      ? selected.map(item => String(item || '').trim()).filter(Boolean)
      : [String(selected || '').trim()].filter(Boolean);
    const selectedSet = selectedList.reduce((map, item) => {
      map[item] = true;
      return map;
    }, {});
    const fields = recipientFields && recipientFields.length
      ? recipientFields
      : [
        { name: 'employeeEmail', label: 'Employee email' },
        { name: 'requesterEmail', label: 'Requester email' },
        { name: 'lineManagerEmail', label: 'Line manager email' }
      ];
    const list = selectedList
      .filter(name => !fields.some(field => field.name === name))
      .map(name => ({ name, label: name }))
      .concat(fields);
    return list.map(field => {
      const label = field.group ? `${field.label || field.name} (${field.group})` : (field.label || field.name);
      return `<option value="${escapeHtml(field.name)}" ${selectedSet[field.name] ? 'selected' : ''}>${escapeHtml(label)}</option>`;
    }).join('');
  }

  function workflowRecipientMode(step, type) {
    const normalized = step || {};
    const hasEmail = Boolean(normalized.email);
    const hasEmailField = Boolean(normalized.emailField);
    const hasEmails = Array.isArray(normalized.emails)
      ? normalized.emails.length > 0
      : Boolean(String(normalized.emails || '').trim());
    const hasEmailFields = Array.isArray(normalized.emailFields)
      ? normalized.emailFields.length > 0
      : Boolean(String(normalized.emailFields || '').trim());
    const sources = [hasEmail, hasEmailField, hasEmails, hasEmailFields].filter(Boolean).length;
    if (sources > 1) {
      return 'advanced';
    }
    if (hasEmailField) {
      return 'request-field';
    }
    if (hasEmails) {
      return 'fixed-emails';
    }
    if (hasEmailFields) {
      return 'request-fields';
    }
    if (hasEmail) {
      return 'fixed-email';
    }
    return normalizeWorkflowEditorStepType(type) === 'notification' ? 'fixed-emails' : 'request-field';
  }

  function workflowRecipientModeOptions(type, selected) {
    const blocking = isWorkflowEditorBlockingType(type);
    const options = [
      ['fixed-email', 'One email address', true],
      ['request-field', 'Email from request field', true],
      ['fixed-emails', 'Multiple email addresses', !blocking],
      ['request-fields', 'Multiple request fields', !blocking],
      ['advanced', 'Advanced mixed recipients', !blocking || selected === 'advanced']
    ];
    return options
      .filter(option => option[2] || option[0] === selected)
      .map(option => `<option value="${option[0]}" ${option[0] === selected ? 'selected' : ''}>${escapeHtml(option[1])}</option>`)
      .join('');
  }

  function workflowRecipientHelp(type) {
    return isWorkflowEditorBlockingType(type)
      ? 'This step waits for one person.'
      : 'Notifications can go to one or more people.';
  }

  function normalizeWorkflowEditorStepType(type) {
    const normalized = normalize(type || 'notification');
    return ['approval', 'acknowledgement', 'action', 'notification'].indexOf(normalized) !== -1
      ? normalized
      : 'notification';
  }

  function isWorkflowEditorBlockingType(type) {
    const normalized = normalizeWorkflowEditorStepType(type);
    return normalized === 'approval' || normalized === 'acknowledgement' || normalized === 'action';
  }

  function workflowStepPreview(step) {
    const recipients = [];
    if (step.email) {
      recipients.push(step.email);
    }
    if (step.emailField) {
      recipients.push(step.emailField);
    }
    if (Array.isArray(step.emails) && step.emails.length) {
      recipients.push(`${step.emails.length} fixed emails`);
    }
    if (Array.isArray(step.emailFields) && step.emailFields.length) {
      recipients.push(`${step.emailFields.length} request fields`);
    }
    const parts = [`Recipients: ${recipients.length ? recipients.join(', ') : 'not set'}`];
    const subject = step.effectiveSubject || step.subject || step.defaultSubject || '';
    if (subject) {
      parts.push(`Email: ${workflowEmailCopyMode(step)} - ${subject}`);
    }
    if (isWorkflowEditorBlockingType(step.type) && step.waitingLabel) {
      parts.push('dashboard text set');
    }
    if (step.whenJson) {
      parts.push('conditional');
    }
    if (step.unlessJson) {
      parts.push('has skip rule');
    }
    if (step.followUpStage) {
      parts.push(`starts ${step.followUpStage}`);
    }
    return parts.join(' | ');
  }

  function workflowDefaultWaitingLabelTemplate() {
    return '{Step name} <{Step email}> to {Action}';
  }

  function workflowWaitingLabelPreview(step) {
    const normalized = step || {};
    const template = String(normalized.waitingLabel || '').trim();
    if (!template) {
      return 'Waiting message is required.';
    }
    return renderWorkflowWaitingLabelTemplate(template, {
      'Step name': normalized.name || 'Workflow owner',
      'Step email': workflowRecipientPreviewValue(normalized),
      Action: workflowEditorActionVerb(normalized.type),
      'Employee name': 'Alex Organiser',
      'Employee email': 'organiser@example.edu',
      'Request ID': 'OT-20260624-ABCDE'
    });
  }

  function renderWorkflowWaitingLabelTemplate(template, values) {
    return String(template || '').replace(/\{(Step name|Step email|Action|Employee name|Employee email|Request ID)\}/g, (match, key) => values[key] || '');
  }

  function workflowRecipientPreviewValue(step) {
    if (step.email) {
      return step.email;
    }
    if (step.emailField) {
      return workflowSampleEmailForField(step.emailField);
    }
    if (Array.isArray(step.emails) && step.emails.length) {
      return step.emails[0];
    }
    if (Array.isArray(step.emailFields) && step.emailFields.length) {
      return workflowSampleEmailForField(step.emailFields[0]);
    }
    return 'recipient@example.edu';
  }

  function workflowSampleEmailForField(field) {
    const samples = {
      employeeEmail: 'organiser@example.edu',
      lineManagerEmail: 'linemanager@example.edu',
      requesterEmail: 'requester@example.edu'
    };
    return samples[field] || 'recipient@example.edu';
  }

  function workflowEditorActionVerb(type) {
    const normalized = normalizeWorkflowEditorStepType(type);
    if (normalized === 'acknowledgement') {
      return 'acknowledge';
    }
    if (normalized === 'action') {
      return 'complete action';
    }
    return 'approve';
  }

  function workflowEmailCopyMode(step) {
    const mode = String((step && step.emailCopyMode) || '').trim().toLowerCase();
    if (mode === 'custom') {
      return 'custom';
    }
    if (mode === 'partial') {
      return 'custom with defaults';
    }
    if (step && (step.subject || step.message) && (step.defaultSubject || step.defaultMessage)) {
      return 'custom with defaults';
    }
    if (step && (step.subject || step.message)) {
      return 'custom';
    }
    return 'default';
  }

  function renderWorkflowEmailCopyPreview(step) {
    const normalized = step || {};
    const subject = normalized.effectiveSubject || normalized.subject || normalized.defaultSubject || '';
    const message = normalized.effectiveMessage || normalized.message || normalized.defaultMessage || '';
    const subjectLine = normalized.effectiveSubjectLine || (subject ? `{Request ID}: ${subject.toLowerCase()}` : '');
    const mode = workflowEmailCopyMode(normalized);
    return `
      <div class="workflow-email-preview" data-effective-email-copy>
        <div class="workflow-email-preview-heading">
          <strong>${escapeHtml(mode === 'default' ? 'Using generated default email copy' : 'Custom email copy active')}</strong>
          <span>${escapeHtml(mode)}</span>
        </div>
        <dl>
          <div>
            <dt>Outgoing subject</dt>
            <dd>${escapeHtml(subjectLine || 'Not set')}</dd>
          </div>
          <div>
            <dt>Message opening</dt>
            <dd>${escapeHtml(message || 'Not set')}</dd>
          </div>
        </dl>
      </div>
    `;
  }

  function renderConditionBuilder(fieldName, label, jsonText, conditionFields) {
    const parsed = workflowConditionRowsFromJson(jsonText);
    return `
      <fieldset class="workflow-condition-builder workflow-span-2" data-condition-builder="${escapeHtml(fieldName)}">
        <legend>${escapeHtml(label)}</legend>
        <textarea class="visually-hidden" tabindex="-1" data-step-field="${escapeHtml(fieldName)}" data-condition-raw>${escapeHtml(parsed.raw || jsonText || '')}</textarea>
        <div class="workflow-condition-toolbar">
          <label class="field">
            <span>Match</span>
            <select data-condition-mode>
              <option value="all" ${parsed.mode === 'all' ? 'selected' : ''}>All conditions</option>
              <option value="any" ${parsed.mode === 'any' ? 'selected' : ''}>Any condition</option>
            </select>
          </label>
          <button class="button secondary" type="button" data-add-condition-row>Add condition</button>
        </div>
        ${parsed.raw ? '<p class="workflow-condition-note">This condition is preserved but cannot be shown as picker rows. Add a new condition to replace it.</p>' : ''}
        <div class="workflow-condition-list" data-condition-row-list>
          ${parsed.rows.map(row => renderConditionRow(row, conditionFields)).join('')}
          <p class="admin-empty" data-condition-empty ${parsed.rows.length ? 'hidden' : ''}>No condition. This step always runs.</p>
        </div>
      </fieldset>
    `;
  }

  function workflowConditionRowsFromJson(jsonText) {
    const text = String(jsonText || '').trim();
    if (!text) {
      return { mode: 'all', rows: [], raw: '' };
    }
    try {
      const parsed = JSON.parse(text);
      let mode = 'all';
      let conditions = [];
      if (Array.isArray(parsed)) {
        conditions = parsed;
      } else if (parsed && Array.isArray(parsed.any)) {
        mode = 'any';
        conditions = parsed.any;
      } else if (parsed && Array.isArray(parsed.all)) {
        conditions = parsed.all;
      } else if (parsed && typeof parsed === 'object') {
        conditions = [parsed];
      }
      const rows = conditions.map(conditionRowFromObject).filter(Boolean);
      if (rows.length !== conditions.length) {
        return { mode, rows: [], raw: text };
      }
      return { mode, rows, raw: '' };
    } catch (error) {
      return { mode: 'all', rows: [], raw: text };
    }
  }

  function conditionRowFromObject(condition) {
    if (!condition || !condition.field) {
      return null;
    }
    if (condition.exists !== undefined) {
      return {
        field: condition.field,
        operator: condition.exists ? 'exists' : 'notExists',
        value: ''
      };
    }
    if (condition.notEquals !== undefined) {
      return { field: condition.field, operator: 'notEquals', value: condition.notEquals };
    }
    if (condition.in !== undefined) {
      return { field: condition.field, operator: 'in', value: [].concat(condition.in).join(', ') };
    }
    if (condition.notIn !== undefined) {
      return { field: condition.field, operator: 'notIn', value: [].concat(condition.notIn).join(', ') };
    }
    if (condition.equals !== undefined) {
      return { field: condition.field, operator: 'equals', value: condition.equals };
    }
    if (condition.is !== undefined) {
      return { field: condition.field, operator: 'equals', value: condition.is };
    }
    if (condition.value !== undefined) {
      return { field: condition.field, operator: 'equals', value: condition.value };
    }
    return { field: condition.field, operator: 'exists', value: '' };
  }

  function renderConditionRow(row, conditionFields) {
    const selectedField = row && row.field ? row.field : '';
    const operator = row && row.operator ? row.operator : 'equals';
    return `
      <div class="workflow-condition-row" data-condition-row>
        <label class="field">
          <span>Field</span>
          <select data-condition-field>
            ${conditionFieldOptions(conditionFields, selectedField)}
          </select>
        </label>
        <label class="field">
          <span>Operator</span>
          <select data-condition-operator>
            ${conditionOperatorOptions(operator)}
          </select>
        </label>
        <label class="field" data-condition-value-wrap>
          ${conditionValueControl(selectedField, operator, row ? row.value : '', conditionFields)}
        </label>
        <button class="button secondary" type="button" data-remove-condition-row>Remove</button>
      </div>
    `;
  }

  function conditionFieldOptions(conditionFields, selected) {
    const fields = conditionFields && conditionFields.length
      ? conditionFields
      : [{ name: selected || 'requesterEmail', label: selected || 'requesterEmail', options: [] }];
    const hasSelected = !selected || fields.some(field => field.name === selected);
    const list = hasSelected ? fields : [{ name: selected, label: selected, options: [] }].concat(fields);
    return list.map(field => {
      const values = JSON.stringify(field.options || []);
      const label = field.group ? `${field.label || field.name} (${field.group})` : (field.label || field.name);
      return `<option value="${escapeHtml(field.name)}" data-values="${escapeHtml(values)}" ${field.name === selected ? 'selected' : ''}>${escapeHtml(label)}</option>`;
    }).join('');
  }

  function conditionOperatorOptions(selected) {
    const options = [
      ['equals', 'Equals'],
      ['notEquals', 'Does not equal'],
      ['in', 'Is one of'],
      ['notIn', 'Is not one of'],
      ['exists', 'Has any value'],
      ['notExists', 'Is blank']
    ];
    return options.map(([value, label]) => {
      return `<option value="${value}" ${value === selected ? 'selected' : ''}>${escapeHtml(label)}</option>`;
    }).join('');
  }

  function conditionValueControl(fieldName, operator, value, conditionFields) {
    const values = conditionFieldValues(fieldName, conditionFields);
    const needsValue = ['equals', 'notEquals', 'in', 'notIn'].indexOf(operator) !== -1;
    if (!needsValue) {
      return `
        <span>Value</span>
        <input type="text" data-condition-value value="" disabled placeholder="No value needed">
      `;
    }
    if (values.length && (operator === 'equals' || operator === 'notEquals')) {
      return `
        <span>Value</span>
        <select data-condition-value>
          <option value=""></option>
          ${values.map(option => `<option value="${escapeHtml(option)}" ${String(value) === String(option) ? 'selected' : ''}>${escapeHtml(option)}</option>`).join('')}
        </select>
      `;
    }
    if (values.length && (operator === 'in' || operator === 'notIn')) {
      const selectedValues = splitWorkflowList(value);
      return `
        <span>Values</span>
        <select multiple size="${Math.min(Math.max(values.length, 2), 5)}" data-condition-value>
          ${values.map(option => `<option value="${escapeHtml(option)}" ${selectedValues.indexOf(normalize(option)) !== -1 ? 'selected' : ''}>${escapeHtml(option)}</option>`).join('')}
        </select>
      `;
    }
    return `
      <span>${operator === 'in' || operator === 'notIn' ? 'Values' : 'Value'}</span>
      <input type="text" data-condition-value value="${escapeHtml(value || '')}" ${operator === 'in' || operator === 'notIn' ? 'placeholder="Value one, value two"' : ''}>
    `;
  }

  function conditionFieldValues(fieldName, conditionFields) {
    const field = (conditionFields || []).find(item => item.name === fieldName);
    return field && Array.isArray(field.options) ? field.options : [];
  }

  function workflowStepTypeOptions(selected) {
    return ['approval', 'acknowledgement', 'action', 'notification'].map(type => {
      return `<option value="${type}" ${type === selected ? 'selected' : ''}>${escapeHtml(workflowStepTypeLabel(type))}</option>`;
    }).join('');
  }

  function workflowStepTypeLabel(type) {
    const labels = {
      approval: 'Approval',
      acknowledgement: 'Acknowledgement',
      action: 'Action',
      notification: 'Notification'
    };
    return labels[type] || type;
  }

  function workflowStageLabelFromKey(key, stages) {
    const stage = (stages || []).find(item => item.key === key);
    if (stage) {
      return stage.label || stage.key;
    }
    if (key === 'final') {
      return 'Final approval';
    }
    if (key === 'checklist') {
      return 'Checklist completion';
    }
    return key;
  }

  function workflowStageHelp(stage) {
    if (stage === 'approval') {
      return 'Runs after the initial request is submitted.';
    }
    if (stage === 'final') {
      return 'Runs after actual hours are submitted.';
    }
    if (stage === 'checklist') {
      return 'Runs when the post-approval checklist is completed.';
    }
    return 'Runs when this workflow stage is started.';
  }

  function renderAdminDashboardContext(data) {
    const selectedName = data.selectedProcessName || data.selectedProcess || 'Admin section';
    const selectedKey = data.selectedProcess || '';
    const exportHref = selectedKey ? `/admin/export/${encodeURIComponent(selectedKey)}.xlsx` : '';
    return `
      <div class="dashboard-context">
        <div class="dashboard-context-copy">
          <span>Admin dashboard</span>
          <strong>${escapeHtml(selectedName)}</strong>
          ${selectedKey ? `<em>${escapeHtml(selectedKey)}</em>` : ''}
        </div>
        <div class="dashboard-context-actions">
          ${exportHref ? `<a class="button primary" href="${escapeHtml(exportHref)}" data-admin-export download>Download Excel</a>` : ''}
          <a class="button secondary" href="${escapeHtml(appUrl('dashboard', { role: 'admin' }))}" data-admin-process-chooser>Change form</a>
        </div>
      </div>
      ${renderAdminDatabaseStatus(data)}
    `;
  }

  function renderAdminDatabaseStatus(data) {
    const database = data && data.database ? data.database : {};
    if (!database.spreadsheetId) {
      return '';
    }
    const expected = database.configuredSpreadsheetId || '';
    const mismatch = Boolean(expected && database.spreadsheetId !== expected);
    const sheetSummary = (database.sheets || [])
      .map(sheet => `${sheet.name}: ${sheet.rows}`)
      .join(', ');
    const performance = data && data.performance ? data.performance : {};
    const performanceSummary = performance.totalMs !== undefined
      ? `${formatDuration(performance.totalMs)} server`
      : '';
    const slowestPhase = Array.isArray(performance.phases) && performance.phases.length
      ? performance.phases.slice().sort((a, b) => Number(b.durationMs || 0) - Number(a.durationMs || 0))[0]
      : null;
    const slowestSummary = slowestPhase
      ? `${slowestPhase.label}: ${formatDuration(slowestPhase.durationMs)}`
      : '';
    const summaryLabel = mismatch ? 'System details - attention needed' : 'System details';
    return `
      <details class="database-status ${mismatch ? 'warning' : ''}">
        <summary>${escapeHtml(summaryLabel)}</summary>
        <div class="database-status-content">
          <strong>Database</strong>
          <span>${escapeHtml(database.spreadsheetId)}</span>
          <span>${escapeHtml(database.source || '')}</span>
          ${database.appVersion ? `<span>${escapeHtml(database.appVersion)}</span>` : ''}
          ${performanceSummary ? `<span>${escapeHtml(performanceSummary)}</span>` : ''}
          ${slowestSummary ? `<span>${escapeHtml(slowestSummary)}</span>` : ''}
          ${sheetSummary ? `<small>${escapeHtml(sheetSummary)}</small>` : ''}
          ${mismatch ? '<em>Configured spreadsheet ID does not match the spreadsheet being read.</em>' : ''}
        </div>
      </details>
    `;
  }

  function renderDashboardFilter(total) {
    return `
      <div class="dashboard-filter">
        <label class="field">
          <span>Filter requests</span>
          <input type="search" data-dashboard-filter placeholder="Search by employee, email, request ID, status, or waiting on">

        <div class="dashboard-filter-meta">

          <button class="button secondary" type="button" data-dashboard-filter-clear hidden>Clear filter</button>
        </div>
      </div>
    `;
  }

  function renderRequestSection(title, requests, role, options) {
    const sectionOptions = options || {};
    if (!requests.length) {
      if (sectionOptions.collapsible) {
        return `
          <details class="dashboard-section" data-request-section ${sectionOptions.open ? 'open' : ''}>
            <summary>
              <div>
                <h3>${escapeHtml(title)}</h3>
                <span class="request-meta"><span data-section-visible-count>0</span> requests</span>
              </div>
              <span class="dashboard-section-toggle"></span>
            </summary>
            <div class="dashboard-section-body">
              <p class="muted">No requests in this section.</p>
            </div>
          </details>
        `;
      }
      return `
        <div class="stack">
          <h3>${escapeHtml(title)}</h3>
          <p class="muted">No requests in this section.</p>
        </div>
      `;
    }

    if (sectionOptions.collapsible) {
      return `
        <details class="dashboard-section" data-request-section ${sectionOptions.open ? 'open' : ''}>
          <summary>
            <div>
              <h3>${escapeHtml(title)}</h3>
              <span class="request-meta"><span data-section-visible-count>${escapeHtml(String(requests.length))}</span> requests</span>

            <span class="dashboard-section-toggle"></span>
          </summary>
          <div class="dashboard-section-body">
            <div class="request-list">
              ${requests.map(request => renderDashboardRequest(request, role, false)).join('')}
            </div>
            <p class="muted hidden" data-section-empty>No matching requests in this section.</p>
          </div>
        </details>
      `;
    }

    return `
      <div class="stack">
        <h3>${escapeHtml(title)}</h3>
        <div class="request-list">
          ${requests.map(request => renderDashboardRequest(request, role, false)).join('')}
        </div>
      </div>
    `;

  function renderDashboardRequest(request, role, open) {

  function renderDashboardRequestActions(request, role) {

  function renderRequestWorkflow(request) {
    const isActualHoursProcess = request.completionMode === 'actual_hours';
    const approval = renderWorkflowStage(
      isActualHoursProcess ? 'Pre-approval workflow' : 'Approval workflow',
      'approval',

      request.approvalHistory || [],

    );
    const final = isActualHoursProcess ? renderWorkflowStage(
        'Actual-hours workflow',
        'final',
        request.finalWorkflowSteps || [],

    const checklist = renderChecklistWorkflow(request);

    return `

  function renderChecklistWorkflow(request) {
    const steps = request.checklistWorkflowSteps || [];
    const history = request.checklistNotificationHistory || [];
    if (!steps.length && !history.length && request.processType !== 'vtr') {
      return '';
    }
    if (!steps.length && !history.length && !request.checklistSubmittedAt && !request.checklistCompletedAt) {
      return '';
    }
    return renderWorkflowStage(
      'VTR checklist notifications',
      'checklist',
      steps,
      history,
      request
    );
  }

  function renderWorkflowStage(title, stage, steps, history, request) {
    const activeIndex = Number(request.activeApprovalStepIndex);
    const isActiveStage = request.activeApprovalStage === stage;
    const buckets = workflowHistoryBuckets(steps, history);
    const rows = steps.length
      ? steps.map(step => renderWorkflowStep(
          step,
          stage,
          buckets.entriesByStep[workflowStepRenderKey(step)] || [],
          request,
          isActiveStage && activeIndex === Number(step.index)
        )).join('')
      : '<p class="muted">No configured steps for this stage.</p>';
    return `
      <div class="workflow-stage">
        <h4>${escapeHtml(title)}</h4>
        <div class="workflow-step-list">
          ${rows}
          ${buckets.unmatched.map(entry => renderWorkflowHistoryOnly(entry)).join('')}
        </div>
      </div>
    `;
  }

  function renderWorkflowStep(step, stage, entries, request, isActive) {
    const status = workflowStepStatus(step, entries, request, stage, isActive);
    const recipient = step.type === 'notification'
      ? (step.emails || []).join(', ')
      : step.email;
    return `
      <div class="workflow-step ${status.className}">
        <div>
          <strong>${escapeHtml(step.name || 'Workflow step')}</strong>
          <span>${escapeHtml(step.type || 'approval')} | ${escapeHtml(recipient || '')}</span>
        </div>
        <div>
          <span class="badge ${status.badge}">${escapeHtml(status.label)}</span>
          ${step.error ? `<p class="workflow-entry">${escapeHtml(step.error)}</p>` : ''}
          ${entries.map(entry => renderWorkflowEntry(entry)).join('')}
        </div>
      </div>
    `;
  }

  function workflowStepStatus(step, entries, request, stage, isActive) {
    if (isActive) {
      return { label: `Waiting on ${request.activeApprovalStepName || step.name}`, badge: 'pending', className: 'active' };
    }
    const latest = entries[entries.length - 1];
    if (latest) {
      const decision = String(latest.decision || '').toLowerCase();
      if (decision.indexOf('change') !== -1) {
        return { label: 'Changes requested', badge: 'pending', className: 'attention' };
      }
      if (decision.indexOf('skip') !== -1) {
        return { label: 'Skipped', badge: 'closed', className: 'muted-step' };
      }
      if (decision.indexOf('deny') !== -1) {
        return { label: 'Denied', badge: 'stopped', className: 'stopped' };
      }
      if (step.type === 'notification') {
        return { label: 'Sent', badge: 'closed', className: 'complete' };
      }
      return { label: latest.decision || 'Completed', badge: 'closed', className: 'complete' };
    }
    if (step.type === 'notification') {
      return { label: 'Notification step', badge: 'closed', className: 'muted-step' };
    }
    if (step.type === 'configuration') {
      return { label: 'Config issue', badge: 'stopped', className: 'stopped' };
    }
    return { label: 'Not reached', badge: 'closed', className: 'muted-step' };
  }

  function renderWorkflowEntry(entry) {
    const who = entry.adminEmail
      ? `${entry.adminEmail} for ${entry.approverEmail || ''}`
      : entry.approverEmail || '';
    const recipients = Array.isArray(entry.recipients) && entry.recipients.length
      ? entry.recipients.join(', ')
      : '';
    return `
      <p class="workflow-entry">
        ${escapeHtml(formatDateTime(entry.at))}: ${escapeHtml(entry.decision || '')}${who ? ` by ${escapeHtml(who)}` : ''}${recipients ? ` to ${escapeHtml(recipients)}` : ''}${entry.comment ? ` - ${escapeHtml(entry.comment)}` : ''}
      </p>
    `;
  }

  function renderWorkflowHistoryOnly(entry) {
    return `
      <div class="workflow-step muted-step">
        <div>
          <strong>${escapeHtml(entry.stepName || 'Approval history')}</strong>
          <span>${escapeHtml(entry.stepType || 'approval')} | ${escapeHtml(entry.approverEmail || '')}</span>

        <div>
          <span class="badge closed">History</span>

      </div>
    `;
  }

  function renderChangeRequests(changeHistory) {
    const entries = visibleChangeHistoryEntries(changeHistory);
    if (!entries.length) {
      return '';
    }
      return `
      <div class="workflow-stage">
        <h4>Adjustments</h4>
        <div class="history">
          ${entries.map(entry => renderChangeHistoryEntry(entry)).join('')}

    `;
  }

  function visibleChangeHistoryEntries(changeHistory) {
    return (changeHistory || []).filter(entry => entry.type !== 'change_request');
  }

  function renderChangeHistoryEntry(entry) {
    const stageLabel = entry.stage === 'actual' ? 'Actual hours' : 'Request details';
    if (entry.type === 'adjustment') {
      const requestedWho = entry.requestedByEmail ? `${entry.requestedByName || entry.requestedByEmail} (${entry.requestedByEmail})` : entry.requestedByName || '';
      const editedWho = entry.editedByEmail ? `${entry.editedByName || entry.editedByEmail} (${entry.editedByEmail})` : entry.editedByName || '';
      return `
        <div class="history-entry">
          <p><strong>${escapeHtml(formatDateTime(entry.at))}: ${escapeHtml(stageLabel)} updated</strong></p>
          ${requestedWho ? `<p>${entry.requestedByRole === 'approver' ? 'Change requested by' : 'Change started by'} ${escapeHtml(requestedWho)}.</p>` : ''}
          ${editedWho ? `<p>Updated by ${escapeHtml(editedWho)}.</p>` : ''}
          ${entry.comment ? `<p><strong>Adjustment comment:</strong> ${escapeHtml(entry.comment)}</p>` : ''}
          ${renderAdjustmentFieldChanges(entry.fields || [])}
        </div>
      `;
    }

    const requestedWho = entry.requestedByEmail ? `${entry.requestedByName || entry.requestedByEmail} (${entry.requestedByEmail})` : entry.requestedByName || 'Reviewer';
    return `
      <div class="history-entry">
        <p><strong>${escapeHtml(formatDateTime(entry.at))}: ${escapeHtml(stageLabel)} changes requested</strong></p>
        <p>Requested by ${escapeHtml(requestedWho)}${entry.comment ? ` - ${escapeHtml(entry.comment)}` : ''}</p>
      </div>
    `;
  }

  function renderAdjustmentFieldChanges(fields) {
    if (!fields.length) {
      return '<p class="workflow-entry">No field values changed.</p>';
    }
    return `
      <ul class="history-field-list">
        ${fields.map(field => `<li><strong>${escapeHtml(field.label || field.field || 'Field')}:</strong> ${escapeHtml(displayHistoryValue(field.from))} -> ${escapeHtml(displayHistoryValue(field.to))}</li>`).join('')}
      </ul>
    `;
  }

  function displayHistoryValue(value) {
    const text = String(value === null || value === undefined ? '' : value);
    return text ? `"${text}"` : '(blank)';
  }

  function workflowEntryMatchesStep(entry, step) {
    const entryStepName = normalize(entry.stepName);
    if (entryStepName) {
      return entryStepName === normalize(step.name);
    }
    return normalize(entry.approverEmail) === normalize(step.email);
  }

  function workflowHistoryBuckets(steps, history) {
    const entriesByStep = {};
    const unmatched = [];
    const matchedEntries = new Set();
    const matchedSteps = new Set();
    (steps || []).forEach(step => {
      entriesByStep[workflowStepRenderKey(step)] = [];
    });

    function assign(entry, step) {
      const key = workflowStepRenderKey(step);
      entriesByStep[key] = entriesByStep[key] || [];
      entriesByStep[key].push(entry);
      matchedEntries.add(entry);
      matchedSteps.add(key);
    }

    (history || []).forEach(entry => {
      const step = (steps || []).find(candidate => workflowEntryMatchesStep(entry, candidate));
      if (step) {
        assign(entry, step);
      }
    });

    (history || []).forEach(entry => {
      if (matchedEntries.has(entry)) {
        return;
      }
      const step = (steps || []).find(candidate => !matchedSteps.has(workflowStepRenderKey(candidate)) && workflowEntryMatchesStepByIndex(entry, candidate));
      if (step) {
        assign(entry, step);
      }
    });

    (history || []).forEach(entry => {
      if (matchedEntries.has(entry)) {
        return;
      }
      const step = (steps || []).find(candidate => !matchedSteps.has(workflowStepRenderKey(candidate)) && workflowEntryCanFallbackMatchStep(entry, candidate));
      if (step) {
        assign(entry, step);
      } else {
        unmatched.push(entry);
      }
    });

    return { entriesByStep, unmatched };
  }

  function workflowStepRenderKey(step) {
    return [
      normalize(step.stage),
      String(step.originalIndex === undefined ? '' : step.originalIndex),
      String(step.index === undefined ? '' : step.index),
      normalize(step.type),
      normalize(step.name),
      normalize(step.email)
    ].join('|');
  }

  function workflowEntryMatchesStepByIndex(entry, step) {
    const entryIndex = entry.stepIndex === undefined || entry.stepIndex === '' ? NaN : Number(entry.stepIndex);
    const entryOriginalIndex = entry.stepOriginalIndex === undefined || entry.stepOriginalIndex === '' ? NaN : Number(entry.stepOriginalIndex);
    return (!isNaN(entryOriginalIndex) && entryOriginalIndex === Number(step.originalIndex)) ||
      (!isNaN(entryIndex) && entryIndex === Number(step.index));
  }

  function workflowEntryCanFallbackMatchStep(entry, step) {
    if (normalize(entry.stepType || 'approval') !== normalize(step.type || 'approval')) {
      return false;
    }
    if (step.type === 'notification') {
      const recipients = [].concat(entry.recipients || []).map(normalize);
      return (step.emails || []).some(email => recipients.indexOf(normalize(email)) !== -1);
    }
    return normalize(entry.approverEmail) && normalize(entry.approverEmail) === normalize(step.email);
  }

  function normalize(value) {
    return String(value || '').trim().toLowerCase();
  }

  function renderReassignForm(request) {
    return `

  function bindAdminWorkflowManagement() {
    document.querySelectorAll('[data-admin-workflow-form]').forEach(form => {
      if (form.dataset.workflowBound === 'true') {
