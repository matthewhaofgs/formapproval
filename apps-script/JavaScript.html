      }
      form.dataset.workflowBound = 'true';

      form.addEventListener('input', event => {
        const stepField = event.target.closest('[data-step-field]');
        if (stepField) {
          updateWorkflowWaitingPreview(stepField.closest('[data-workflow-step]'));
        }
      });

      form.addEventListener('change', event => {
        const processSelect = event.target.closest('[data-workflow-process-select]');
        if (processSelect) {
          dashboardState.workflowProcess = processSelect.value || '';
          dashboardState.workflowStage = '';
          rerenderAdminLanding();
          return;
        }

        const stepType = event.target.closest('[data-step-field="type"]');
        if (stepType) {
          const step = stepType.closest('[data-workflow-step]');
          refreshWorkflowRecipientModeOptions(step);
          updateWorkflowStepVisibility(step);
          updateWorkflowWaitingPreview(step);
          return;
        }

        const recipientMode = event.target.closest('[data-recipient-mode]');
        if (recipientMode) {
          const step = recipientMode.closest('[data-workflow-step]');
          updateWorkflowStepVisibility(step);
          updateWorkflowWaitingPreview(step);
          return;
        }

        const stepField = event.target.closest('[data-step-field]');
        if (stepField) {
          updateWorkflowWaitingPreview(stepField.closest('[data-workflow-step]'));
        }

        const conditionControl = event.target.closest('[data-condition-field], [data-condition-operator]');
        if (conditionControl) {
          const row = conditionControl.closest('[data-condition-row]');
          updateConditionValueControl(row);
        }
      });

      form.addEventListener('click', event => {
        const stageTab = event.target.closest('[data-workflow-stage-tab]');
        if (stageTab) {
          event.preventDefault();
          setWorkflowStage(form, stageTab.dataset.workflowStageTab || '');
          return;
        }

        const addButton = event.target.closest('[data-add-workflow-step]');
        if (addButton) {
          event.preventDefault();
          addWorkflowStep(form, addButton.dataset.stageKey || dashboardState.workflowStage);
          return;
        }

        const removeButton = event.target.closest('[data-remove-workflow-step]');
        if (removeButton) {
          event.preventDefault();
          const step = removeButton.closest('[data-workflow-step]');
          const list = step ? step.closest('[data-workflow-step-list]') : null;
          if (step) {
            step.remove();
          }
          updateWorkflowStepListState(list);
          return;
        }

        const moveButton = event.target.closest('[data-move-workflow-step]');
        if (moveButton) {
          event.preventDefault();
          moveWorkflowStep(moveButton.closest('[data-workflow-step]'), moveButton.dataset.moveWorkflowStep);
          return;
        }

        const addConditionButton = event.target.closest('[data-add-condition-row]');
        if (addConditionButton) {
          event.preventDefault();
          addConditionRow(addConditionButton.closest('[data-condition-builder]'), form.dataset.processKey);
          return;
        }

        const removeConditionButton = event.target.closest('[data-remove-condition-row]');
        if (removeConditionButton) {
          event.preventDefault();
          const builder = removeConditionButton.closest('[data-condition-builder]');
          const row = removeConditionButton.closest('[data-condition-row]');
          if (row) {
            row.remove();
          }
          updateConditionBuilderState(builder);
        }
      });

      form.addEventListener('dragstart', event => {
        const handle = event.target.closest('[data-workflow-drag-handle]');
        if (!handle) {
          draggedWorkflowStep = null;
          return;
        }
        const step = handle.closest('[data-workflow-step]');
        if (!step) {
          return;
        }
        draggedWorkflowStep = step;
        step.classList.add('dragging');
        if (event.dataTransfer) {
          event.dataTransfer.effectAllowed = 'move';
          event.dataTransfer.setData('text/plain', 'workflow-step');
        }
      });

      form.addEventListener('dragend', () => {
        if (draggedWorkflowStep) {
          const list = draggedWorkflowStep.closest('[data-workflow-step-list]');
          draggedWorkflowStep.classList.remove('dragging');
          updateWorkflowStepListState(list);
        }
        draggedWorkflowStep = null;
      });

      form.addEventListener('dragover', event => {
        const list = event.target.closest('[data-workflow-step-list]');
        if (!list || !draggedWorkflowStep || draggedWorkflowStep.closest('[data-workflow-step-list]') !== list) {
          return;
        }
        event.preventDefault();
        const afterElement = workflowStepAfterDrag(list, event.clientY);
        const empty = list.querySelector('[data-workflow-empty]');
        if (!afterElement) {
          list.insertBefore(draggedWorkflowStep, empty || null);
        } else {
          list.insertBefore(draggedWorkflowStep, afterElement);
        }
      });

      form.addEventListener('drop', event => {
        const list = event.target.closest('[data-workflow-step-list]');
        if (!list || !draggedWorkflowStep) {
          return;
        }
        event.preventDefault();
        updateWorkflowStepListState(list);
      });

      form.addEventListener('submit', event => {
        event.preventDefault();
        const data = collectAdminWorkflowSettings(form);
        submitWithContainer(form, 'updateAdminWorkflowSettings', data, result => {
          showNotice(result.message || 'Workflow configuration has been updated.', 'success');
          if (dashboardState.data) {
            dashboardState.data.workflowManagement = result.workflowManagement || dashboardState.data.workflowManagement;
            dashboardState.data.roleAvailability = result.roleAvailability || dashboardState.data.roleAvailability;
          }
          dashboardState.roleAvailability = normalizeRoleAvailability(result.roleAvailability || dashboardState.roleAvailability);
          dashboardState.workflowProcess = result.processKey || data.processKey;
          applyTopNavRoleVisibility();
          rerenderAdminLanding();
        });
      });

      form.querySelectorAll('[data-workflow-step]').forEach(step => {
        updateWorkflowStepVisibility(step);
        updateWorkflowWaitingPreview(step);
      });
    });
  }

  function rerenderAdminLanding() {
    const body = document.getElementById('dashboard-body');
    if (!body || !dashboardState.data) {
      return;
    }
    body.innerHTML = renderDashboardData(dashboardState.data);
    bindDashboardActions();
    updateAdminViewUrl();
  }

  function setWorkflowStage(form, stage) {
    if (!stage) {
      return;
    }
    dashboardState.workflowStage = stage;
    form.querySelectorAll('[data-workflow-stage-tab]').forEach(button => {
      const active = button.dataset.workflowStageTab === stage;
      button.classList.toggle('active', active);
      button.setAttribute('aria-selected', active ? 'true' : 'false');
    });
    form.querySelectorAll('[data-workflow-stage-panel]').forEach(panel => {
      panel.hidden = panel.dataset.workflowStage !== stage;
    });
  }

  function addWorkflowStep(form, stage) {
    const panel = findWorkflowStagePanel(form, stage);
    if (!panel) {
      return;
    }
    const list = panel.querySelector('[data-workflow-step-list]');
    const empty = list ? list.querySelector('[data-workflow-empty]') : null;
    const stages = currentWorkflowStages(form.dataset.processKey);
    const conditionFields = currentWorkflowConditionFields(form.dataset.processKey);
    const recipientFields = currentWorkflowRecipientFields(form.dataset.processKey);
    const step = {
      type: 'notification',
      name: 'New notification',
      email: '',
      emails: [],
      emailField: '',
      emailFields: [],
      subject: '',
      message: '',
      waitingLabel: '',
      whenJson: '',
      unlessJson: ''
    };
    if (!list) {
      return;
    }
    const index = workflowStepCount(list);
    if (empty) {
      empty.insertAdjacentHTML('beforebegin', renderWorkflowStepEditor(step, index, stages, false, conditionFields, recipientFields));
    } else {
      list.insertAdjacentHTML('beforeend', renderWorkflowStepEditor(step, index, stages, false, conditionFields, recipientFields));
    }
    updateWorkflowStepVisibility(list.querySelectorAll('[data-workflow-step]')[index]);
    updateWorkflowStepListState(list);
  }

  function moveWorkflowStep(step, direction) {
    if (!step) {
      return;
    }
    const list = step.closest('[data-workflow-step-list]');
    const target = direction === 'up'
      ? previousWorkflowStep(step)
      : nextWorkflowStep(step);
    if (!list || !target) {
      return;
    }
    if (direction === 'up') {
      list.insertBefore(step, target);
    } else {
      list.insertBefore(target, step);
    }
    updateWorkflowStepListState(list);
  }

  function previousWorkflowStep(step) {
    let current = step ? step.previousElementSibling : null;
    while (current && !current.matches('[data-workflow-step]')) {
      current = current.previousElementSibling;
    }
    return current;
  }

  function nextWorkflowStep(step) {
    let current = step ? step.nextElementSibling : null;
    while (current && !current.matches('[data-workflow-step]')) {
      current = current.nextElementSibling;
    }
    return current;
  }

  function findWorkflowStagePanel(form, stage) {
    return Array.from(form.querySelectorAll('[data-workflow-stage-panel]')).find(panel => {
      return panel.dataset.workflowStage === stage;
    });
  }

  function currentWorkflowStages(processKey) {
    const management = dashboardState.data && dashboardState.data.workflowManagement;
    const process = management && (management.processes || []).find(item => item.key === processKey);
    return process && process.stages ? process.stages : [];
  }

  function currentWorkflowConditionFields(processKey) {
    const management = dashboardState.data && dashboardState.data.workflowManagement;
    const process = management && (management.processes || []).find(item => item.key === processKey);
    return process && process.conditionFields ? process.conditionFields : [];
  }

  function currentWorkflowRecipientFields(processKey) {
    const management = dashboardState.data && dashboardState.data.workflowManagement;
    const process = management && (management.processes || []).find(item => item.key === processKey);
    return process && process.recipientFields ? process.recipientFields : [];
  }

  function workflowStepAfterDrag(list, y) {
    const steps = Array.from(list.querySelectorAll('[data-workflow-step]:not(.dragging)'));
    return steps.reduce((closest, child) => {
      const box = child.getBoundingClientRect();
      const offset = y - box.top - box.height / 2;
      if (offset < 0 && offset > closest.offset) {
        return { offset, element: child };
      }
      return closest;
    }, { offset: Number.NEGATIVE_INFINITY, element: null }).element;
  }

  function updateWorkflowStepListState(list) {
    if (!list) {
      return;
    }
    const steps = Array.from(list.querySelectorAll('[data-workflow-step]'));
    steps.forEach((step, index) => {
      const order = step.querySelector('[data-step-order]');
      if (order) {
        order.textContent = String(index + 1);
      }
    });
    const empty = list.querySelector('[data-workflow-empty]');
    if (empty) {
      empty.hidden = steps.length > 0;
    }
  }

  function workflowStepCount(list) {
    return list ? list.querySelectorAll('[data-workflow-step]').length : 0;
  }

  function collectAdminWorkflowSettings(form) {
    const workflows = {};
    form.querySelectorAll('[data-workflow-stage-panel]').forEach(panel => {
      const stage = panel.dataset.workflowStage;
      workflows[stage] = Array.from(panel.querySelectorAll('[data-workflow-step]')).map(collectWorkflowStep);
    });
    return {
      email: dashboardState.email,
      processKey: form.dataset.processKey,
      workflows
    };
  }

  function collectWorkflowStep(step) {
    const type = workflowStepFieldValue(step, 'type');
    const recipientMode = workflowRecipientModeValue(step);
    const waitingLabel = isWorkflowEditorBlockingType(type) ? workflowStepFieldValue(step, 'waitingLabel') : '';
    return {
      type,
      name: workflowStepFieldValue(step, 'name'),
      email: recipientMode === 'fixed-email' || recipientMode === 'advanced' ? workflowStepFieldValue(step, 'email') : '',
      emails: recipientMode === 'fixed-emails' || recipientMode === 'advanced' ? splitWorkflowList(workflowStepFieldValue(step, 'emails')) : [],
      emailField: recipientMode === 'request-field' || recipientMode === 'advanced' ? workflowStepFieldValue(step, 'emailField') : '',
      emailFields: recipientMode === 'request-fields' || recipientMode === 'advanced' ? splitWorkflowFieldList(workflowStepFieldValue(step, 'emailFields')) : [],
      subject: workflowStepFieldValue(step, 'subject'),
      message: workflowStepFieldValue(step, 'message'),
      waitingLabel,
      whenJson: conditionJsonFromBuilder(step, 'whenJson'),
      unlessJson: conditionJsonFromBuilder(step, 'unlessJson'),
      followUpStage: isWorkflowEditorBlockingType(type) ? workflowStepFieldValue(step, 'followUpStage') : ''
    };
  }

  function refreshWorkflowRecipientModeOptions(step) {
    if (!step) {
      return;
    }
    const select = step.querySelector('[data-recipient-mode]');
    if (!select) {
      return;
    }
    const type = workflowStepFieldValue(step, 'type');
    const previous = select.value || 'fixed-email';
    select.innerHTML = workflowRecipientModeOptions(type, previous);
    const values = Array.from(select.options).map(option => option.value);
    if (values.indexOf(previous) !== -1) {
      select.value = previous;
      return;
    }
    select.value = workflowStepFieldValue(step, 'emailField') ? 'request-field' : 'fixed-email';
  }

  function updateWorkflowStepVisibility(step) {
    if (!step) {
      return;
    }
    const type = workflowStepFieldValue(step, 'type');
    const mode = workflowRecipientModeValue(step);
    step.querySelectorAll('[data-recipient-panel]').forEach(panel => {
      const modes = String(panel.dataset.recipientModes || '').split(/\s+/).filter(Boolean);
      panel.hidden = modes.indexOf(mode) === -1;
    });
    const help = step.querySelector('[data-recipient-help]');
    if (help) {
      help.textContent = workflowRecipientHelp(type);
    }
    const waitingPanel = step.querySelector('[data-workflow-waiting-panel]');
    if (waitingPanel) {
      const isBlocking = isWorkflowEditorBlockingType(type);
      waitingPanel.hidden = !isBlocking;
    }
  }

  function updateWorkflowWaitingPreview(step) {
    if (!step) {
      return;
    }
    const preview = step.querySelector('[data-workflow-waiting-preview]');
    if (!preview) {
      return;
    }
    preview.textContent = workflowWaitingLabelPreview(workflowStepPreviewDataFromElement(step));
  }

  function workflowStepPreviewDataFromElement(step) {
    return {
      type: workflowStepFieldValue(step, 'type'),
      name: workflowStepFieldValue(step, 'name'),
      email: workflowStepFieldValue(step, 'email'),
      emails: splitWorkflowList(workflowStepFieldValue(step, 'emails')),
      emailField: workflowStepFieldValue(step, 'emailField'),
      emailFields: splitWorkflowFieldList(workflowStepFieldValue(step, 'emailFields')),
      waitingLabel: workflowStepFieldValue(step, 'waitingLabel')
    };
  }

  function workflowRecipientModeValue(step) {
    const select = step ? step.querySelector('[data-recipient-mode]') : null;
    return select && select.value ? select.value : 'fixed-email';
  }

  function addConditionRow(builder, processKey) {
    if (!builder) {
      return;
    }
    const list = builder.querySelector('[data-condition-row-list]');
    const empty = builder.querySelector('[data-condition-empty]');
    const fields = currentWorkflowConditionFields(processKey);
    if (!list) {
      return;
    }
    const defaultField = fields.length ? fields[0].name : 'requesterEmail';
    const row = {
      field: defaultField,
      operator: 'equals',
      value: ''
    };
    if (empty) {
      empty.insertAdjacentHTML('beforebegin', renderConditionRow(row, fields));
    } else {
      list.insertAdjacentHTML('beforeend', renderConditionRow(row, fields));
    }
    updateConditionBuilderState(builder);
  }

  function updateConditionValueControl(row) {
    if (!row) {
      return;
    }
    const field = row.querySelector('[data-condition-field]');
    const operator = row.querySelector('[data-condition-operator]');
    const wrap = row.querySelector('[data-condition-value-wrap]');
    if (!field || !operator || !wrap) {
      return;
    }
    const fields = currentWorkflowConditionFields(row.closest('[data-admin-workflow-form]').dataset.processKey);
    wrap.innerHTML = conditionValueControl(field.value, operator.value, '', fields);
  }

  function updateConditionBuilderState(builder) {
    if (!builder) {
      return;
    }
    const count = builder.querySelectorAll('[data-condition-row]').length;
    const empty = builder.querySelector('[data-condition-empty]');
    if (empty) {
      empty.hidden = count > 0;
    }
    const raw = builder.querySelector('[data-condition-raw]');
    if (raw && count > 0) {
      raw.value = '';
    }
  }

  function conditionJsonFromBuilder(step, fieldName) {
    const builder = step ? step.querySelector(`[data-condition-builder="${fieldName}"]`) : null;
    if (!builder) {
      return workflowStepFieldValue(step, fieldName);
    }
    const rows = Array.from(builder.querySelectorAll('[data-condition-row]'))
      .map(conditionObjectFromRow)
      .filter(Boolean);
    if (!rows.length) {
      const raw = builder.querySelector('[data-condition-raw]');
      return raw ? String(raw.value || '').trim() : '';
    }
    if (rows.length === 1) {
      return JSON.stringify(rows[0]);
    }
    const mode = (builder.querySelector('[data-condition-mode]') || {}).value || 'all';
    return JSON.stringify(mode === 'any' ? { any: rows } : { all: rows });
  }

  function conditionObjectFromRow(row) {
    const field = (row.querySelector('[data-condition-field]') || {}).value || '';
    const operator = (row.querySelector('[data-condition-operator]') || {}).value || 'equals';
    if (!field) {
      return null;
    }
    if (operator === 'exists') {
      return { field, exists: true };
    }
    if (operator === 'notExists') {
      return { field, exists: false };
    }
    const value = conditionValueFromRow(row);
    if (operator === 'notEquals') {
      return { field, notEquals: value };
    }
    if (operator === 'in') {
      return { field, in: Array.isArray(value) ? value : splitWorkflowList(value) };
    }
    if (operator === 'notIn') {
      return { field, notIn: Array.isArray(value) ? value : splitWorkflowList(value) };
    }
    return { field, equals: value };
  }

  function conditionValueFromRow(row) {
    const input = row.querySelector('[data-condition-value]');
    if (!input) {
      return '';
    }
    if (input.tagName === 'SELECT' && input.multiple) {
      return Array.from(input.selectedOptions).map(option => option.value).filter(Boolean);
    }
    return String(input.value || '').trim();
  }

  function workflowStepFieldValue(step, field) {
    const input = step ? step.querySelector(`[data-step-field="${field}"]`) : null;
    if (input && input.tagName === 'SELECT' && input.multiple) {
      return Array.from(input.selectedOptions).map(option => option.value).filter(Boolean).join(',');
    }
    return input ? String(input.value || '').trim() : '';
  }

  function splitWorkflowList(value) {
    return String(value || '')
      .split(/[\n,;]+/)
      .map(normalize)
      .filter(Boolean);
  }

  function splitWorkflowFieldList(value) {
    return String(value || '')
      .split(/[\s,;]+/)
      .map(item => String(item || '').trim())
      .filter(Boolean);
  }

  function addAdminEmailFromControl(form, button) {
    const addPanel = button.closest('[data-admin-add-panel]');
    const sourceGroup = button.closest('[data-admin-access-group]') || button.closest('tr');
    const input = addPanel
      ? addPanel.querySelector('[data-admin-email-input]')
      : (sourceGroup ? sourceGroup.querySelector('[data-admin-email-input]') : null);
    const selectedScope = addPanel ? adminScopeParts(addPanel.querySelector('[data-admin-scope-select]')) : null;
    const list = selectedScope
      ? findAdminListForScope(form, selectedScope.scope, selectedScope.key)
      : (sourceGroup ? sourceGroup.querySelector('[data-admin-list]') : null);
    const targetGroup = list ? (list.closest('[data-admin-access-group]') || list.closest('tr')) : sourceGroup;
    if (!input || !list) {
      showNotice('Choose an access area.', 'error');
      return false;
    }

    const email = normalize(input.value);
    if (!email) {
      input.focus();
      return false;
    }
    if (!isValidEmailText(email)) {
      showNotice('Enter a valid email address.', 'error');
      input.focus();
      return false;
    }
    if (adminListContainsEmail(list, email)) {
      showNotice(`${email} is already listed.`, 'error');
      input.focus();
      return false;
    }

    const empty = list.querySelector('[data-admin-empty]');
    if (empty) {
      empty.insertAdjacentHTML('beforebegin', renderAdminEmailRow(email));
    } else {
      list.insertAdjacentHTML('beforeend', renderAdminEmailRow(email));
    }
    input.value = '';
    if (targetGroup) {
      updateAdminAccessGroupState(targetGroup);
    }
    return true;
  }

  function flushPendingAdminEmailInputs(form) {
    const inputs = Array.from(form.querySelectorAll('[data-admin-email-input]'));
    for (const input of inputs) {
      if (!normalize(input.value)) {
        continue;
      }
      const group = input.closest('[data-admin-add-panel]') || input.closest('[data-admin-access-group]') || input.closest('tr');
      const addButton = group ? group.querySelector('[data-add-admin-email]') : null;
      if (!addButton || !addAdminEmailFromControl(form, addButton)) {
        return false;
      }
    }
    return true;
  }

  function adminScopeParts(select) {
    const value = String(select && select.value ? select.value : '');
    const separator = value.indexOf('::');
    if (separator === -1) {
      return { scope: '', key: '' };
    }
    return {
      scope: value.slice(0, separator),
      key: value.slice(separator + 2)
    };
  }

  function findAdminListForScope(form, scope, key) {
    const normalizedKey = String(key || '');
    return Array.from(form.querySelectorAll('[data-admin-list]')).find(list => {
      return list.dataset.adminList === scope && String(list.dataset.processKey || '') === normalizedKey;
    });
  }

  function removeAdminEmailRow(form, button) {
    const row = button.closest('[data-admin-email]');
    const list = button.closest('[data-admin-list]');
    const group = button.closest('[data-admin-access-group]') || button.closest('tr');
    if (!row || !list || !group) {
      return;
    }
    if (list.dataset.adminList === 'globalAdmins' && collectAdminEmailsFromList(list).length <= 1) {
      showNotice('At least one global admin is required.', 'error');
      return;
    }
    row.remove();
    updateAdminAccessGroupState(group);
  }

  function collectAdminUserSettings(form) {
    const globalList = form.querySelector('[data-admin-list="globalAdmins"]');
    const processAdmins = {};
    form.querySelectorAll('[data-admin-list="processAdmins"]').forEach(list => {
      processAdmins[list.dataset.processKey] = collectAdminEmailsFromList(list);
    });
    return {
      email: dashboardState.email,
      globalAdmins: collectAdminEmailsFromList(globalList),
      processAdmins
    };
  }

  function collectAdminEmailsFromList(list) {
    if (!list) {
      return [];
    }
    return Array.from(list.querySelectorAll('[data-admin-email]'))
      .map(row => normalize(row.dataset.adminEmail))
      .filter(Boolean);
  }

  function adminListContainsEmail(list, email) {
    return collectAdminEmailsFromList(list).indexOf(normalize(email)) !== -1;
  }

  function updateAdminAccessGroupState(group) {
    const list = group.querySelector('[data-admin-list]');
    if (!list) {
      return;
    }
    const count = collectAdminEmailsFromList(list).length;
    const empty = list.querySelector('[data-admin-empty]');
    const counter = group.querySelector('[data-admin-count]');
    if (empty) {
      empty.hidden = count > 0;
    }
    if (counter) {
      counter.textContent = adminCountLabel(count);
    }
  }

  function isValidEmailText(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email || ''));
  }

  function updateAdminViewUrl() {
    if (!window.history || !window.history.replaceState) {
      return;
    }
    const params = { role: 'admin' };
    if (dashboardState.adminView !== 'forms') {
      params.adminView = dashboardState.adminView;
    }
    window.history.replaceState(null, '', appUrl('dashboard', params));
  }

  function bindAdminProcessNavigation() {
    document.querySelectorAll('[data-admin-process]').forEach(link => {
      link.addEventListener('click', event => {
        const processKey = event.currentTarget.dataset.adminProcess;
        const dashboard = dashboardState.adminDashboards && dashboardState.adminDashboards[processKey];
        event.preventDefault();
        dashboardState.selectedProcess = processKey;
        const body = document.getElementById('dashboard-body');
        if (dashboard) {
          hideGlobalProgress(true);
          dashboardState.data = dashboard;
          body.innerHTML = renderDashboardData(dashboard);
          bindDashboardActions();
          return;
        }
        body.innerHTML = renderLoading('Loading admin section');
        const payload = {
          role: 'admin',
          email: dashboardState.email,
          process: processKey
        };
        runServer('getDashboardData', payload, dashboardLoadTimeoutMs(payload))
          .then(result => {
            renderLoadedDashboardData(body, result);
          })
          .catch(error => {
            body.innerHTML = renderAuthError(error);
          });
      });
    });

    document.querySelectorAll('[data-admin-process-chooser]').forEach(link => {
      link.addEventListener('click', event => {
        if (!dashboardState.adminChooserData) {
          return;
        }
        event.preventDefault();

  function bindDashboardFilter() {
    const input = document.querySelector('[data-dashboard-filter]');
    if (!input) {
      return;
    }
    const clearButton = document.querySelector('[data-dashboard-filter-clear]');
    const resultCount = document.querySelector('[data-dashboard-filter-count]');
    const items = Array.from(document.querySelectorAll('[data-dashboard-request]'));

    const update = () => {
      const query = normalize(input.value);
      const terms = query.split(/\s+/).filter(Boolean);
      let visibleTotal = 0;

      items.forEach(item => {
        const haystack = item.dataset.search || '';
        const matches = terms.every(term => haystack.indexOf(term) !== -1);
        item.classList.toggle('hidden', !matches);
        if (matches) {
          visibleTotal += 1;
        }
      });

      document.querySelectorAll('[data-request-section]').forEach(section => {
        const sectionItems = Array.from(section.querySelectorAll('[data-dashboard-request]'));
        const visibleItems = sectionItems.filter(item => !item.classList.contains('hidden')).length;
        const count = section.querySelector('[data-section-visible-count]');
        const empty = section.querySelector('[data-section-empty]');
        if (count) {
          count.textContent = terms.length ? `${visibleItems} of ${sectionItems.length}` : String(sectionItems.length);
        }
        if (empty) {
          empty.classList.toggle('hidden', !terms.length || visibleItems > 0);
        }
        section.open = terms.length ? visibleItems > 0 : false;
      });

      if (resultCount) {
        resultCount.textContent = terms.length
          ? `${visibleTotal} of ${items.length} requests`
          : `${items.length} requests`;
      }
      if (clearButton) {
        clearButton.hidden = !terms.length;
      }
    };

    input.addEventListener('input', update);
    if (clearButton) {
      clearButton.addEventListener('click', () => {
        input.value = '';
        input.focus();
        update();
      });
    }
    update();
  }

  function renderRequestForm() {

  function renderConfiguredFormSection(section, request, isEdit, index) {
    const title = isEdit && section.editTitle ? section.editTitle : section.title;
    const description = isEdit && section.editDescription ? section.editDescription : section.description;
    const layout = section.layout || 'grid';
    return `
      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>${escapeHtml(title || '')}</h2>
            ${description ? `<p>${escapeHtml(description)}</p>` : ''}
          </div>
          ${index === 0 ? `
            <div class="actions inline">
              <a class="button secondary" href="${escapeHtml(appUrl('dashboard', { role: 'requester' }))}">My Requests</a>
            </div>
          ` : ''}
        </div>
        ${index === 0 && isEdit && request.changeComment ? `<div class="notice"><strong>Changes requested:</strong><br>${escapeHtml(request.changeComment)}</div>` : ''}
        ${index === 0 && isEdit ? `
          <label class="field full">
            <span>Adjustment comment</span>
            <textarea name="adjustmentComment"></textarea>
            <span class="help">Optional note to show in Approval History with this adjustment.</span>
          </label>
        ` : ''}
        <div class="${escapeHtml(layout)}">
          ${(section.fields || []).map(fieldSpec => renderConfiguredField(fieldSpec, request)).join('')}
        </div>
      </section>
    `;
  }

  function renderConfiguredField(fieldSpec, request) {
    const type = fieldSpec.type || 'text';
    const visible = configuredFieldVisible(fieldSpec, request);
    const className = configuredFieldClass(fieldSpec, visible);
    const conditionalAttributes = configuredFieldAttributes(fieldSpec);
    const required = configuredFieldRequired(fieldSpec, request);
    const inputAttributes = configuredInputAttributes(fieldSpec);
    const value = configuredFieldValue(fieldSpec, request);

    if (type === 'content') {
      if (!fieldSpec.html) {
        return `<div class="${className}" ${conditionalAttributes}></div>`;
      }
      return `<div class="${className}" ${conditionalAttributes}>${fieldSpec.html}</div>`;
    }
    if (type === 'requestSummary') {
      return `<div class="${className}" ${conditionalAttributes}>${renderRequestSummary(request || {}, Boolean(fieldSpec.includeActual))}</div>`;
    }
    if (type === 'divider') {
      return `<div class="divider ${className}" ${conditionalAttributes}></div>`;
    }
    if (type === 'hoursWarning') {
      return `<div class="hours-warning hidden ${className}" data-hours-warning="${escapeHtml(fieldSpec.kind || 'planned')}" ${hoursWarningAttributes(fieldSpec)} role="status" aria-live="polite" ${conditionalAttributes}></div>`;
    }
    if (type === 'mealRules') {
      return `<div class="${className}" ${conditionalAttributes}>${mealBreakRulesHtml(Boolean(fieldSpec.planned))}</div>`;
    }
    if (type === 'textarea') {
      return `
        <label class="field ${className}" ${conditionalAttributes}>
          <span>${escapeHtml(fieldSpec.label || '')}</span>
          <textarea name="${escapeHtml(fieldSpec.name)}" ${required ? 'required' : ''} ${inputAttributes}>${escapeHtml(value || '')}</textarea>
          ${fieldSpec.help ? `<span class="help">${escapeHtml(fieldSpec.help)}</span>` : ''}
        </label>
      `;
    }
    if (type === 'radio') {
      return `
        <fieldset class="field ${className}" ${conditionalAttributes}>
          <legend class="label">${escapeHtml(fieldSpec.label || '')}</legend>
          ${fieldSpec.help ? `<span class="help">${escapeHtml(fieldSpec.help)}</span>` : ''}
          <div class="choice-row ${fieldSpec.layout === 'checklist' ? 'compact' : ''}">
            ${(fieldSpec.options || []).map(option => radio(fieldSpec.name, optionValue(option), value === optionValue(option), inputAttributes, required)).join('')}
          </div>
        </fieldset>
      `;
    }
    if (type === 'select') {
      return selectField(fieldSpec.name, fieldSpec.label, fieldSpec.options || [], value, required, fieldSpec.help, className, conditionalAttributes, inputAttributes);
    }
    if (type === 'checkbox') {
      const checked = value === 'Yes' || value === true || value === 'true';
      return `
        <label class="ack ${className}" ${conditionalAttributes}>
          <input type="checkbox" name="${escapeHtml(fieldSpec.name)}" value="true" ${checked ? 'checked' : ''} ${required ? 'required' : ''} ${inputAttributes}>
          <span>${escapeHtml(fieldSpec.label || '')}</span>
        </label>
      `;
    }
    if (type === 'choiceCards') {
      return `
        <fieldset class="field ${className}" ${conditionalAttributes}>
          <legend class="label">${escapeHtml(fieldSpec.label || '')}</legend>
          <div class="compensation-options">
            ${(fieldSpec.options || []).map(option => choiceCardOption(fieldSpec.name, option, value, inputAttributes, required, request)).join('')}
          </div>
        </fieldset>
      `;
    }
    if (type === 'checklistChoice') {
      const checklistOptions = fieldSpec.options || ['Yes', 'No', 'N/A'];
      return `
        <fieldset class="field checklist-item ${className}" ${conditionalAttributes}>
          <legend class="label">${escapeHtml(fieldSpec.label || '')}</legend>
          <div class="choice-row compact">
            ${checklistOptions.map(option => radio(fieldSpec.name, optionValue(option), value === optionValue(option), inputAttributes, required)).join('')}
          </div>
        </fieldset>
      `;
    }

    return field(fieldSpec.name, fieldSpec.label, fieldSpec.htmlType || type, value, required, fieldSpec.help, className, conditionalAttributes, inputAttributes);
  }

  function configuredFieldValue(fieldSpec, request) {
    const current = request && fieldSpec.name ? request[fieldSpec.name] : '';
    if (current !== undefined && current !== null && current !== '') {
      return current;
    }
    if (fieldSpec.defaultFrom === 'currentUserEmail') {
      return state.currentUserEmail || '';
    }
    if (fieldSpec.defaultFromField && request && request[fieldSpec.defaultFromField] !== undefined && request[fieldSpec.defaultFromField] !== null) {
      return request[fieldSpec.defaultFromField];
    }
    return fieldSpec.defaultValue || '';
  }

  function configuredFieldVisible(fieldSpec, request) {
    if (!fieldSpec.visibleWhen) {
      return true;
    }
    const values = Object.assign({}, request || {});
    if (fieldSpec.name && values[fieldSpec.name] === undefined && fieldSpec.defaultValue !== undefined) {
      values[fieldSpec.name] = fieldSpec.defaultValue;
    }
    return conditionMatches(fieldSpec.visibleWhen, values);
  }

  function configuredFieldRequired(fieldSpec, request) {
    if (fieldSpec.requiredWhen) {
      return conditionMatches(fieldSpec.requiredWhen, request || {});
    }
    return Boolean(fieldSpec.required || fieldSpec.mustBeChecked);
  }

  function configuredFieldClass(fieldSpec, visible) {
    return [
      fieldSpec.layout === 'full' ? 'full' : '',
      fieldSpec.layout === 'checklist' ? 'checklist-item' : '',
      fieldSpec.className || '',
      fieldSpec.visibleWhen ? 'conditional-field' : '',
      visible ? '' : 'hidden'
    ].filter(Boolean).join(' ');
  }

  function configuredFieldAttributes(fieldSpec) {
    if (!fieldSpec.visibleWhen) {
      return '';
    }
    return `data-visible-when="${escapeHtml(JSON.stringify(fieldSpec.visibleWhen))}"`;
  }

  function configuredInputAttributes(fieldSpec) {
    const attributes = [];
    const addAttribute = (name, value) => {
      if (value === undefined || value === null || value === false) {
        return;
      }
      if (value === true) {
        attributes.push(escapeHtml(name));
        return;
      }
      attributes.push(`${escapeHtml(name)}="${escapeHtml(value)}"`);
    };

    if (fieldSpec.visibleWhen && (fieldSpec.required || fieldSpec.mustBeChecked || fieldSpec.requiredWhen)) {
      attributes.push('data-required-when-visible="true"');
    }
    if (fieldSpec.requiredWhen) {
      attributes.push(`data-required-condition="${escapeHtml(JSON.stringify(fieldSpec.requiredWhen))}"`);
    }
    addAttribute('autocomplete', fieldSpec.autocomplete);
    addAttribute('inputmode', fieldSpec.inputMode || fieldSpec.inputmode);
    addAttribute('autocapitalize', fieldSpec.autocapitalize);
    addAttribute('spellcheck', fieldSpec.spellcheck);
    addAttribute('pattern', fieldSpec.pattern);
    return attributes.join(' ');
  }

  function hoursWarningAttributes(fieldSpec) {
    const attributes = {
      startField: fieldSpec.startField || `${fieldSpec.kind || 'planned'}StartTime`,
      finishField: fieldSpec.finishField || `${fieldSpec.kind || 'planned'}FinishTime`,
      hoursField: fieldSpec.hoursField || `${fieldSpec.kind || 'planned'}Hours`,
      modeField: fieldSpec.modeField || '',
      compareModeValue: fieldSpec.compareModeValue || '',
      compareWorkdayField: fieldSpec.compareWorkdayField || '',
      compareStartField: fieldSpec.compareStartField || '',
      compareFinishField: fieldSpec.compareFinishField || '',
      compareWarningTitle: fieldSpec.compareWarningTitle || '',
      compareWarningMessage: fieldSpec.compareWarningMessage || ''
    };
    return Object.keys(attributes)
      .filter(key => attributes[key])
      .map(key => `data-${kebabCase(key)}="${escapeHtml(attributes[key])}"`)
      .join(' ');
  }

  function kebabCase(value) {
    return String(value).replace(/[A-Z]/g, letter => `-${letter.toLowerCase()}`);
  }

  function renderActualHours() {
    const request = state.request || {};
    const definition = state.formDefinition || {};
    const isChecklist = state.mode === 'checklist';
    const isChangeEdit = !isChecklist && (request.status === 'NEEDS_ACTUAL_HOURS_CHANGES' || request.status === 'PENDING_FINAL_APPROVAL');
    const defaultSubmitLabel = 'Submit actual hours';
    const defaultEditLabel = 'Resubmit actual hours';
    const submitActions = isChecklist
      ? `
            <button class="button secondary" type="submit" data-checklist-action="save">Save checklist</button>
            <button class="button primary" type="submit" data-checklist-action="complete">Submit checklist</button>

    return `
      <form id="actual-form" class="stack">

        </section>
      </form>

  }

  function renderRequestSummary(request, includeActual) {
    if (request.processType === 'vtr') {
      return renderVtrRequestSummary(request);
    }

    const isWorkdayAdjustment = requestIsWorkdayAdjustment(request);
    const plannedTimeLabel = isWorkdayAdjustment ? 'Planned Work Hours' : 'Planned Overtime';
    const plannedHoursLabel = isWorkdayAdjustment ? 'Overtime Hours Requested' : 'Planned Hours';
    const rows = [
      ['Request ID', request.requestId],
      ['Form', request.processName || request.processType],
      ['Submitted', formatDateTime(request.createdAt)],
      ['Employee', employeeLabel(request)],
      ['Line Manager', request.lineManagerEmail],
      ['Requesting Staff Member', request.requesterEmail || request.lineManagerEmail],
      ['Status', request.statusLabel || request.status],
      ['Waiting On', request.waitingOnLabel],
      { section: 'Pre-approval request' },
      ['Overtime Date', formatDate(request.overtimeDate)],
      ['Reason', request.reason],
      ['Normally Works This Day', request.normallyWorks],
      ['Normal Work Hours', request.normallyWorks === 'Yes' ? `${request.normalStartTime} to ${request.normalFinishTime}` : 'No normal work hours'],
      [plannedTimeLabel, request.plannedStartTime ? `${request.plannedStartTime} to ${request.plannedFinishTime}` : ''],
      [plannedHoursLabel, request.plannedHours],
      ['Compensation', request.compensationMethod]
    ];

    if (request.changeComment) {
      rows.push(['Change Request', request.changeComment]);
    }
    if (request.lastEditedAt) {
      rows.push(['Last Edited', formatDateTime(request.lastEditedAt)]);
    }

    if (includeActual) {
      rows.push({ section: 'Actual hours confirmation' });
      rows.push(['Worked As Approved', request.workedAsApproved || '']);
      rows.push([isWorkdayAdjustment ? 'Actual Work Hours' : 'Actual Overtime', request.actualStartTime ? `${request.actualStartTime} to ${request.actualFinishTime}` : '']);
      rows.push([isWorkdayAdjustment ? 'Actual Overtime Hours' : 'Actual Hours', request.actualHours || '']);
      rows.push(['Meal Allowance', request.mealAllowance || '']);
      if (request.workedAsApproved === 'No') {
        rows.push(['Variation Reason', request.variationReason || '']);
      }
    }

    return `
      <table class="summary">
        <tbody>
          ${rows.filter(summaryRowHasValue).map(renderSummaryRow).join('')}
        </tbody>
      </table>
    `;
  }

  function summaryRowHasValue(row) {
    return row && row.section ? true : row[1] !== undefined && row[1] !== null && row[1] !== '';
  }

  function renderSummaryRow(row) {
    if (row && row.section) {
      return `<tr class="summary-section"><th colspan="2">${escapeHtml(row.section)}</th></tr>`;
    }
    return `<tr><th>${escapeHtml(row[0])}</th><td>${escapeHtml(row[1])}</td></tr>`;

  function requestIsWorkdayAdjustment(request) {

  function renderHistory(request) {
    const history = []
      .concat(request.approvalHistory || [])
      .concat(request.finalApprovalHistory || [])
      .concat(visibleChangeHistoryEntries(request.changeHistory || []))
      .sort((a, b) => String(a.at || '').localeCompare(String(b.at || '')));

    if (!history.length) {

    return `

    return `<p>${escapeHtml(formatDateTime(entry.at))}: ${escapeHtml(entry.stepName || 'Workflow step')}${actor} ${escapeHtml(entry.decision || '')}${target}${entry.comment ? ` - ${escapeHtml(entry.comment)}` : ''}</p>`;

  function updateConfiguredFieldVisibility() {

    if (!form) {

    form.querySelectorAll('[data-visible-when]').forEach(element => {
      const condition = parseJsonAttribute(element.dataset.visibleWhen);
      const visible = conditionMatches(condition, values);
      if (element.dataset.hoursWarning !== undefined) {
        element.dataset.conditionVisible = visible ? 'true' : 'false';
        if (!visible) {
          hideHoursWarning(element);
        }
        return;
      }
      element.classList.toggle('hidden', !visible);
      setConditionalInputsEnabled(element, visible);
      element.querySelectorAll('input, select, textarea').forEach(input => {
        const requiredWhenVisible = input.dataset.requiredWhenVisible === 'true';
        const requiredCondition = parseJsonAttribute(input.dataset.requiredCondition);
        input.required = visible && (requiredCondition ? conditionMatches(requiredCondition, values) : requiredWhenVisible);

    });

      const conditionalContainer = input.closest('[data-visible-when]');
      if (conditionalContainer && conditionalContainer.classList.contains('hidden')) {

        return;
      }
      input.required = conditionMatches(parseJsonAttribute(input.dataset.requiredCondition), values);
    });

  function configuredFormElement() {

        input.disabled = true;
        if (input.type === 'radio' || input.type === 'checkbox') {

        return;

  function collectCurrentFormValues(form) {

    if (!condition) {

    if (Array.isArray(condition)) {
      return condition.every(item => conditionMatches(item, values));
    }
    if (condition.field) {
      const actual = normalize(values[condition.field]);
      if (condition.equals !== undefined) {
        return actual === normalize(condition.equals);
      }
      if (condition.notEquals !== undefined) {
        return actual !== normalize(condition.notEquals);
      }
      if (condition.in !== undefined) {

      if (condition.notIn !== undefined) {

      if (condition.exists !== undefined) {

  function wireHoursConsistencyWarning(kind) {

    if (!warning) {
      return;
    }

    const config = hoursWarningConfig(warning);
    const start = formInputByName(config.startField);
    const finish = formInputByName(config.finishField);
    const hours = formInputByName(config.hoursField);
    if (!start || !finish) {
      return;
    }

    const watchedInputs = [start, finish].concat(hours ? [hours] : []);
    [config.modeField, config.compareWorkdayField, config.compareStartField, config.compareFinishField]
      .filter(Boolean)
      .forEach(fieldName => watchedInputs.push(...document.querySelectorAll(`[name="${cssEscape(fieldName)}"]`)));

    const update = () => updateHoursConsistencyWarning(kind, start, finish, hours, warning, config);
    watchedInputs.forEach(input => {
      input.addEventListener('input', update);
      input.addEventListener('change', update);
      input.addEventListener('blur', update);
    });
    update();
  }

  function updateHoursConsistencyWarning(kind, startInput, finishInput, hoursInput, warning, config) {
    if (!warningConditionVisible(warning)) {
      hideHoursWarning(warning);
      return;
    }

    const startMinutes = parseTimeToMinutes(startInput.value);
    const finishMinutes = parseTimeToMinutes(finishInput.value);
    if (startMinutes === null || finishMinutes === null) {
      hideHoursWarning(warning);
      return;
    }

    const sameTime = finishMinutes === startMinutes;
    let elapsedMinutes = finishMinutes - startMinutes;
    if (elapsedMinutes < 0) {
      elapsedMinutes += 24 * 60;
    }
    const elapsedHours = elapsedMinutes / 60;
    const tolerance = 0.03;
    const isComparisonMode = config.compareModeValue && normalize(currentFieldValue(config.modeField)) === normalize(config.compareModeValue);
    let message = '';

    if (isComparisonMode) {
      const normalMinutes = getComparisonMinutesForWarning(config);
      if (normalMinutes === null) {
        hideHoursWarning(warning);
        return;
      }
      const normalHours = normalMinutes / 60;
      if (sameTime) {
        message = 'Start and finish times are the same. Please check whether one of the adjusted workday times needs correcting.';
      } else if (Math.abs(elapsedHours - normalHours) > tolerance) {
        message = interpolateWarningMessage(
          config.compareWarningMessage || 'The expected duration is {expected}, but the entered duration is {actual}. Please check the start and finish times.',
          {
            expected: formatHours(normalHours),
            actual: formatHours(elapsedHours)
          }
        );
      }

      if (!message) {
        hideHoursWarning(warning);
        return;
      }
      warning.innerHTML = `<strong>${escapeHtml(config.compareWarningTitle || 'Check hours')}</strong><span>${escapeHtml(message)}</span>`;
      warning.classList.remove('hidden');
      return;
    }

    if (!inputUsableForWarning(hoursInput)) {
      hideHoursWarning(warning);
      return;
    }

    const enteredHours = Number(hoursInput.value);
    if (!Number.isFinite(enteredHours) || enteredHours <= 0) {
      hideHoursWarning(warning);
      return;
    }

    const mealBreakContext = getMealBreakContext(config, elapsedMinutes);
    const minimumMealBreakMinutes = mealBreakContext.minimumMealBreakMinutes;
    const expectedAfterMealBreak = (elapsedMinutes - minimumMealBreakMinutes) / 60;

    if (sameTime) {
      message = 'Start and finish times are the same. Please check whether one of the times or the total hours needs correcting.';
    } else if (enteredHours > elapsedHours + tolerance) {
      message = `Start to finish is ${formatHours(elapsedHours)}, but the total entered is ${formatHours(enteredHours)}. Please check the total hours.`;
    } else if (mealBreakContext.normalBreakLikelyCovered && enteredHours < elapsedHours - tolerance) {
      message = `Start to finish is ${formatHours(elapsedHours)}, but the total entered is ${formatHours(enteredHours)}. Your regular shift appears to be over 5 hours, so the first meal break may already be covered there. If you deducted an additional unpaid break during overtime, this may be correct.`;
    } else if (mealBreakContext.mealBreakSource === 'combined' && Math.abs(enteredHours - elapsedHours) <= tolerance) {
      message = `Start to finish is ${formatHours(elapsedHours)}. Your regular shift plus overtime appears to be over 5 hours. Check whether the required 30 minute unpaid meal break has already been included in your regular shift or should be deducted from the overtime total.`;
    } else if (mealBreakContext.mealBreakSource === 'overtime' && Math.abs(enteredHours - elapsedHours) <= tolerance) {
      message = `Start to finish is ${formatHours(elapsedHours)}. Because this period is over 5 hours, check that the required 30 minute unpaid meal break has been deducted. The total after that break would usually be ${formatHours(expectedAfterMealBreak)}.`;
    } else if (mealBreakContext.mealBreakSource === 'overtime' && enteredHours < expectedAfterMealBreak - tolerance) {
      message = `Start to finish is ${formatHours(elapsedHours)}. After the required 30 minute unpaid meal break the total would usually be ${formatHours(expectedAfterMealBreak)}. If you deducted additional unpaid break time, this may be correct.`;
    } else if (mealBreakContext.mealBreakSource === 'none' && Math.abs(enteredHours - elapsedHours) > tolerance) {
      message = `Start to finish is ${formatHours(elapsedHours)}, but the total entered is ${formatHours(enteredHours)}. If you deducted unpaid break time, this may be correct; otherwise please check the total.`;
    }

    if (!message) {
      hideHoursWarning(warning);
      return;
    }
    warning.innerHTML = `<strong>Check total hours</strong><span>${escapeHtml(message)}</span>`;
    warning.classList.remove('hidden');
  }

  function hoursWarningConfig(warning) {

      startField: warning.dataset.startField || `${kind}StartTime`,
      finishField: warning.dataset.finishField || `${kind}FinishTime`,
      hoursField: warning.dataset.hoursField || `${kind}Hours`,
      modeField: warning.dataset.modeField || '',

      compareWorkdayField: warning.dataset.compareWorkdayField || '',
      compareStartField: warning.dataset.compareStartField || '',
      compareFinishField: warning.dataset.compareFinishField || '',

    if (normalBreakLikelyCovered) {
      return {
        minimumMealBreakMinutes: 0,
        hasNormalShift,
        normalBreakLikelyCovered,
        mealBreakSource: 'covered'

    }
    const combinedMinutes = (hasNormalShift ? normalMinutes : 0) + overtimeMinutes;
    if (hasNormalShift) {
      return {
        minimumMealBreakMinutes: 0,
        hasNormalShift,
        normalBreakLikelyCovered,
        mealBreakSource: combinedMinutes > 5 * 60 ? 'combined' : 'none'

    const normalFinish = currentFieldValue(config.compareFinishField);
    const startMinutes = parseTimeToMinutes(normalStart);
    const finishMinutes = parseTimeToMinutes(normalFinish);

      .map(key => `${encodeURIComponent(key)}=${encodeURIComponent(query[key])}`)

  function runServer(method, payload, timeoutMs) {

        settled = true;
        window.clearTimeout(timeout);
        progressHandle.done();
        callback();

        finish(() => reject(new Error('The dashboard request did not return. This usually means the web app needs to be redeployed, the signed-in Google account is not available to Apps Script, or the deployment URL is not the current /exec web app URL.')));
      }, timeoutMs || 30000);

      storageKey,
      estimateMs

      submitVtrChecklist: 'Saving checklist...',
      submitApprovalDecision: 'Recording decision...',
      submitDashboardApprovalDecision: 'Recording decision...',
      requesterCancelRequest: 'Cancelling request...',
      adminCancelRequest: 'Cancelling request...',
      adminSendReminder: 'Sending reminder...',
      adminReassignRequest: 'Reassigning step...',
      getAdminWorkflowManagementData: 'Loading approval flows...',
      updateAdminWorkflowSettings: 'Saving workflow...'

  function progressEstimateStorageKey(method, payload) {

  function field(name, label, type, value, required, help, className, attributes, inputAttributes) {
    const step = type === 'number' ? ' step="0.01" min="0"' : '';
    const fieldValue = type === 'date' && !value ? todayDateKey() : value;
    if (type === 'date') {
      return `
        <label class="field ${className || ''}" ${attributes || ''}>
          <span>${escapeHtml(label)}</span>
          <div class="date-picker" data-date-picker>
            <input name="${escapeHtml(name)}" type="text" value="${escapeHtml(fieldValue || '')}" ${required ? 'required' : ''} ${inputAttributes || ''} readonly data-date-input>
            <div class="date-popover hidden" data-date-popover></div>
          </div>
          ${help ? `<span class="help">${escapeHtml(help)}</span>` : ''}
        </label>
      `;
    }
    if (type === 'time') {
      return `
        <label class="field ${className || ''}" ${attributes || ''}>
          <span>${escapeHtml(label)}</span>
          <div class="time-picker" data-time-picker>
            <input name="${escapeHtml(name)}" type="text" value="${escapeHtml(fieldValue || '')}" ${required ? 'required' : ''} ${inputAttributes || ''} placeholder="HH:MM" inputmode="numeric" autocomplete="off" pattern="^([01]\\d|2[0-3]):[0-5]\\d$" data-time-input>
            <div class="time-popover hidden" data-time-popover></div>
          </div>
          ${help ? `<span class="help">${escapeHtml(help)}</span>` : ''}
        </label>
      `;
    }
    return `
      <label class="field ${className || ''}" ${attributes || ''}>
        <span>${escapeHtml(label)}</span>
        <input name="${escapeHtml(name)}" type="${escapeHtml(type)}" value="${escapeHtml(fieldValue || '')}" ${required ? 'required' : ''} ${inputAttributes || ''}${step}>
        ${help ? `<span class="help">${escapeHtml(help)}</span>` : ''}
      </label>
    `;
  }

  function selectField(name, label, options, selectedValue, required, help, className, attributes, inputAttributes) {
    return `
      <label class="field ${className || ''}" ${attributes || ''}>
        <span>${escapeHtml(label)}</span>
        <select name="${escapeHtml(name)}" ${required ? 'required' : ''} ${inputAttributes || ''}>
          <option value="">Select...</option>
          ${selectOptions(options, selectedValue || '')}
        </select>
        ${help ? `<span class="help">${escapeHtml(help)}</span>` : ''}
      </label>
    `;
  }

  function renderVtrRequestSummary(request) {
    const rows = [
      ['Request ID', request.requestId],
      ['Form', request.processName || request.processType],
      ['Submitted', formatDateTime(request.createdAt)],
      ['Organiser', employeeLabel(request)],
      ['Status', request.statusLabel || request.status],
      ['Waiting On', request.waitingOnLabel],
      { section: 'VTR request details' },
      ['Event Name', request.eventName],
      ['Event Date(s)', formatVtrEventDateRange(request)],
      ['School Area', request.schoolArea],
      ['Event Type', request.eventType],
      ['Event Location', request.eventLocation],
      ['Event Times', request.eventTimes],
      ['Students Involved', request.studentsInvolved],
      ['Staff Required', request.staffRequired],
      ['Risk Assessment Required', request.riskAssessmentRequired],
      ['Logistics Notified', request.logisticsNotified],
      ['Cost To Students', request.costToStudents],
      ['Offsite Excursion', request.offsiteExcursion]
    ];

    if (request.changeComment) {
      rows.push(['Change Request', request.changeComment]);
    }
    if (request.lastEditedAt) {
      rows.push(['Last Edited', formatDateTime(request.lastEditedAt)]);
    }

    const checklistRows = [
      ['Checklist Last Saved', formatDateTime(request.checklistSubmittedAt)],
      ['Checklist Completed', formatDateTime(request.checklistCompletedAt)],
      ['Risk Assessment Completed', request.riskAssessmentCompleted],
      ['WWCC Requirements Confirmed', request.wwccConfirmed],
      ['Budget Submitted', request.budgetSubmitted],
      ['Grounds Consulted', request.groundsConsulted],
      ['IT Consulted', request.itConsulted],
      ['Grounds After Hours Notified', request.groundsAfterHoursNotified],
      ['Sport and PDHPE Consulted', request.sportPdhpeConsulted],
      ['Chaplaincy Consulted', request.chaplaincyConsulted],
      ['Canteen / Cafe Notified', request.canteenNotified],
      ['Parent Letter Checked', request.parentLetterChecked],
      ['Parent Letter Provided To Reception', request.parentLetterProvided],
      ['Staff Notified', request.staffNotified],
      ['Buses Booked', request.busesBooked],
      ['Marketing Notified', request.marketingNotified]
    ];

    if (request.offsiteExcursion === 'Yes') {
      checklistRows.push(['Attending Staff Briefed', request.attendingStaffBriefed]);
      checklistRows.push(['Medical Needs Compiled', request.medicalNeedsCompiled]);
      checklistRows.push(['Lesson Plans Left', request.lessonPlansLeft]);
      checklistRows.push(['Rolls Marked / Reception Notified', request.rollsMarkedReceptionNotified]);
    }

    if (checklistRows.some(summaryRowHasValue)) {
      rows.push({ section: 'VTR checklist' });
      rows.push(...checklistRows);
    }

    return `
      <table class="summary">
        <tbody>
          ${rows.filter(summaryRowHasValue).map(renderSummaryRow).join('')}
        </tbody>
      </table>
    `;
  }

  function enhanceDatePickers() {
    document.querySelectorAll('[data-date-picker]').forEach(picker => {
      if (picker.dataset.bound === 'true') {
        return;
      }
      picker.dataset.bound = 'true';
      const input = picker.querySelector('[data-date-input]');

      input.addEventListener('click', event => {
        event.stopPropagation();
        openDatePicker(picker);
      });
      input.addEventListener('focus', () => openDatePicker(picker));
    });

    if (!window.datePickerGlobalBound) {
      window.datePickerGlobalBound = true;
      document.addEventListener('click', () => closeDatePickers());
      document.addEventListener('keydown', event => {
        if (event.key === 'Escape') {
          closeDatePickers();
        }
      });
    }
  }

  function openDatePicker(picker) {
    closeDatePickers(picker);
    const input = picker.querySelector('[data-date-input]');
    const date = parseDateKey(input.value) || new Date();
    const monthDate = new Date(date.getFullYear(), date.getMonth(), 1);
    picker.dataset.visibleMonth = dateKey(monthDate);
    renderDatePicker(picker);
    picker.querySelector('[data-date-popover]').classList.remove('hidden');
  }

  function closeDatePickers(except) {
    document.querySelectorAll('[data-date-picker]').forEach(picker => {
      if (except && picker === except) {
        return;
      }
      picker.querySelector('[data-date-popover]').classList.add('hidden');
    });
  }

  function enhanceTimePickers() {
    document.querySelectorAll('[data-time-picker]').forEach(picker => {
      if (picker.dataset.bound === 'true') {
        return;
      }
      picker.dataset.bound = 'true';
      const input = picker.querySelector('[data-time-input]');

      input.addEventListener('click', event => {
        event.stopPropagation();
        openTimePicker(picker);
      });
      input.addEventListener('focus', () => openTimePicker(picker));
      input.addEventListener('input', () => {
        normalizeTimeInputSoft(input);
        if (!picker.querySelector('[data-time-popover]').classList.contains('hidden')) {
          renderTimePicker(picker);
        }
      });
      input.addEventListener('blur', () => {
        input.value = normalizeTimeValue(input.value);
      });
    });

    if (!window.timePickerGlobalBound) {
      window.timePickerGlobalBound = true;
      document.addEventListener('click', () => closeTimePickers());
      document.addEventListener('keydown', event => {
        if (event.key === 'Escape') {
          closeTimePickers();
        }
      });
    }
  }

  function openTimePicker(picker) {
    closeTimePickers(picker);
    renderTimePicker(picker);
    picker.querySelector('[data-time-popover]').classList.remove('hidden');
  }

  function closeTimePickers(except) {
    document.querySelectorAll('[data-time-picker]').forEach(picker => {
      if (except && picker === except) {
        return;
      }
      picker.querySelector('[data-time-popover]').classList.add('hidden');
    });
  }

  function renderTimePicker(picker) {
    const input = picker.querySelector('[data-time-input]');
    const popover = picker.querySelector('[data-time-popover]');
    const selected = normalizeTimeValue(input.value);
    const options = [];
    const optionMinutes = [];
    for (let minutes = 5 * 60; minutes < 24 * 60; minutes += 15) {
      optionMinutes.push(minutes);
    }
    for (let minutes = 0; minutes < 5 * 60; minutes += 15) {
      optionMinutes.push(minutes);
    }
    optionMinutes.forEach(minutes => {
      const value = minutesToTime(minutes);
      options.push(`<button class="time-option ${value === selected ? 'selected' : ''}" type="button" data-time-option="${value}">${value}</button>`);
    });
    popover.innerHTML = `
      <div class="time-options">
        ${options.join('')}
      </div>
      <div class="time-popover-actions">
        <button class="button primary time-confirm" type="button" data-time-confirm>OK</button>
      </div>
    `;
    popover.querySelectorAll('[data-time-option]').forEach(button => {
      button.addEventListener('click', event => {
        event.preventDefault();
        event.stopPropagation();
        input.value = event.currentTarget.dataset.timeOption;
        input.dispatchEvent(new Event('change', { bubbles: true }));
        popover.querySelectorAll('[data-time-option]').forEach(option => {
          option.classList.toggle('selected', option === event.currentTarget);
        });
      });
    });
    popover.querySelector('[data-time-confirm]').addEventListener('click', event => {
      event.preventDefault();
      event.stopPropagation();
      input.value = normalizeTimeValue(input.value);
      input.dispatchEvent(new Event('change', { bubbles: true }));
      closeTimePickers();
    });
    const selectedButton = popover.querySelector('.time-option.selected');
    if (selectedButton) {
      selectedButton.scrollIntoView({ block: 'center' });
    }
  }

  function normalizeTimeInputSoft(input) {
    input.value = input.value.replace(/[^\d:]/g, '').slice(0, 5);
  }

  function normalizeTimeValue(value) {
    const text = String(value || '').trim();
    const compact = text.match(/^(\d{1,2})(\d{2})$/);
    const colon = text.match(/^(\d{1,2}):(\d{1,2})$/);
    const match = colon || compact;
    if (!match) {
      return text;
    }
    const hours = Number(match[1]);
    const minutes = Number(match[2]);
    if (hours < 0 || hours > 23 || minutes < 0 || minutes > 59) {
      return text;
    }
    return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
  }

  function parseTimeToMinutes(value) {
    const normalized = normalizeTimeValue(value);
    const match = String(normalized || '').match(/^([01]\d|2[0-3]):([0-5]\d)$/);
    if (!match) {
      return null;
    }
    return Number(match[1]) * 60 + Number(match[2]);
  }

  function formatHours(value) {
    const rounded = Math.round(Number(value) * 100) / 100;
    const text = Number.isInteger(rounded) ? String(rounded) : String(rounded.toFixed(2)).replace(/0+$/, '').replace(/\.$/, '');
    return `${text} ${rounded === 1 ? 'hour' : 'hours'}`;
  }

  function formatDuration(milliseconds) {
    const ms = Math.max(0, Number(milliseconds) || 0);
    if (ms < 1000) {
      return `${Math.round(ms)}ms`;
    }
    return `${(ms / 1000).toFixed(ms < 10000 ? 1 : 0)}s`;
  }

  function minutesToTime(minutes) {
    const hours = Math.floor(minutes / 60);
    const mins = minutes % 60;
    return `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}`;
  }

  function renderDatePicker(picker) {
    const input = picker.querySelector('[data-date-input]');
    const popover = picker.querySelector('[data-date-popover]');
    const selected = parseDateKey(input.value) || new Date();
    const visible = parseDateKey(picker.dataset.visibleMonth) || new Date();
    const monthStart = new Date(visible.getFullYear(), visible.getMonth(), 1);
    const firstGridDate = new Date(monthStart);
    firstGridDate.setDate(firstGridDate.getDate() - ((monthStart.getDay() + 6) % 7));
    const todayKeyValue = todayDateKey();
    const selectedKey = dateKey(selected);
    const monthLabel = new Intl.DateTimeFormat(undefined, { month: 'long', year: 'numeric' }).format(monthStart);
    const weekdays = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    const days = [];

    for (let index = 0; index < 42; index += 1) {
      const current = new Date(firstGridDate);
      current.setDate(firstGridDate.getDate() + index);
      const key = dateKey(current);
      const classes = [
        'calendar-day',
        current.getMonth() === monthStart.getMonth() ? '' : 'outside',
        key === todayKeyValue ? 'today' : '',
        key === selectedKey ? 'selected' : ''
      ].filter(Boolean).join(' ');
      days.push(`<button class="${classes}" type="button" data-date-option="${key}">${current.getDate()}</button>`);
    }

    popover.innerHTML = `
      <div class="calendar-head">
        <button type="button" data-date-nav="-1" aria-label="Previous month">&lt;</button>
        <strong>${escapeHtml(monthLabel)}</strong>
        <button type="button" data-date-nav="1" aria-label="Next month">&gt;</button>
      </div>
      <div class="calendar-grid calendar-weekdays">
        ${weekdays.map(day => `<span>${day}</span>`).join('')}
      </div>
      <div class="calendar-grid">
        ${days.join('')}
      </div>
    `;

    popover.querySelectorAll('[data-date-nav]').forEach(button => {
      button.addEventListener('click', event => {
        event.preventDefault();
        event.stopPropagation();
        const offset = Number(event.currentTarget.dataset.dateNav);
        const next = new Date(monthStart.getFullYear(), monthStart.getMonth() + offset, 1);
        picker.dataset.visibleMonth = dateKey(next);
        renderDatePicker(picker);
      });
    });

    popover.querySelectorAll('[data-date-option]').forEach(button => {
      button.addEventListener('click', event => {
        event.preventDefault();
        event.stopPropagation();
        input.value = event.currentTarget.dataset.dateOption;
        input.dispatchEvent(new Event('change', { bubbles: true }));
        closeDatePickers();
      });
    });
  }

  function todayDateKey() {
    const today = new Date();
    const year = today.getFullYear();
    const month = String(today.getMonth() + 1).padStart(2, '0');
    const day = String(today.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }

  function dateKey(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }

  function parseDateKey(value) {
    const parts = String(value || '').split('-').map(Number);
    if (parts.length !== 3 || parts.some(part => !Number.isFinite(part))) {
      return null;
    }
    const date = new Date(parts[0], parts[1] - 1, parts[2]);
    return Number.isNaN(date.getTime()) ? null : date;
  }

  function optionValue(option) {
    if (option && typeof option === 'object') {
      return String(option.value || option.label || '');
    }
    return String(option || '');
  }

  function optionLabel(option) {
    if (option && typeof option === 'object') {
      return String(option.label || option.value || '');
    }
    return String(option || '');
  }

  function radio(name, value, checked, inputAttributes, required) {
    return `
      <label class="choice">
        <input type="radio" name="${escapeHtml(name)}" value="${escapeHtml(value)}" ${checked ? 'checked' : ''} ${required ? 'required' : ''} ${inputAttributes || ''}>
        <span>${escapeHtml(value)}</span>
      </label>
    `;
  }

  function choiceCardOption(name, option, selectedValue, inputAttributes, required, request) {
    const value = optionValue(option);
    const label = optionLabel(option);
    const summary = option && typeof option === 'object' ? option.summary : '';
    const detailHtml = option && typeof option === 'object' ? option.detailHtml : '';
    const visibleWhen = option && typeof option === 'object' ? option.visibleWhen : null;
    const visible = visibleWhen ? conditionMatches(visibleWhen, Object.assign({}, request || {})) : true;
    const conditionalAttributes = visibleWhen ? `data-visible-when="${escapeHtml(JSON.stringify(visibleWhen))}"` : '';
    const optionClass = ['compensation-option', visibleWhen ? 'conditional-field' : '', visible ? '' : 'hidden'].filter(Boolean).join(' ');
    const checked = value === selectedValue;
    return `
      <div class="${optionClass} ${checked && visible ? 'selected' : ''}" ${conditionalAttributes}>
        <label>
          <input type="radio" name="${escapeHtml(name)}" value="${escapeHtml(value)}" ${checked ? 'checked' : ''} ${required ? 'required' : ''} ${inputAttributes || ''} ${visible ? '' : 'disabled data-conditional-disabled="true"'}>
          <span>
            <strong>${escapeHtml(label)}</strong>
            ${summary ? `<small>${escapeHtml(summary)}</small>` : ''}
          </span>
        </label>
        ${detailHtml ? `<button class="button secondary" type="button" data-compensation-details>Details</button>` : ''}
        ${detailHtml ? `<div class="compensation-detail hidden">${detailHtml}</div>` : ''}
      </div>
    `;
  }

  function selectOptions(options, selectedValue) {
    return options
      .map(option => {
        const value = optionValue(option);
        return `<option value="${escapeHtml(value)}" ${value === selectedValue ? 'selected' : ''}>${escapeHtml(optionLabel(option))}</option>`;
      })
      .join('');
  }

  function employeeLabel(request) {
    if (!request.employeeName && !request.employeeEmail) {
      return '';
    }
    return `${request.employeeName || ''}${request.employeeEmail ? ` <${request.employeeEmail}>` : ''}`;
  }

  function requestDisplayDate(request) {
    if (request && request.processType === 'vtr') {
      return vtrEventStartDate(request);
    }
    return request.eventDate || request.overtimeDate || '';
  }

  function requestDisplayDateLabel(request) {
    if (request && request.processType === 'vtr') {
      return formatVtrEventDateRange(request);
    }
    return formatDate(requestDisplayDate(request));
  }

  function vtrEventStartDate(request) {
    return (request && (request.eventStartDate || request.eventDate)) || '';
  }

  function vtrEventEndDate(request) {
    return (request && (request.eventEndDate || request.eventDate || request.eventStartDate)) || '';
  }

  function formatVtrEventDateRange(request) {
    const start = vtrEventStartDate(request);
    const end = vtrEventEndDate(request);
    if (start && end && start !== end) {
      return `${formatDate(start)} to ${formatDate(end)}`;
    }
    return formatDate(start || end);
  }

  function showNotice(message, type) {
    notice.hidden = false;
    notice.className = `notice ${type || ''}`;
    notice.textContent = message;
    notice.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function clearNotice() {
    notice.hidden = true;
    notice.className = 'notice';
    notice.textContent = '';
  }

  function formatDate(value) {
    if (!value) return '';
    const parts = String(value).split('-');
    if (parts.length !== 3) return value;
    const date = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    return new Intl.DateTimeFormat('en-AU', {
      day: 'numeric',
      month: 'long',
      year: 'numeric'
    }).format(date);
  }

  function formatDateTime(value) {
    if (!value) return '';
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return value;
    return new Intl.DateTimeFormat('en-AU', {
      day: 'numeric',
      month: 'short',
      year: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    }).format(date);
  }

  function escapeHtml(value) {
    return String(value === null || value === undefined ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
</script>
