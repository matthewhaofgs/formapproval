  function renderWorkflowFollowUpControls(step, isBlockingStep, formStages) {
    const selectedStage = step.followUpStage || '';
    const stages = (formStages || []).filter(stage => stage && stage.key && stage.canBeFollowUp !== false);
    return `
      <details class="workflow-optional-panel" data-workflow-follow-up-panel ${isBlockingStep ? '' : 'hidden'}>
        <summary>Stage trigger</summary>
        <div class="workflow-step-grid">
          <label class="field workflow-span-2">
            <span>Start follow-up stage after this step</span>
            <select data-step-field="followUpStage" ${stages.length || selectedStage ? '' : 'disabled'}>
              ${workflowFollowUpStageOptions(stages, selectedStage)}
            </select>
          </label>
        </div>
        <p class="workflow-condition-note">Follow-up stages are defined in the form builder. Only stages with workflow trigger behavior and a supported runtime can be started from an approval step.</p>
      </details>
    `;
  }

  function workflowFollowUpStageOptions(formStages, selected) {
    const selectedValue = String(selected || '').trim();
    const stageList = (formStages || []).filter(stage => stage && stage.key);
    const hasSelected = !selectedValue || stageList.some(stage => stage.key === selectedValue);
    const list = hasSelected ? stageList : [{ key: selectedValue, label: selectedValue, description: 'Saved stage not currently listed on this form.' }].concat(stageList);
    return '<option value="">Do not start a form stage</option>' + list.map(stage => {
      const labelParts = [stage.label || stage.key];
      if (stage.runtimeType) {
        labelParts.push(stage.runtimeType);
      }
      if (stage.triggerMode) {
        labelParts.push(stage.triggerMode);
      }
      return `<option value="${escapeHtml(stage.key)}" title="${escapeHtml(stage.description || '')}" ${stage.key === selectedValue ? 'selected' : ''}>${escapeHtml(labelParts.join(' - '))}</option>`;
    }).join('');
  }

  function workflowRecipientFieldOptions(recipientFields, selected) {
    const selectedList = Array.isArray(selected)
      ? selected.map(item => String(item || '').trim()).filter(Boolean)
      : [String(selected || '').trim()].filter(Boolean);
    const selectedSet = selectedList.reduce((map, item) => {
      map[item] = true;
      return map;
    }, {});
    const fields = recipientFields && recipientFields.length
      ? recipientFields
      : [
        { name: 'employeeEmail', label: 'Employee email' },
        { name: 'requesterEmail', label: 'Requester email' },
        { name: 'lineManagerEmail', label: 'Line manager email' }
      ];
    const list = selectedList
      .filter(name => !fields.some(field => field.name === name))
      .map(name => ({ name, label: name }))
      .concat(fields);
    return list.map(field => {
      const label = field.group ? `${field.label || field.name} (${field.group})` : (field.label || field.name);
      return `<option value="${escapeHtml(field.name)}" ${selectedSet[field.name] ? 'selected' : ''}>${escapeHtml(label)}</option>`;
    }).join('');
  }

  function workflowRecipientMode(step, type) {
    const normalized = step || {};
    const hasEmail = Boolean(normalized.email);
    const hasEmailField = Boolean(normalized.emailField);
    const hasEmails = Array.isArray(normalized.emails)
      ? normalized.emails.length > 0
      : Boolean(String(normalized.emails || '').trim());
    const hasEmailFields = Array.isArray(normalized.emailFields)
      ? normalized.emailFields.length > 0
      : Boolean(String(normalized.emailFields || '').trim());
    const sources = [hasEmail, hasEmailField, hasEmails, hasEmailFields].filter(Boolean).length;
    if (sources > 1) {
      return 'advanced';
    }
    if (hasEmailField) {
      return 'request-field';
    }
    if (hasEmails) {
      return 'fixed-emails';
    }
    if (hasEmailFields) {
      return 'request-fields';
    }
    if (hasEmail) {
      return 'fixed-email';
    }
    return normalizeWorkflowEditorStepType(type) === 'notification' ? 'fixed-emails' : 'request-field';
  }

  function workflowRecipientModeOptions(type, selected) {
    const blocking = isWorkflowEditorBlockingType(type);
    const options = [
      ['fixed-email', 'One email address', true],
      ['request-field', 'Email from request field', true],
      ['fixed-emails', 'Multiple email addresses', !blocking],
      ['request-fields', 'Multiple request fields', !blocking],
      ['advanced', 'Advanced mixed recipients', !blocking || selected === 'advanced']
    ];
    return options
      .filter(option => option[2] || option[0] === selected)
      .map(option => `<option value="${option[0]}" ${option[0] === selected ? 'selected' : ''}>${escapeHtml(option[1])}</option>`)
      .join('');
  }

  function workflowRecipientHelp(type) {
    return isWorkflowEditorBlockingType(type)
      ? 'This step waits for one person.'
      : 'Notifications can go to one or more people.';
  }

  function normalizeWorkflowEditorStepType(type) {
    const normalized = normalize(type || 'notification');
    return ['approval', 'acknowledgement', 'action', 'notification'].indexOf(normalized) !== -1
      ? normalized
      : 'notification';
  }

  function isWorkflowEditorBlockingType(type) {
    const normalized = normalizeWorkflowEditorStepType(type);
    return normalized === 'approval' || normalized === 'acknowledgement' || normalized === 'action';
  }

  function workflowStepPreview(step) {
    const recipients = [];
    if (step.email) {
      recipients.push(step.email);
    }
    if (step.emailField) {
      recipients.push(step.emailField);
    }
    if (Array.isArray(step.emails) && step.emails.length) {
      recipients.push(`${step.emails.length} fixed emails`);
    }
    if (Array.isArray(step.emailFields) && step.emailFields.length) {
      recipients.push(`${step.emailFields.length} request fields`);
    }
    if (Array.isArray(step.ccEmails) && step.ccEmails.length) {
      recipients.push(`cc ${step.ccEmails.length}`);
    }
    const parts = [`Recipients: ${recipients.length ? recipients.join(', ') : 'not set'}`];
    const subject = step.effectiveSubject || step.subject || step.defaultSubject || '';
    if (subject) {
      parts.push(`Email: ${workflowEmailCopyMode(step)} - ${subject}`);
    }
    if (isWorkflowEditorBlockingType(step.type) && step.waitingLabel) {
      parts.push('dashboard text set');
    }
    if (isWorkflowEditorBlockingType(step.type) && step.requireComment) {
      parts.push('notes required');
    }
    if (step.whenJson) {
      parts.push('conditional');
    }
    if (step.unlessJson) {
      parts.push('has skip rule');
    }
    if (step.followUpStage) {
      parts.push(`starts ${step.followUpStage}`);
    }
    return parts.join(' | ');
  }

  function workflowDefaultWaitingLabelTemplate() {
    return '{Step name} <{Step email}> to {Action}';
  }

  function workflowWaitingLabelPreview(step) {
    const normalized = step || {};
    const template = String(normalized.waitingLabel || '').trim();
    if (!template) {
      return 'Waiting message is required.';
    }
    return renderWorkflowWaitingLabelTemplate(template, {
      'Step name': normalized.name || 'Workflow owner',
      'Step email': workflowRecipientPreviewValue(normalized),
      Action: workflowEditorActionVerb(normalized.type),
      'Employee name': 'Alex Organiser',
      'Employee email': 'organiser@example.edu',
      'Request ID': 'OT-20260624-ABCDE'
    });
  }

  function renderWorkflowWaitingLabelTemplate(template, values) {
    return String(template || '').replace(/\{(Step name|Step email|Action|Employee name|Employee email|Request ID)\}/g, (match, key) => values[key] || '');
  }

  function workflowRecipientPreviewValue(step) {
    if (step.email) {
      return step.email;
    }
    if (step.emailField) {
      return workflowSampleEmailForField(step.emailField);
    }
    if (Array.isArray(step.emails) && step.emails.length) {
      return step.emails[0];
    }
    if (Array.isArray(step.emailFields) && step.emailFields.length) {
      return workflowSampleEmailForField(step.emailFields[0]);
    }
    return 'recipient@example.edu';
  }

  function workflowSampleEmailForField(field) {
    const samples = {
      employeeEmail: 'organiser@example.edu',
      lineManagerEmail: 'linemanager@example.edu',
      requesterEmail: 'requester@example.edu'
    };
    return samples[field] || 'recipient@example.edu';
  }

  function workflowEditorActionVerb(type) {
    const normalized = normalizeWorkflowEditorStepType(type);
    if (normalized === 'acknowledgement') {
      return 'acknowledge';
    }
    if (normalized === 'action') {
      return 'complete action';
    }
    return 'approve';
  }

  function workflowEmailCopyMode(step) {
    const mode = String((step && step.emailCopyMode) || '').trim().toLowerCase();
    if (mode === 'custom') {
      return 'custom';
    }
    if (mode === 'partial') {
      return 'custom with defaults';
    }
    if (step && (step.subject || step.message) && (step.defaultSubject || step.defaultMessage)) {
      return 'custom with defaults';
    }
    if (step && (step.subject || step.message)) {
      return 'custom';
    }
    return 'default';
  }

  function renderWorkflowEmailCopyPreview(step) {
    const normalized = step || {};
    const subject = normalized.effectiveSubject || normalized.subject || normalized.defaultSubject || '';
    const message = normalized.effectiveMessage || normalized.message || normalized.defaultMessage || '';
    const subjectLine = normalized.effectiveSubjectLine || (subject ? `{Request ID}: ${subject.toLowerCase()}` : '');
    const mode = workflowEmailCopyMode(normalized);
    return `
      <div class="workflow-email-preview" data-effective-email-copy>
        <div class="workflow-email-preview-heading">
          <strong>${escapeHtml(mode === 'default' ? 'Using generated default email copy' : 'Custom email copy active')}</strong>
          <span>${escapeHtml(mode)}</span>
        </div>
        <dl>
          <div>
            <dt>Outgoing subject</dt>
            <dd>${escapeHtml(subjectLine || 'Not set')}</dd>
          </div>
          <div>
            <dt>Message opening</dt>
            <dd>${escapeHtml(message || 'Not set')}</dd>
          </div>
        </dl>
      </div>
    `;

  function renderConditionBuilder(fieldName, label, jsonText, conditionFields, emptyText) {
    const parsed = workflowConditionRowsFromJson(jsonText);
    return `
      <fieldset class="workflow-condition-builder workflow-span-2" data-condition-builder="${escapeHtml(fieldName)}" data-condition-fields="${escapeHtml(JSON.stringify(conditionFields || []))}">
        <legend>${escapeHtml(label)}</legend>
        <textarea class="visually-hidden" tabindex="-1" data-step-field="${escapeHtml(fieldName)}" data-condition-raw>${escapeHtml(parsed.raw || jsonText || '')}</textarea>
        <div class="workflow-condition-toolbar">
          <label class="field">
            <span>Match</span>
            <select data-condition-mode>
              <option value="all" ${parsed.mode === 'all' ? 'selected' : ''}>All conditions</option>
              <option value="any" ${parsed.mode === 'any' ? 'selected' : ''}>Any condition</option>
            </select>
          </label>
          <button class="button secondary" type="button" data-add-condition-row>Add condition</button>
        </div>
        ${parsed.raw ? '<p class="workflow-condition-note">This condition is preserved but cannot be shown as picker rows. Add a new condition to replace it.</p>' : ''}
        <div class="workflow-condition-list" data-condition-row-list>
          ${parsed.rows.map(row => renderConditionRow(row, conditionFields)).join('')}
          <p class="admin-empty" data-condition-empty ${parsed.rows.length ? 'hidden' : ''}>${escapeHtml(emptyText || 'No condition. This step always runs.')}</p>
        </div>
      </fieldset>
    `;
  }

  function workflowConditionRowsFromJson(jsonText) {
    const text = String(jsonText || '').trim();
    if (!text) {
      return { mode: 'all', rows: [], raw: '' };
    }
    try {
      const parsed = JSON.parse(text);
      let mode = 'all';
      let conditions = [];
      if (Array.isArray(parsed)) {
        conditions = parsed;
      } else if (parsed && Array.isArray(parsed.any)) {
        mode = 'any';
        conditions = parsed.any;
      } else if (parsed && Array.isArray(parsed.all)) {
        conditions = parsed.all;
      } else if (parsed && typeof parsed === 'object') {
        conditions = [parsed];
      }
      const rows = conditions.map(conditionRowFromObject).filter(Boolean);
      if (rows.length !== conditions.length) {
        return { mode, rows: [], raw: text };
      }
      return { mode, rows, raw: '' };
    } catch (error) {
      return { mode: 'all', rows: [], raw: text };
    }
  }

  function conditionRowFromObject(condition) {
    if (!condition || !condition.field) {
      return null;
    }
    if (condition.exists !== undefined) {
      return {
        field: condition.field,
        operator: condition.exists ? 'exists' : 'notExists',
        value: ''
      };
    }
    if (condition.notEquals !== undefined) {
      return { field: condition.field, operator: 'notEquals', value: condition.notEquals };
    }
    if (condition.in !== undefined) {
      return { field: condition.field, operator: 'in', value: [].concat(condition.in).join(', ') };
    }
    if (condition.notIn !== undefined) {
      return { field: condition.field, operator: 'notIn', value: [].concat(condition.notIn).join(', ') };
    }
    if (condition.equals !== undefined) {
      return { field: condition.field, operator: 'equals', value: condition.equals };
    }
    if (condition.is !== undefined) {
      return { field: condition.field, operator: 'equals', value: condition.is };
    }
    if (condition.value !== undefined) {
      return { field: condition.field, operator: 'equals', value: condition.value };
    }
    return { field: condition.field, operator: 'exists', value: '' };
  }

  function renderConditionRow(row, conditionFields) {
    const selectedField = row && row.field ? row.field : '';
    const operator = row && row.operator ? row.operator : 'equals';
    return `
      <div class="workflow-condition-row" data-condition-row>
        <label class="field">
          <span>Field</span>
          <select data-condition-field>
            ${conditionFieldOptions(conditionFields, selectedField)}
          </select>
        </label>
        <label class="field">
          <span>Operator</span>
          <select data-condition-operator>
            ${conditionOperatorOptions(operator)}
          </select>
        </label>
        <label class="field" data-condition-value-wrap>
          ${conditionValueControl(selectedField, operator, row ? row.value : '', conditionFields)}
        </label>
        <button class="button secondary" type="button" data-remove-condition-row>Remove</button>
      </div>
    `;
  }

  function conditionFieldOptions(conditionFields, selected) {
    const fields = conditionFields && conditionFields.length
      ? conditionFields
      : [{ name: selected || 'requesterEmail', label: selected || 'requesterEmail', options: [] }];
    const hasSelected = !selected || fields.some(field => field.name === selected);
    const list = hasSelected ? fields : [{ name: selected, label: selected, options: [] }].concat(fields);
    return list.map(field => {
      const values = JSON.stringify(field.options || []);
      const label = field.group ? `${field.label || field.name} (${field.group})` : (field.label || field.name);
      return `<option value="${escapeHtml(field.name)}" data-values="${escapeHtml(values)}" ${field.name === selected ? 'selected' : ''}>${escapeHtml(label)}</option>`;
    }).join('');
  }

  function conditionOperatorOptions(selected) {
    const options = [
      ['equals', 'Equals'],
      ['notEquals', 'Does not equal'],
      ['in', 'Is one of'],
      ['notIn', 'Is not one of'],
      ['exists', 'Has any value'],
      ['notExists', 'Is blank']
    ];
    return options.map(([value, label]) => {
      return `<option value="${value}" ${value === selected ? 'selected' : ''}>${escapeHtml(label)}</option>`;
    }).join('');
  }

  function conditionValueControl(fieldName, operator, value, conditionFields) {
    const values = conditionFieldValues(fieldName, conditionFields);
    const needsValue = ['equals', 'notEquals', 'in', 'notIn'].indexOf(operator) !== -1;
    if (!needsValue) {
      return `
        <span>Value</span>
        <input type="text" data-condition-value value="" disabled placeholder="No value needed">
      `;
    }
    if (values.length && (operator === 'equals' || operator === 'notEquals')) {
      return `
        <span>Value</span>
        <select data-condition-value>
          <option value=""></option>
          ${values.map(option => `<option value="${escapeHtml(option)}" ${String(value) === String(option) ? 'selected' : ''}>${escapeHtml(option)}</option>`).join('')}
        </select>
      `;
    }
    if (values.length && (operator === 'in' || operator === 'notIn')) {
      const selectedValues = splitWorkflowList(value);
      return `
        <span>Values</span>
        <select multiple size="${Math.min(Math.max(values.length, 2), 5)}" data-condition-value>
          ${values.map(option => `<option value="${escapeHtml(option)}" ${selectedValues.indexOf(normalize(option)) !== -1 ? 'selected' : ''}>${escapeHtml(option)}</option>`).join('')}
        </select>
      `;
    }
    return `
      <span>${operator === 'in' || operator === 'notIn' ? 'Values' : 'Value'}</span>
      <input type="text" data-condition-value value="${escapeHtml(value || '')}" ${operator === 'in' || operator === 'notIn' ? 'placeholder="Value one, value two"' : ''}>
    `;
  }

  function conditionFieldValues(fieldName, conditionFields) {
    const field = (conditionFields || []).find(item => item.name === fieldName);
    return field && Array.isArray(field.options) ? field.options : [];
  }

  function workflowStepTypeOptions(selected) {
    return ['approval', 'acknowledgement', 'action', 'notification'].map(type => {
      return `<option value="${type}" ${type === selected ? 'selected' : ''}>${escapeHtml(workflowStepTypeLabel(type))}</option>`;
    }).join('');
  }

  function workflowStepTypeLabel(type) {
    const labels = {
      approval: 'Approval',
      acknowledgement: 'Acknowledgement',
      action: 'Action',
      notification: 'Notification'
    };
    return labels[type] || type;
  }

  function workflowStageLabelFromKey(key, stages) {
    const stage = (stages || []).find(item => item.key === key);
    if (stage) {
      return stage.label || stage.key;
    }
    if (key === 'final') {
      return 'Final approval';
    }
    if (key === 'checklist') {
      return 'Checklist completion';
    }
    return key;
  }

  function workflowStageHelp(stage) {
    if (stage === 'approval') {
      return 'Runs after the initial request is submitted.';
    }
    if (stage === 'final') {
      return 'Runs after actual hours are submitted.';
    }
    if (stage === 'checklist') {
      return 'Runs when the post-approval checklist is completed.';
    }
    return 'Runs when this workflow stage is started.';
  }

  function renderAdminDashboardContext(data) {
    const selectedName = data.selectedProcessName || data.selectedProcess || 'Admin section';
    const selectedKey = data.selectedProcess || '';
    const exportHref = selectedKey ? `/admin/export/${encodeURIComponent(selectedKey)}.xlsx` : '';
    return `
      <div class="dashboard-context">
        <div class="dashboard-context-copy">
          <span>Admin dashboard</span>
          <strong>${escapeHtml(selectedName)}</strong>
          ${selectedKey ? `<em>${escapeHtml(selectedKey)}</em>` : ''}
        </div>
        <div class="dashboard-context-actions">
          ${exportHref ? `<a class="button primary" href="${escapeHtml(exportHref)}" data-admin-export download>Download Excel</a>` : ''}
          <a class="button secondary" href="${escapeHtml(appUrl('dashboard', { role: 'admin' }))}" data-admin-process-chooser>Change form</a>
        </div>
      </div>
      ${renderAdminDatabaseStatus(data)}
    `;
  }

  function renderAdminDatabaseStatus(data) {
    const database = data && data.database ? data.database : {};
    if (!database.spreadsheetId) {
      return '';
    }
    const expected = database.configuredSpreadsheetId || '';
    const mismatch = Boolean(expected && database.spreadsheetId !== expected);
    const sheetSummary = (database.sheets || [])
      .map(sheet => `${sheet.name}: ${sheet.rows}`)
      .join(', ');
    const performance = data && data.performance ? data.performance : {};
    const performanceSummary = performance.totalMs !== undefined
      ? `${formatDuration(performance.totalMs)} server`
      : '';
    const slowestPhase = Array.isArray(performance.phases) && performance.phases.length
      ? performance.phases.slice().sort((a, b) => Number(b.durationMs || 0) - Number(a.durationMs || 0))[0]
      : null;
    const slowestSummary = slowestPhase
      ? `${slowestPhase.label}: ${formatDuration(slowestPhase.durationMs)}`
      : '';
    const summaryLabel = mismatch ? 'System details - attention needed' : 'System details';
    return `
      <details class="database-status ${mismatch ? 'warning' : ''}">
        <summary>${escapeHtml(summaryLabel)}</summary>
        <div class="database-status-content">
          <strong>Database</strong>
          <span>${escapeHtml(database.spreadsheetId)}</span>
          <span>${escapeHtml(database.source || '')}</span>
          ${database.appVersion ? `<span>${escapeHtml(database.appVersion)}</span>` : ''}
          ${performanceSummary ? `<span>${escapeHtml(performanceSummary)}</span>` : ''}
          ${slowestSummary ? `<span>${escapeHtml(slowestSummary)}</span>` : ''}
          ${sheetSummary ? `<small>${escapeHtml(sheetSummary)}</small>` : ''}
          ${mismatch ? '<em>Configured spreadsheet ID does not match the spreadsheet being read.</em>' : ''}
        </div>
      </details>
    `;
  }

  function renderDashboardFilter(total) {
    return `
      <div class="dashboard-filter">

        </div>

  function renderRequestSection(title, requests, role, options) {
    const sectionOptions = options || {};
    if (!requests.length) {
      if (sectionOptions.collapsible) {
        return `
          <details class="dashboard-section" data-request-section ${sectionOptions.open ? 'open' : ''}>
            <summary>
              <div>
                <h3>${escapeHtml(title)}</h3>
                <span class="request-meta"><span data-section-visible-count>0</span> requests</span>
              </div>
              <span class="dashboard-section-toggle"></span>
            </summary>

          </details>

      }
      return `
        <div class="stack">
          <h3>${escapeHtml(title)}</h3>
          <p class="muted">No requests in this section.</p>
        </div>
      `;
    }

    if (sectionOptions.collapsible) {
      return `
        <details class="dashboard-section" data-request-section ${sectionOptions.open ? 'open' : ''}>
          <summary>
            <div>
              <h3>${escapeHtml(title)}</h3>
              <span class="request-meta"><span data-section-visible-count>${escapeHtml(String(requests.length))}</span> requests</span>
            </div>
            <span class="dashboard-section-toggle"></span>
          </summary>
          <div class="dashboard-section-body">
            <div class="request-list">
              ${requests.map(request => renderDashboardRequest(request, role, false)).join('')}
            </div>
            <p class="muted hidden" data-section-empty>No matching requests in this section.</p>
          </div>
        </details>
      `;
    }

    return `
      <div class="stack">
        <h3>${escapeHtml(title)}</h3>
        <div class="request-list">
          ${requests.map(request => renderDashboardRequest(request, role, false)).join('')}
        </div>
      </div>
    `;
  }

  function renderDashboardRequest(request, role, open) {
    const includeActual = request.processType === 'overtime' && Boolean(request.actualSubmittedAt || request.actualHours || request.status === 'PENDING_FINAL_APPROVAL' || request.status === 'FINAL_APPROVED' || request.status === 'FINAL_DENIED');
    const badgeClass = request.statusTone || (request.isStopped ? 'stopped' : (request.isClosed ? 'closed' : 'pending'));
    const itemClass = request.isStopped ? ' stopped' : '';
    const requestHtml = `
      <details class="request-item${itemClass}" ${open ? 'open' : ''}>
        <summary class="${role === 'admin' ? 'admin-summary' : ''}">
          <div class="request-summary-id">
            <div class="request-title">${escapeHtml(request.requestId)}</div>
            <div class="request-meta">${escapeHtml(request.processName || request.processType || 'Request')}</div>
            <div class="request-meta">Date: ${escapeHtml(requestDisplayDateLabel(request))}</div>
          </div>
          <div class="request-summary-person">
            <div>${escapeHtml(request.employeeName || '')}</div>
            <div class="request-meta">${escapeHtml(request.employeeEmail || '')}</div>
          </div>
          <div class="request-summary-status">
            <span class="badge ${badgeClass}">${escapeHtml(request.statusLabel || request.status || '')}</span>
          </div>
          <div class="request-summary-waiting">
            <div class="request-meta">Waiting on</div>
            <div>${escapeHtml(request.waitingOnLabel || 'No action required')}</div>
          </div>
          ${role === 'admin' ? renderAdminButtonRow(request) : ''}
        </summary>
        <div class="request-body">
          ${renderRequestSummary(request, includeActual)}
          ${role === 'admin' || role === 'requester' ? renderRequestWorkflow(request) : renderHistory(request)}
          ${role === 'admin' ? '' : renderDashboardRequestActions(request, role)}
        </div>
      </details>
    `;
    if (role === 'admin' || role === 'approver') {
      return `
        <div class="request-shell" data-dashboard-request data-search="${escapeHtml(dashboardRequestSearchText(request))}">
          ${requestHtml}
          ${role === 'admin' ? renderDashboardRequestActions(request, role) : ''}
        </div>
      `;
    }
    return requestHtml;
  }

  function dashboardRequestSearchText(request) {
    return [
      request.requestId,
      request.processType,
      request.processName,
      request.createdAt,
      request.employeeName,
      request.employeeEmail,
      request.lineManagerEmail,
      request.requesterEmail,
      request.reason,
      request.overtimeDate,
      request.eventName,
      request.eventDate,
      request.eventStartDate,
      request.eventEndDate,
      request.schoolArea,
      request.eventType,
      request.eventLocation,
      request.eventStartTime,
      request.eventFinishTime,
      request.eventTimes,
      request.studentsInvolved,
      request.staffRequired,
      request.status,
      request.statusLabel,
      request.waitingOnLabel,
      request.activeApprovalStage,
      request.activeApprovalStepName,
      request.activeApprovalStepEmail,
      request.plannedHours,
      request.actualHours,
      request.compensationMethod
    ].join(' ').toLowerCase();
  }

  function renderDashboardRequestActions(request, role) {
    if (role === 'approver' && request.canApprove) {
      const primaryDecision = request.primaryDecision || request.activeWorkflowPrimaryDecision || 'approve';
      const primaryLabel = request.primaryActionLabel || request.activeWorkflowPrimaryActionLabel || 'Approve';
      return `
        <form class="dashboard-approval stack" data-request-id="${escapeHtml(request.requestId)}">
          ${renderDecisionCommentField(request)}
          <div class="actions inline">
            ${request.canDeny ? '<button class="button danger" type="button" data-dashboard-decision="deny">Deny</button>' : ''}
            ${request.canRequestChanges === false ? '' : '<button class="button secondary" type="button" data-dashboard-decision="changes">Request changes</button>'}
            <button class="button primary" type="button" data-dashboard-decision="${escapeHtml(primaryDecision)}">${escapeHtml(primaryLabel)}</button>
          </div>
        </form>
      `;
    }

    if (role === 'requester') {
      const actions = [];
      if (request.canEditApproval) {
        actions.push(`<a class="button secondary" href="${escapeHtml(appUrl('edit', { requestId: request.requestId }))}">Edit request</a>`);
      }
      if (request.canEditActual) {
        actions.push(`<a class="button secondary" href="${escapeHtml(appUrl('actual', { requestId: request.requestId }))}">Edit actual hours</a>`);
      }
      if (request.canEditChecklist) {
        actions.push(`<a class="button secondary" href="${escapeHtml(appUrl('checklist', { requestId: request.requestId }))}">Edit checklist</a>`);
      }
      if (request.canCancel) {
        actions.push(`<button class="button danger" type="button" data-requester-cancel="${escapeHtml(request.requestId)}">Cancel request</button>`);
      }
      return actions.length ? `<div class="actions inline">${actions.join('')}</div>` : '';
    }

    if (role === 'admin') {
      return renderAdminActions(request);
    }

    return '';
  }

  function renderDecisionCommentField(context) {
    const requiresComment = Boolean(context && (context.requiresComment || context.activeWorkflowRequiresComment));
    const label = requiresComment ? 'Notes' : 'Reason / comment';
    const help = requiresComment
      ? 'Required for this workflow step. These notes are included in workflow history for audit and payroll reference.'
      : 'Required when denying or requesting changes. This is included in request emails and history.';
    const message = requiresComment ? 'Enter notes before completing this step.' : '';
    return `
      <label class="field full">
        <span>${escapeHtml(label)}</span>
        <textarea name="comment" data-decision-comment ${requiresComment ? 'data-comment-required="true"' : ''} ${message ? `data-comment-required-message="${escapeHtml(message)}"` : ''}></textarea>
        <span class="help">${escapeHtml(help)}</span>
      </label>
    `;
  }

  function renderAdminActions(request) {
    if (!request.canReassign) {
      return '';
    }
    return `
      <div class="admin-action-panel hidden">
        ${request.canReassign ? renderReassignForm(request) : ''}
      </div>
    `;
  }

  function renderAdminButtonRow(request) {
    const requestId = escapeHtml(request.requestId);
    const hasActiveStep = Boolean(request.activeApprovalStage && request.activeApprovalStepEmail);
    const reminderTitle = request.canRemind ? 'Send a fresh email for the current pending action.' : 'No reminder is available for this request status.';
    const workflowTitle = hasActiveStep ? `Current step: ${request.activeApprovalStepName || request.activeApprovalStepEmail}` : 'This request is not waiting on a workflow step.';
    const cancelTitle = request.canAdminCancel ? 'Cancel this in-process request and stop the workflow.' : 'This request is not currently in process.';
    return `
      <div class="admin-summary-actions">
        <button class="button secondary" type="button" data-admin-reminder="${requestId}" ${request.canRemind ? '' : 'disabled'} title="${escapeHtml(reminderTitle)}">Send reminder email</button>
        <button class="button secondary" type="button" data-admin-panel-trigger="${requestId}" data-admin-panel-name="redirect" ${request.canReassign ? '' : 'disabled'} title="${escapeHtml(workflowTitle)}">Reassign step</button>
        <button class="button danger" type="button" data-admin-cancel="${requestId}" ${request.canAdminCancel ? '' : 'disabled'} title="${escapeHtml(cancelTitle)}">Cancel request</button>
      </div>
    `;
  }

  function renderRequestWorkflow(request) {
    const isActualHoursProcess = request.completionMode === 'actual_hours';
    const approval = renderWorkflowStage(
      isActualHoursProcess ? 'Pre-approval workflow' : 'Approval workflow',
      'approval',
      request.approvalWorkflowSteps || [],
      request.approvalHistory || [],
      request
    );
    const final = isActualHoursProcess ? renderWorkflowStage(
        'Actual-hours workflow',
        'final',
        request.finalWorkflowSteps || [],
        request.finalApprovalHistory || [],
        request
      ) : '';
    const checklist = renderChecklistWorkflow(request);
    const changes = renderChangeRequests(request.changeHistory || []);
    return `
      <div class="workflow-timeline">
        <h3>Approval History</h3>
        ${approval}
        ${final}
        ${checklist}
        ${changes}
      </div>
    `;
  }

  function renderChecklistWorkflow(request) {
    const steps = request.checklistWorkflowSteps || [];
    const history = request.checklistNotificationHistory || [];
    if (!steps.length && !history.length && request.processType !== 'vtr') {
      return '';
    }
    if (!steps.length && !history.length && !request.checklistSubmittedAt && !request.checklistCompletedAt) {
      return '';
    }
    return renderWorkflowStage(
      'VTR checklist notifications',
      'checklist',
      steps,
      history,
      request
    );
  }

  function renderWorkflowStage(title, stage, steps, history, request) {
    const activeIndex = Number(request.activeApprovalStepIndex);
    const isActiveStage = request.activeApprovalStage === stage;
    const buckets = workflowHistoryBuckets(steps, history);
    const rows = steps.length
      ? steps.map(step => renderWorkflowStep(
          step,
          stage,
          buckets.entriesByStep[workflowStepRenderKey(step)] || [],
          request,
          isActiveStage && activeIndex === Number(step.index)
        )).join('')
      : '<p class="muted">No configured steps for this stage.</p>';
    return `
      <div class="workflow-stage">
        <h4>${escapeHtml(title)}</h4>
        <div class="workflow-step-list">
          ${rows}
          ${buckets.unmatched.map(entry => renderWorkflowHistoryOnly(entry)).join('')}
        </div>
      </div>
    `;
  }

  function renderWorkflowStep(step, stage, entries, request, isActive) {
    const status = workflowStepStatus(step, entries, request, stage, isActive);
    const recipient = step.type === 'notification'
      ? (step.emails || []).join(', ')
      : step.email;
    return `
      <div class="workflow-step ${status.className}">
        <div>
          <strong>${escapeHtml(step.name || 'Workflow step')}</strong>
          <span>${escapeHtml(step.type || 'approval')} | ${escapeHtml(recipient || '')}</span>
        </div>
        <div>
          <span class="badge ${status.badge}">${escapeHtml(status.label)}</span>
          ${step.error ? `<p class="workflow-entry">${escapeHtml(step.error)}</p>` : ''}
          ${entries.map(entry => renderWorkflowEntry(entry)).join('')}
        </div>
      </div>
    `;
  }

  function workflowStepStatus(step, entries, request, stage, isActive) {
    if (isActive) {
      return { label: `Waiting on ${request.activeApprovalStepName || step.name}`, badge: 'pending', className: 'active' };
    }
    const latest = entries[entries.length - 1];
    if (latest) {
      const decision = String(latest.decision || '').toLowerCase();
      if (decision.indexOf('change') !== -1) {
        return { label: 'Changes requested', badge: 'pending', className: 'attention' };
      }
      if (decision.indexOf('skip') !== -1) {
        return { label: 'Skipped', badge: 'closed', className: 'muted-step' };
      }
      if (decision.indexOf('deny') !== -1) {
        return { label: 'Denied', badge: 'stopped', className: 'stopped' };
      }
      if (step.type === 'notification') {
        return { label: 'Sent', badge: 'closed', className: 'complete' };
      }
      return { label: latest.decision || 'Completed', badge: 'closed', className: 'complete' };
    }
    if (step.type === 'notification') {
      return { label: 'Notification step', badge: 'closed', className: 'muted-step' };
    }
    if (step.type === 'configuration') {
      return { label: 'Config issue', badge: 'stopped', className: 'stopped' };
    }
    return { label: 'Not reached', badge: 'closed', className: 'muted-step' };
  }

  function renderWorkflowEntry(entry) {
    const who = entry.adminEmail
      ? `${entry.adminEmail} for ${entry.approverEmail || ''}`
      : entry.approverEmail || '';
    const recipients = Array.isArray(entry.recipients) && entry.recipients.length
      ? entry.recipients.join(', ')
      : '';
    return `
      <p class="workflow-entry">
        ${escapeHtml(formatDateTime(entry.at))}: ${escapeHtml(entry.decision || '')}${who ? ` by ${escapeHtml(who)}` : ''}${recipients ? ` to ${escapeHtml(recipients)}` : ''}${entry.comment ? ` - ${escapeHtml(entry.comment)}` : ''}
      </p>
    `;
  }

  function renderWorkflowHistoryOnly(entry) {
    return `
      <div class="workflow-step muted-step">
        <div>
          <strong>${escapeHtml(entry.stepName || 'Approval history')}</strong>
          <span>${escapeHtml(entry.stepType || 'approval')} | ${escapeHtml(entry.approverEmail || '')}</span>
        </div>
        <div>
          <span class="badge closed">History</span>
          ${renderWorkflowEntry(entry)}
        </div>
      </div>
    `;
  }

  function renderChangeRequests(changeHistory) {
    const entries = visibleChangeHistoryEntries(changeHistory);
    if (!entries.length) {
      return '';
    }
      return `
      <div class="workflow-stage">
        <h4>Adjustments</h4>
        <div class="history">
          ${entries.map(entry => renderChangeHistoryEntry(entry)).join('')}
        </div>
      </div>
    `;
  }

  function visibleChangeHistoryEntries(changeHistory) {
    return (changeHistory || []).filter(entry => entry.type !== 'change_request');
  }

  function renderChangeHistoryEntry(entry) {
    const stageLabel = entry.stage === 'actual' ? 'Actual hours' : 'Request details';
    if (entry.type === 'adjustment') {
      const requestedWho = entry.requestedByEmail ? `${entry.requestedByName || entry.requestedByEmail} (${entry.requestedByEmail})` : entry.requestedByName || '';
      const editedWho = entry.editedByEmail ? `${entry.editedByName || entry.editedByEmail} (${entry.editedByEmail})` : entry.editedByName || '';
      return `
        <div class="history-entry">
          <p><strong>${escapeHtml(formatDateTime(entry.at))}: ${escapeHtml(stageLabel)} updated</strong></p>
          ${requestedWho ? `<p>${entry.requestedByRole === 'approver' ? 'Change requested by' : 'Change started by'} ${escapeHtml(requestedWho)}.</p>` : ''}
          ${editedWho ? `<p>Updated by ${escapeHtml(editedWho)}.</p>` : ''}
          ${entry.comment ? `<p><strong>Adjustment comment:</strong> ${escapeHtml(entry.comment)}</p>` : ''}
          ${renderAdjustmentFieldChanges(entry.fields || [])}
        </div>
      `;
    }

    const requestedWho = entry.requestedByEmail ? `${entry.requestedByName || entry.requestedByEmail} (${entry.requestedByEmail})` : entry.requestedByName || 'Reviewer';
    return `
      <div class="history-entry">
        <p><strong>${escapeHtml(formatDateTime(entry.at))}: ${escapeHtml(stageLabel)} changes requested</strong></p>
        <p>Requested by ${escapeHtml(requestedWho)}${entry.comment ? ` - ${escapeHtml(entry.comment)}` : ''}</p>
      </div>
    `;
  }

  function renderAdjustmentFieldChanges(fields) {
    if (!fields.length) {
      return '<p class="workflow-entry">No field values changed.</p>';
    }
    return `
      <ul class="history-field-list">
        ${fields.map(field => `<li><strong>${escapeHtml(field.label || field.field || 'Field')}:</strong> ${escapeHtml(displayHistoryValue(field.from))} -> ${escapeHtml(displayHistoryValue(field.to))}</li>`).join('')}
      </ul>
    `;
  }

  function displayHistoryValue(value) {
    const text = String(value === null || value === undefined ? '' : value);
    return text ? `"${text}"` : '(blank)';
  }

  function workflowEntryMatchesStep(entry, step) {
    const entryStepName = normalize(entry.stepName);
    if (entryStepName) {
      return entryStepName === normalize(step.name);
    }
    return normalize(entry.approverEmail) === normalize(step.email);
  }

  function workflowHistoryBuckets(steps, history) {
    const entriesByStep = {};
    const unmatched = [];
    const matchedEntries = new Set();
    const matchedSteps = new Set();
    (steps || []).forEach(step => {
      entriesByStep[workflowStepRenderKey(step)] = [];
    });

    function assign(entry, step) {
      const key = workflowStepRenderKey(step);
      entriesByStep[key] = entriesByStep[key] || [];
      entriesByStep[key].push(entry);
      matchedEntries.add(entry);
      matchedSteps.add(key);
    }

    (history || []).forEach(entry => {
      const step = (steps || []).find(candidate => workflowEntryMatchesStep(entry, candidate));
      if (step) {
        assign(entry, step);
      }
    });

    (history || []).forEach(entry => {
      if (matchedEntries.has(entry)) {
        return;
      }
      const step = (steps || []).find(candidate => !matchedSteps.has(workflowStepRenderKey(candidate)) && workflowEntryMatchesStepByIndex(entry, candidate));
      if (step) {
        assign(entry, step);
      }
    });

    (history || []).forEach(entry => {
      if (matchedEntries.has(entry)) {
        return;
      }
      const step = (steps || []).find(candidate => !matchedSteps.has(workflowStepRenderKey(candidate)) && workflowEntryCanFallbackMatchStep(entry, candidate));
      if (step) {
        assign(entry, step);
      } else {
        unmatched.push(entry);
      }
    });

    return { entriesByStep, unmatched };
  }

  function workflowStepRenderKey(step) {
    return [
      normalize(step.stage),
      String(step.originalIndex === undefined ? '' : step.originalIndex),
      String(step.index === undefined ? '' : step.index),
      normalize(step.type),
      normalize(step.name),
      normalize(step.email)
    ].join('|');
  }

  function workflowEntryMatchesStepByIndex(entry, step) {
    const entryIndex = entry.stepIndex === undefined || entry.stepIndex === '' ? NaN : Number(entry.stepIndex);
    const entryOriginalIndex = entry.stepOriginalIndex === undefined || entry.stepOriginalIndex === '' ? NaN : Number(entry.stepOriginalIndex);
    return (!isNaN(entryOriginalIndex) && entryOriginalIndex === Number(step.originalIndex)) ||
      (!isNaN(entryIndex) && entryIndex === Number(step.index));
  }

  function workflowEntryCanFallbackMatchStep(entry, step) {
    if (normalize(entry.stepType || 'approval') !== normalize(step.type || 'approval')) {
      return false;
    }
    if (step.type === 'notification') {
      const recipients = [].concat(entry.recipients || []).map(normalize);
      return (step.emails || []).some(email => recipients.indexOf(normalize(email)) !== -1);
    }
    return normalize(entry.approverEmail) && normalize(entry.approverEmail) === normalize(step.email);
  }

  function normalize(value) {
    return String(value || '').trim().toLowerCase();
  }

  function renderReassignForm(request) {
    return `
      <form class="admin-reassign admin-action-grid hidden" data-admin-panel="redirect" data-request-id="${escapeHtml(request.requestId)}">
        <label class="field">
          <span>New action owner name</span>
          <input name="newApproverName" type="text" value="${escapeHtml(request.activeApprovalStepName || '')}">
        </label>
        <label class="field">
          <span>New action owner email</span>
          <input name="newApproverEmail" type="email" required value="${escapeHtml(request.activeApprovalStepEmail || '')}">
        </label>
        <button class="button primary" type="submit">Redirect step</button>
      </form>
    `;
  }

  function bindDashboardActions() {
    bindAdminSubmenu();
    bindAdminProcessNavigation();
    bindDashboardFilter();
    bindAdminUserManagement();
    bindAdminFormManagement();
    bindAdminWorkflowManagement();

    document.querySelectorAll('[data-dashboard-decision]').forEach(button => {
      button.addEventListener('click', event => {
        const form = event.currentTarget.closest('form');
        const decision = event.currentTarget.dataset.dashboardDecision;
        if (!validateDecisionComment(form, decision)) {
          return;
        }
        const data = collectForm(form);
        data.requestId = form.dataset.requestId;
        data.decision = decision;
        data.email = dashboardState.email;
        submitWithContainer(form, 'submitDashboardApprovalDecision', data, result => {
          showNotice(result.message, 'success');
          loadDashboard();
        });
      });
    });

    document.querySelectorAll('[data-requester-cancel]').forEach(button => {
      button.addEventListener('click', event => {
        const requestId = event.currentTarget.dataset.requesterCancel;
        if (!window.confirm(`Cancel request ${requestId}?`)) {
          return;
        }
        submitWithContainer(event.currentTarget.closest('.request-body'), 'requesterCancelRequest', {
          requestId,
          email: dashboardState.email
        }, result => {
          showNotice(result.message, 'success');
          loadDashboard();
        });
      });
    });

    document.querySelectorAll('[data-admin-reminder]').forEach(button => {
      button.addEventListener('click', event => {
        event.preventDefault();
        event.stopPropagation();
        const requestId = event.currentTarget.dataset.adminReminder;
        submitWithContainer(event.currentTarget.closest('.request-shell') || event.currentTarget.closest('.admin-action-panel') || event.currentTarget.closest('.request-body'), 'adminSendReminder', {
          requestId,
          email: dashboardState.email
        }, result => {
          showNotice(result.message, 'success');
          loadDashboard();
        });
      });
    });

    document.querySelectorAll('[data-admin-cancel]').forEach(button => {
      button.addEventListener('click', event => {
        event.preventDefault();
        event.stopPropagation();
        const requestId = event.currentTarget.dataset.adminCancel;
        if (!window.confirm(`Cancel request ${requestId}? This will stop the workflow and invalidate outstanding links.`)) {
          return;
        }
        submitWithContainer(event.currentTarget.closest('.request-shell') || event.currentTarget.closest('.request-body'), 'adminCancelRequest', {
          requestId,
          email: dashboardState.email
        }, result => {
          showNotice(result.message, 'success');
          loadDashboard();
        });
      });
    });

    document.querySelectorAll('[data-admin-panel-trigger]').forEach(button => {
      button.addEventListener('click', event => {
        event.preventDefault();
        event.stopPropagation();
        const panelName = event.currentTarget.dataset.adminPanelName;
        const item = event.currentTarget.closest('.request-item');
        const shell = event.currentTarget.closest('.request-shell');
        const panel = shell ? shell.querySelector('.admin-action-panel') : event.currentTarget.closest('.admin-action-panel');
        if (!panel) {
          return;
        }
        const target = panel.querySelector(`[data-admin-panel="${panelName}"]`);
        if (!target) {
          return;
        }
        const shouldOpen = target.classList.contains('hidden');
        panel.querySelectorAll('[data-admin-panel]').forEach(element => {
          element.classList.add('hidden');
        });
        if (shouldOpen) {
          if (item) {
            item.open = true;
          }
          panel.classList.remove('hidden');
          target.classList.remove('hidden');
          panel.scrollIntoView({ block: 'nearest' });
        } else {
          panel.classList.add('hidden');
        }
      });
    });

    document.querySelectorAll('.admin-reassign').forEach(form => {
      form.addEventListener('submit', event => {
        event.preventDefault();
        const data = collectForm(form);
        data.requestId = form.dataset.requestId;
        data.email = dashboardState.email;
        submitWithContainer(form, 'adminReassignRequest', data, result => {
          showNotice(result.message, 'success');
          loadDashboard();
        });
      });
    });
  }

  function bindAdminSubmenu() {
    document.querySelectorAll('[data-admin-view]').forEach(button => {
      button.addEventListener('click', event => {
        const previousView = dashboardState.adminView;
        dashboardState.adminView = event.currentTarget.dataset.adminView || 'forms';
        if (dashboardState.adminView === 'builder' && previousView !== 'builder') {
          dashboardState.formBuilderKey = '';
          dashboardState.formBuilderStage = '';
        }
        const body = document.getElementById('dashboard-body');
        if (!body || !dashboardState.data) {
          return;
        }
        body.innerHTML = renderDashboardData(dashboardState.data);
        bindDashboardActions();
        updateAdminViewUrl();
      });
    });
  }

  function bindAdminUserManagement() {
    document.querySelectorAll('[data-admin-user-form]').forEach(form => {
      form.addEventListener('click', event => {
        const addButton = event.target.closest('[data-add-admin-email]');
        if (addButton) {
          addAdminEmailFromControl(form, addButton);
          return;
        }

        const removeButton = event.target.closest('[data-remove-admin-email]');
        if (removeButton) {
          removeAdminEmailRow(form, removeButton);
        }
      });

      form.querySelectorAll('[data-admin-email-input]').forEach(input => {

          draggedWorkflowStep = null;

        const step = handle.closest('[data-workflow-step]');

          return;

        draggedWorkflowStep = step;

        if (event.dataTransfer) {
          event.dataTransfer.effectAllowed = 'move';
          event.dataTransfer.setData('text/plain', 'workflow-step');

      form.addEventListener('dragend', () => {

          list.insertBefore(draggedWorkflowStep, empty || null);
        } else {

  function rerenderAdminLanding() {
    const body = document.getElementById('dashboard-body');
    if (!body || !dashboardState.data) {
      return;
    }
    body.innerHTML = renderDashboardData(dashboardState.data);

  function createLocalFormDefinition(container) {
    const keyInput = container ? container.querySelector('[data-new-form-key]') : null;
    const nameInput = container ? container.querySelector('[data-new-form-name]') : null;
    const key = normalize(keyInput ? keyInput.value : '').replace(/\s+/g, '_');
    const name = nameInput && nameInput.value.trim() ? nameInput.value.trim() : key;
    if (!/^[a-z][a-z0-9_-]*$/.test(key)) {
      showNotice('Form key must start with a letter and contain only lowercase letters, numbers, hyphens, or underscores.', 'error');
      if (keyInput) {
        keyInput.focus();
      }
      return;
    }
    const management = dashboardState.data && dashboardState.data.formManagement;
    if (!management) {
      return;
    }
    if ((management.forms || []).some(form => form.key === key)) {
      showNotice(`Form ${key} already exists.`, 'error');
      return;
    }
    management.forms = (management.forms || []).concat([{
      key,
      name,
      description: '',
      processUsage: [],
      definition: {
        name,
        forms: {
          request: {
            key,
            sections: []
          }
        }
      }
    }]).sort((a, b) => String(a.name || a.key).localeCompare(String(b.name || b.key)));
    dashboardState.formBuilderKey = key;
    dashboardState.formBuilderStage = 'request';
    rerenderAdminLanding();
  }

  function setFormBuilderStage(form, stage) {
    if (!form || !stage) {
      return;
    }
    dashboardState.formBuilderStage = stage;
    form.querySelectorAll('[data-form-stage-tab]').forEach(button => {
      const active = button.dataset.formStageTab === stage;
      button.classList.toggle('active', active);
      button.setAttribute('aria-selected', active ? 'true' : 'false');
    });
    form.querySelectorAll('[data-form-stage-nav-item]').forEach(item => {
      item.classList.toggle('active', item.dataset.formStageNavItem === stage);
    });
    form.querySelectorAll('[data-form-stage-panel]').forEach(panel => {
      panel.hidden = panel.dataset.formStage !== stage;
    });
    updateFormBuilderPreview(form);
  }

  function addFormBuilderStage(form) {
    if (!form) {
      return;
    }
    const existing = Array.from(form.querySelectorAll('[data-form-stage-panel]')).map(panel => panel.dataset.formStage);
    const keyInput = form.querySelector('[data-new-form-stage-key]');
    const titleInput = form.querySelector('[data-new-form-stage-title]');
    const runtimeInput = form.querySelector('[data-new-form-stage-runtime]');
    const triggerInput = form.querySelector('[data-new-form-stage-trigger]');
    const key = normalize(keyInput ? keyInput.value : '').replace(/\s+/g, '_');
    const management = dashboardState.data && dashboardState.data.formManagement;
    const stageTypes = management ? management.stageTypes || [] : [];
    if (!key || !/^[a-z][a-z0-9_-]*$/.test(key)) {
      showNotice('Enter a stage key using lowercase letters, numbers, hyphens, or underscores.', 'error');
      if (keyInput) {
        keyInput.focus();
      }
      return;
    }
    if (existing.indexOf(key) !== -1) {
      showNotice(`Stage ${key} already exists.`, 'error');
      return;
    }
    const label = titleInput && titleInput.value.trim() ? titleInput.value.trim() : key.replace(/[_-]+/g, ' ');
    const runtimeType = runtimeInput && runtimeInput.value ? runtimeInput.value : 'generic';
    const triggerMode = triggerInput && triggerInput.value ? triggerInput.value : formBuilderDefaultStageTriggerMode(runtimeType, stageTypes);
    const fieldTypes = management ? management.fieldTypes || [] : [];
    const tabs = form.querySelector('.form-builder-stage-list');
    const panels = form.querySelector('.form-builder-stage-panels');
    const stageModel = {
      key,
      label,
      runtimeType,
      triggerMode,
      triggerSummary: formBuilderStageTriggerSummary(runtimeType, triggerMode, {}, stageTypes),
      definition: {
        key: `${form.dataset.definitionKey}.${key}`,
        sections: []
      }
    };
    let conditionStages = [stageModel];
    try {
      conditionStages = formBuilderStages(collectAdminFormSettings(form, { silentJson: true }).definition, form.dataset.definitionKey, stageTypes).concat([stageModel]);
    } catch (error) {
      conditionStages = [stageModel];
    }
    const conditionFields = formBuilderConditionFields(conditionStages);
    if (tabs) {
      tabs.insertAdjacentHTML('beforeend', renderFormBuilderStageNavItem(stageModel, '', stageTypes));
    }
    if (panels) {
      panels.insertAdjacentHTML('beforeend', renderFormBuilderStagePanel(stageModel, '', fieldTypes, stageTypes, conditionFields));
    }
    if (keyInput) {
      keyInput.value = '';
    }
    if (titleInput) {
      titleInput.value = '';
    }
    if (runtimeInput) {
      runtimeInput.value = 'generic';
    }
    if (triggerInput) {
      triggerInput.value = 'workflow';
    }
    setFormBuilderStage(form, key);
    updateFormBuilderPreview(form);
  }

  function removeFormBuilderStage(panel) {
    if (!panel) {
      return;
    }
    const form = panel.closest('[data-admin-form-builder-form]');
    const stage = panel.dataset.formStage || '';
    if (!form || !stage) {
      return;
    }
    if (stage === 'request') {
      showNotice('The request form stage is required and cannot be removed.', 'error');
      return;
    }
    const navItem = Array.from(form.querySelectorAll('[data-form-stage-nav-item]'))
      .find(item => item.dataset.formStageNavItem === stage);
    if (navItem) {
      navItem.remove();
    }
    panel.remove();
    const nextPanel = form.querySelector('[data-form-stage-panel]');
    if (nextPanel) {
      setFormBuilderStage(form, nextPanel.dataset.formStage || 'request');
    } else {
      dashboardState.formBuilderStage = '';
      updateFormBuilderPreview(form);
    }
  }

  function moveFormBuilderStage(panel, direction) {
    if (!panel || panel.dataset.formStage === 'request') {
      return;
    }
    const form = panel.closest('[data-admin-form-builder-form]');
    const stage = panel.dataset.formStage || '';
    const targetPanel = direction === 'up'
      ? previousMatchingElement(panel, '[data-form-stage-panel]')
      : nextMatchingElement(panel, '[data-form-stage-panel]');
    if (!form || !stage || !targetPanel || targetPanel.dataset.formStage === 'request') {
      return;
    }
    const navItem = Array.from(form.querySelectorAll('[data-form-stage-nav-item]'))
      .find(item => item.dataset.formStageNavItem === stage);
    const targetNavItem = Array.from(form.querySelectorAll('[data-form-stage-nav-item]'))
      .find(item => item.dataset.formStageNavItem === targetPanel.dataset.formStage);
    if (direction === 'up') {
      panel.parentNode.insertBefore(panel, targetPanel);
      if (navItem && targetNavItem) {
        navItem.parentNode.insertBefore(navItem, targetNavItem);
      }
    } else {
      panel.parentNode.insertBefore(targetPanel, panel);
      if (navItem && targetNavItem) {
        navItem.parentNode.insertBefore(targetNavItem, navItem);
      }
    }
    setFormBuilderStage(form, stage);
    updateFormBuilderPreview(form);
  }

  function formBuilderPanelForStageControl(form, control) {
    if (!form || !control) {
      return null;
    }
    const panel = control.closest('[data-form-stage-panel]');
    if (panel) {
      return panel;
    }
    const navItem = control.closest('[data-form-stage-nav-item]');
    const stage = navItem ? navItem.dataset.formStageNavItem : '';
    if (!stage) {
      return null;
    }
    return Array.from(form.querySelectorAll('[data-form-stage-panel]'))
      .find(item => item.dataset.formStage === stage) || null;
  }

  function addFormBuilderSection(panel) {
    const list = panel ? panel.querySelector('[data-form-section-list]') : null;
    if (!list) {
      return;
    }
    const management = dashboardState.data && dashboardState.data.formManagement;
    const fieldTypes = management ? management.fieldTypes || [] : [];
    const section = {
      title: 'New section',
      layout: 'grid',
      fields: []
    };
    const index = list.querySelectorAll('[data-form-section]').length;
    const empty = list.querySelector('[data-form-section-empty]');
    if (empty) {
      empty.insertAdjacentHTML('beforebegin', renderFormBuilderSection(section, index, fieldTypes));
    } else {
      list.insertAdjacentHTML('beforeend', renderFormBuilderSection(section, index, fieldTypes));
    }
    updateFormBuilderSectionListState(list);
    updateFormBuilderPreview(panel.closest('[data-admin-form-builder-form]'));
  }

  function addFormBuilderField(section) {
    const list = section ? section.querySelector('[data-form-field-list]') : null;
    if (!list) {
      return;
    }
    const management = dashboardState.data && dashboardState.data.formManagement;
    const fieldTypes = management ? management.fieldTypes || [] : [];
    const field = {
      type: 'text',
      name: 'newField',
      label: 'New question'
    };
    const index = list.querySelectorAll('[data-form-field]').length;
    const empty = list.querySelector('[data-form-field-empty]');
    if (empty) {
      empty.insertAdjacentHTML('beforebegin', renderFormBuilderField(field, index, fieldTypes));
    } else {
      list.insertAdjacentHTML('beforeend', renderFormBuilderField(field, index, fieldTypes));
    }
    updateFormBuilderFieldListState(list);
    updateFormBuilderPreview(section.closest('[data-admin-form-builder-form]'));
  }

  function moveFormBuilderItem(item, direction, selector) {
    if (!item) {
      return;
    }
    const target = direction === 'up'
      ? previousMatchingElement(item, selector)
      : nextMatchingElement(item, selector);
    if (!target) {
      return;
    }
    if (direction === 'up') {
      item.parentNode.insertBefore(item, target);
    } else {

    }
    return text.split(/\r?\n/).map(item => item.trim()).filter(Boolean);
