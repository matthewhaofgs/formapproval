<script>
  const state = window.INITIAL_STATE || { mode: 'request' };
  const WEB_APP_URL = window.WEB_APP_URL || state.webAppUrl || '';
  const app = document.getElementById('app');
  const notice = document.getElementById('notice');
  const globalProgress = document.getElementById('global-progress');
  const globalProgressLabel = globalProgress ? globalProgress.querySelector('[data-progress-label]') : null;
  const globalProgressHelp = globalProgress ? globalProgress.querySelector('[data-progress-help]') : null;
  const globalProgressBar = globalProgress ? globalProgress.querySelector('.progress-bar') : null;
  let activeProgressCount = 0;
  let progressHideTimer = 0;
  let progressTickTimer = 0;
  let progressStartedAt = 0;
  let progressBaseMessage = '';
  let progressMethod = '';
  let progressEstimateMs = 0;
  let progressStorageKey = '';
  let draggedWorkflowStep = null;

  function mealBreakRulesHtml(planned) {
    return `
      <div class="info-block">
        <h3>Meal Break Rules</h3>
        <p>You must take an unpaid meal break of 30 minutes if you work more than 5 hours in a single day (Clause 21.1). This is your first unpaid meal break. You cannot work through your meal break to claim it as overtime.</p>
        <p>If you are required to work more than 1.5 hours of overtime after your ordinary finish time, the School will provide a suitable meal or pay you a Meal Allowance (Clause 15.11).</p>
        <p>If your duties extend into the evening and you work past 6:00pm, you are entitled to a second unpaid meal break for an "evening meal" under Clause 21.1. The timing of this break must be mutually agreed upon between you and the School.</p>
        <p>${planned ? 'Ensure all planned unpaid meal breaks are deducted from the total hours requested.' : 'Ensure all unpaid meal breaks are deducted from the total hours claimed.'}</p>
      </div>
    `;
  }

  const ROLE_LABELS = {
    requester: 'My Requests',
    approver: 'Approvals',
    admin: 'Admin'
  };

  const dashboardState = {
    role: state.role || 'requester',
    email: state.currentUserEmail || '',
    selectedProcess: state.selectedProcess || '',
    adminView: state.adminView || 'forms',
    formBuilderKey: state.formBuilderKey || '',
    formBuilderStage: state.formBuilderStage || '',
    workflowProcess: state.workflowProcess || '',
    workflowStage: state.workflowStage || '',
    roleAvailability: normalizeRoleAvailability(state.roleAvailability),
    data: null,
    adminChooserData: null,
    adminDashboards: {}
  };

  bindGlobalLoadingIndicators();
  applyTopNavRoleVisibility();
  bindFeedbackActions();
  render();

  function render() {
    if (state.mode === 'dashboard') {
      renderDashboardShell();
      bindDashboardShell();
      loadDashboard();
      return;
    }

    if (state.mode === 'chooser') {
      app.innerHTML = renderFormChooser(state.processes || []);
      return;
    }

    if (state.mode === 'approve') {
      app.innerHTML = renderApproval();
      bindApproval();
      return;
    }

    if (state.mode === 'actual' || state.mode === 'checklist') {
      app.innerHTML = renderActualHours();
      bindActualHours();
      return;
    }

    if (state.mode === 'edit') {
      app.innerHTML = renderRequestForm();
      bindRequestForm();
      return;
    }

    if (state.mode === 'closed') {
      app.innerHTML = renderMessagePanel(state.title, state.message, `${state.request ? renderRequestSummary(state.request, true) : ''}${renderClosedAction(state.closedAction)}`);
      return;
    }

    if (state.mode === 'error') {
      showNotice(state.message, 'error');
      app.innerHTML = renderMessagePanel(
        state.title || 'Link unavailable',
        state.message || 'The link could not be opened.',
        `<div class="actions inline"><a class="button secondary" href="${escapeHtml(appUrl('dashboard', { role: 'approver' }))}">Workflow dashboard</a><a class="button secondary" href="${escapeHtml(appUrl('dashboard', { role: 'requester' }))}">My Requests</a></div>`
      );
      return;
    }

    app.innerHTML = renderRequestForm();
    bindRequestForm();
  }

  function renderFormChooser(processes) {
    return `
      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>Start a request</h2>
            <p>Select the form you need.</p>
          </div>
        </div>
        ${renderProcessCardGrid(processes, process => appUrl('request', { process: process.key }), 'Open form')}
      </section>
    `;
  }

  function renderProcessCardGrid(processes, hrefBuilder, actionLabel, attributesBuilder) {
    if (!processes.length) {
      return '<p class="muted">No request forms are currently available.</p>';
    }

    return `
      <div class="process-grid">
        ${processes.map(process => renderProcessCard(process, hrefBuilder(process), actionLabel, attributesBuilder ? attributesBuilder(process) : '')).join('')}
      </div>
    `;
  }

  function renderProcessCard(process, href, actionLabel, extraAttributes) {
    const action = actionLabel ? `<em>${escapeHtml(actionLabel)}</em>` : '';
    const counts = process.requestCount === undefined ? '' : `
      <div class="process-counts">
        <span>${escapeHtml(String(process.requestCount))} total</span>
        <span>${escapeHtml(String(process.pendingCount || 0))} open</span>
      </div>
    `;
    return `
      <a class="process-card" href="${escapeHtml(href)}" ${extraAttributes || ''}>
        <strong>${escapeHtml(process.name || process.key)}</strong>
        ${process.description ? `<span>${escapeHtml(process.description)}</span>` : ''}
        ${counts}
        ${action}
      </a>
    `;
  }

  function renderDashboardShell() {
    const tabs = availableDashboardRoles().map(role => dashboardTab(role)).join('');
    app.innerHTML = `
      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>${escapeHtml(ROLE_LABELS[dashboardState.role] || 'Dashboard')} dashboard</h2>
            ${state.currentUserEmail ? `<p>Signed in as ${escapeHtml(state.currentUserEmail)}</p>` : ''}
          </div>
          <div class="tabs" role="tablist" aria-label="Dashboard role">
            ${tabs}
          </div>
        </div>
        <div id="dashboard-body" class="stack"></div>
      </section>
    `;
  }

  function dashboardTab(role) {
    return `<button type="button" class="${dashboardState.role === role ? 'active' : ''}" data-role="${role}">${escapeHtml(ROLE_LABELS[role])}</button>`;
  }

  function availableDashboardRoles() {
    return ['requester', 'approver', 'admin'].filter(role => {
      return role === 'requester' ||
        dashboardState.roleAvailability[role] ||
        dashboardState.role === role;
    });
  }

  function normalizeRoleAvailability(availability) {
    const known = availability && typeof availability === 'object';
    return {
      requester: true,
      approver: known ? Boolean(availability.approver) : true,
      admin: known ? Boolean(availability.admin) : true
    };
  }

  function applyTopNavRoleVisibility() {
    document.querySelectorAll('[data-nav-role]').forEach(link => {
      const role = link.dataset.navRole;
      if (role === 'requester') {
        link.hidden = false;
        return;
      }
      link.hidden = !dashboardState.roleAvailability[role];
    });
  }

  function bindFeedbackActions() {
    document.querySelectorAll('[data-feedback-open]').forEach(button => {
      if (button.dataset.bound === 'true') {
        return;
      }
      button.dataset.bound = 'true';
      button.addEventListener('click', openFeedbackDialog);
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') {
        closeFeedbackDialog();
      }
    });
  }

  function feedbackDialogElement() {
    let dialog = document.getElementById('feedback-dialog');
    if (!dialog) {
      document.body.insertAdjacentHTML('beforeend', renderFeedbackDialog());
      dialog = document.getElementById('feedback-dialog');
      bindFeedbackDialog(dialog);
    }
    return dialog;
  }

  function renderFeedbackDialog() {
    return `
      <div class="feedback-dialog" id="feedback-dialog" data-feedback-dialog role="dialog" aria-modal="true" aria-labelledby="feedback-title" hidden>
        <div class="feedback-backdrop" data-feedback-close></div>
        <form class="feedback-panel stack" data-feedback-form novalidate>
          <div class="panel-header">
            <div>
              <h2 id="feedback-title">Feedback</h2>
              <p>Send feedback or suggestions about the forms site and processes.</p>
            </div>
            <button class="button secondary" type="button" data-feedback-close>Close</button>
          </div>
          <label class="field">
            <span>Email</span>
            <input name="email" type="email" value="${escapeHtml(state.currentUserEmail || '')}" readonly>
          </label>
          <label class="field full">
            <span>Message</span>
            <textarea name="message" rows="7" maxlength="4000" required></textarea>
          </label>
          <div class="actions inline">
            <button class="button secondary" type="button" data-feedback-close>Cancel</button>
            <button class="button primary" type="submit">Send feedback</button>
          </div>
        </form>
      </div>
    `;
  }

  function bindFeedbackDialog(dialog) {
    dialog.querySelectorAll('[data-feedback-close]').forEach(button => {
      button.addEventListener('click', closeFeedbackDialog);
    });
    const form = dialog.querySelector('[data-feedback-form]');
    form.addEventListener('submit', event => {
      event.preventDefault();
      if (!form.reportValidity()) {
        return;
      }
      const data = collectForm(form);
      data.email = state.currentUserEmail || data.email;
      data.pageUrl = window.location.href;
      submitWithContainer(form, 'submitFeedback', data, result => {
        form.reset();
        const emailInput = form.querySelector('input[name="email"]');
        if (emailInput) {
          emailInput.value = state.currentUserEmail || '';
        }
        closeFeedbackDialog();
        showNotice(result.message || 'Feedback sent.', 'success');
      });
    });
  }

  function openFeedbackDialog() {
    const dialog = feedbackDialogElement();
    dialog.hidden = false;
    const textarea = dialog.querySelector('textarea[name="message"]');
    if (textarea) {
      textarea.focus();
    }
  }

  function closeFeedbackDialog() {
    const dialog = document.getElementById('feedback-dialog');
    if (dialog) {
      dialog.hidden = true;
    }
  }

  function bindDashboardShell() {
    document.querySelectorAll('[data-role]').forEach(button => {
      button.addEventListener('click', event => {
        const role = event.currentTarget.dataset.role;
        showGlobalProgress('Loading dashboard...');
        window.top.location.href = appUrl('dashboard', { role });
      });
    });
  }

  function loadDashboard() {
    const body = document.getElementById('dashboard-body');
    clearNotice();

    body.innerHTML = renderLoading('Loading dashboard');
    const payload = dashboardLoadPayload();
    runServer('getDashboardData', payload, dashboardLoadTimeoutMs(payload))
      .then(result => {
        renderLoadedDashboardData(body, result);
      })
      .catch(error => {
        body.innerHTML = renderAuthError(error);
      });
  }

  function dashboardLoadPayload() {
    const payload = {
      role: dashboardState.role,
      email: dashboardState.email,
      process: dashboardState.selectedProcess
    };
    if (dashboardState.role === 'admin' && !dashboardState.selectedProcess) {
      payload.preloadAdminDashboards = true;
    }
    return payload;
  }

  function dashboardLoadTimeoutMs(payload) {
    if (payload && payload.role === 'admin' && payload.preloadAdminDashboards) {
      return 330000;
    }
    if (payload && payload.role === 'admin') {
      return 180000;
    }
    return 45000;
  }

  function renderLoadedDashboardData(body, result) {
    if (!result || !result.ok) {
      throw new Error((result && result.message) || 'Dashboard could not be loaded.');
    }
    dashboardState.data = result;
    dashboardState.email = result.email || dashboardState.email;
    dashboardState.roleAvailability = normalizeRoleAvailability(result.roleAvailability || dashboardState.roleAvailability);
    applyTopNavRoleVisibility();
    if (result.role === 'admin' && !result.selectedProcess) {
      dashboardState.adminChooserData = result;
      dashboardState.adminDashboards = result.adminDashboards || {};
    }
    if (result.role === 'admin' && result.selectedProcess) {
      updateCachedAdminDashboard(result);
    }
    body.innerHTML = renderDashboardData(result);
    bindDashboardActions();
  }

  function updateCachedAdminDashboard(result) {
    if (!result || !result.selectedProcess || !dashboardState.adminChooserData) {
      return;
    }
    dashboardState.adminDashboards[result.selectedProcess] = result;
    dashboardState.adminChooserData.adminDashboards = dashboardState.adminDashboards;
    (dashboardState.adminChooserData.adminProcesses || []).forEach(process => {
      if (process.key !== result.selectedProcess) {
        return;
      }
      process.requestCount = result.counts ? result.counts.total : (result.requests || []).length;
      process.pendingCount = result.counts ? result.counts.pending : (result.requests || []).filter(request => request.isPending).length;
      process.stoppedCount = (result.requests || []).filter(request => request.isStopped).length;
    });
  }

  function renderDashboardData(data) {
    dashboardState.selectedProcess = data.selectedProcess || '';
    if (data.role === 'admin' && !data.selectedProcess) {
      return renderAdminProcessChooser(data);
    }

    const requests = data.requests || [];
    const counts = data.counts || {};
    const awaitingActual = requests.filter(request => request.waitingOnType === 'employee').length;
    const stoppedRequests = requests.filter(request => request.isStopped);
    const completedRequests = requests.filter(request => request.isClosed && !request.isStopped);
    let sections = '';
    let metrics = '';

    if (data.role === 'approver') {
      const assigned = requests.filter(request => request.canApprove);
      const relatedInProgress = requests.filter(request => request.isPending && !request.canApprove);
      sections = renderDashboardProcessGroups(requests, data.role, processRequests => {
        const processAssigned = processRequests.filter(request => request.canApprove);
        const processRelatedInProgress = processRequests.filter(request => request.isPending && !request.canApprove);
        const processCompletedRequests = processRequests.filter(request => request.isClosed && !request.isStopped);
        const processStoppedRequests = processRequests.filter(request => request.isStopped);
        return [
          renderRequestSection('Assigned to me', processAssigned, data.role, { collapsible: true, open: false }),
          renderRequestSection('In-progress / related requests', processRelatedInProgress, data.role, { collapsible: true, open: false }),
          renderRequestSection('Completed requests', processCompletedRequests, data.role, { collapsible: true, open: false }),
          renderRequestSection('Cancelled / denied requests', processStoppedRequests, data.role, { collapsible: true, open: false })
        ].join('');
      });
      metrics = `
        ${kpi(counts.total || 0, 'Visible requests')}
        ${kpi(counts.waitingForMe || 0, 'Needs my decision')}
        ${kpi(relatedInProgress.length, 'In progress')}
        ${kpi(completedRequests.length, 'Completed')}
      `;
    } else if (data.role === 'requester') {
      sections = renderDashboardProcessGroups(requests, data.role, processRequests => [
        renderRequestSection('Active requests', processRequests.filter(request => request.isPending), data.role),
        renderRequestSection('Closed requests', processRequests.filter(request => request.isClosed), data.role)
      ].join(''));
      metrics = `
        ${kpi(counts.total || 0, 'My Requests')}
        ${kpi(counts.pending || 0, 'In progress')}
        ${kpi(awaitingActual, 'Need actual hours')}
        ${kpi(counts.closed || 0, 'Closed')}
      `;
    } else {
      sections += renderRequestSection('Incomplete requests', requests.filter(request => request.isPending), data.role, { collapsible: true, open: false });
      sections += renderRequestSection('Completed requests', completedRequests, data.role, { collapsible: true, open: false });
      sections += renderRequestSection('Cancelled / denied requests', stoppedRequests, data.role, { collapsible: true, open: false });
      metrics = `
        ${kpi(counts.total || 0, 'All requests')}
        ${kpi(counts.pending || 0, 'Incomplete')}
        ${kpi(completedRequests.length, 'Completed')}
        ${kpi(stoppedRequests.length, 'Cancelled / denied')}
      `;
    }

    return `
      ${data.role === 'admin' ? renderAdminDashboardContext(data) : ''}
      <div class="kpi-row">
        ${metrics}
      </div>
      ${data.role === 'admin' || data.role === 'approver' ? renderDashboardFilter(requests.length) : ''}
      ${sections || '<p class="muted">No requests found.</p>'}
    `;
  }

  function renderDashboardProcessGroups(requests, role, sectionRenderer) {
    return dashboardProcessGroups(requests).map(group => {
      const pending = group.requests.filter(request => request.isPending).length;
      const closed = group.requests.filter(request => request.isClosed && !request.isStopped).length;
      const stopped = group.requests.filter(request => request.isStopped).length;
      const counts = [
        `${group.requests.length} total`,
        `${pending} open`,
        `${closed} completed`,
        stopped ? `${stopped} cancelled / denied` : ''
      ].filter(Boolean);
      return `
        <section class="dashboard-process-group" data-dashboard-process="${escapeHtml(group.key)}">
          <div class="dashboard-process-heading">
            <div>
              <h3>${escapeHtml(group.name)}</h3>
              <span class="request-meta">${escapeHtml(group.key)}</span>
            </div>
            <div class="process-counts">
              ${counts.map(count => `<span>${escapeHtml(count)}</span>`).join('')}
            </div>
          </div>
          <div class="dashboard-process-sections">
            ${sectionRenderer(group.requests, group)}
          </div>
        </section>
      `;
    }).join('');
  }

  function dashboardProcessGroups(requests) {
    const groups = [];
    const byKey = {};
    (requests || []).forEach(request => {
      const key = request.processType || 'request';
      if (!byKey[key]) {
        byKey[key] = {
          key,
          name: request.processName || key,
          requests: []
        };
        groups.push(byKey[key]);
      }
      byKey[key].requests.push(request);
    });
    return groups.sort((a, b) => String(a.name || a.key).localeCompare(String(b.name || b.key)));
  }

  function renderAdminProcessChooser(data) {
    const processes = Array.isArray(data) ? data : (data.adminProcesses || []);
    const dashboards = Array.isArray(data) ? {} : (data.adminDashboards || {});
    const activeView = data.canManageUsers && ['builder', 'users', 'workflows'].indexOf(dashboardState.adminView) !== -1
      ? dashboardState.adminView
      : 'forms';
    return `
      <div class="stack">
        ${renderAdminSubmenu(activeView, data.canManageUsers)}
        ${activeView === 'builder'
          ? renderAdminFormManagement(data.formManagement || {})
          : (activeView === 'users'
            ? renderAdminUserManagement(data.userManagement || {})
            : (activeView === 'workflows'
              ? renderAdminWorkflowManagement(data.workflowManagement || {})
              : renderAdminDashboardChooserContent(data, processes, dashboards)))}
      </div>
    `;
  }

  function renderAdminSubmenu(activeView, canManageUsers) {
    if (!canManageUsers) {
      return '';
    }
    return `
      <nav class="admin-submenu" aria-label="Admin menu">
        ${adminSubmenuButton('forms', 'Form dashboards', activeView)}
        ${adminSubmenuButton('builder', 'Form builder', activeView)}
        ${adminSubmenuButton('users', 'User access', activeView)}
        ${adminSubmenuButton('workflows', 'Approval flows', activeView)}
      </nav>
    `;
  }

  function adminSubmenuButton(view, label, activeView) {
    return `<button class="button secondary ${activeView === view ? 'active' : ''}" type="button" data-admin-view="${escapeHtml(view)}" ${activeView === view ? 'aria-current="page"' : ''}>${escapeHtml(label)}</button>`;
  }

  function renderAdminDashboardChooserContent(data, processes, dashboards) {
    return `
      <div>
        <h3>Admin sections</h3>
        <p class="muted">Select a form to view its requests and admin actions.</p>
      </div>
      ${renderAdminDatabaseStatus(data)}
      ${renderProcessCardGrid(
        processes,
        process => appUrl('dashboard', { role: 'admin', process: process.key }),
        '',
        process => `data-admin-process="${escapeHtml(process.key)}" data-admin-cached="${dashboards[process.key] ? 'true' : 'false'}"`
      )}
    `;
  }

  function renderAdminFormManagement(formManagement) {
    const forms = formManagement.forms || [];
    const stageTypes = formManagement.stageTypes || [];
    const selected = selectedFormBuilderDefinition(forms);
    if (!selected) {
      dashboardState.formBuilderKey = '';
      dashboardState.formBuilderStage = '';
    }
    return `
      <section class="admin-form-builder" data-admin-form-management>
        <div class="panel-header">
          <div>
            <h3>Form builder</h3>
          </div>
        </div>
        ${selected ? renderFormBuilderEditor(selected, formManagement.fieldTypes || [], stageTypes) : renderFormBuilderIndex(forms, stageTypes)}
      </section>
    `;
  }

  function selectedFormBuilderDefinition(forms) {
    if (!forms.length || !dashboardState.formBuilderKey) {
      return null;
    }
    return forms.find(form => form.key === dashboardState.formBuilderKey) || null;
  }

  function renderFormBuilderIndex(forms, stageTypes) {
    return `
      <div class="form-builder-index">
        <section class="form-builder-index-main">
          <div class="dashboard-process-heading">
            <h4>Existing forms</h4>
            <div class="process-counts">
              <span>${escapeHtml(String((forms || []).length))} total</span>
            </div>
          </div>
          ${forms && forms.length
            ? `<div class="form-builder-card-grid">${forms.map(form => renderFormBuilderCard(form, stageTypes)).join('')}</div>`
            : '<p class="admin-empty">No form definitions found.</p>'}
        </section>
        ${renderFormBuilderCreatePanel()}
      </div>
    `;
  }

  function renderFormBuilderCard(form, stageTypes) {
    const definition = form.definition || { forms: {} };
    const stages = formBuilderStages(definition, form.key, stageTypes);
    const sectionCount = stages.reduce((total, stage) => total + ((stage.definition.sections || []).length), 0);
    const questionCount = stages.reduce((total, stage) => {
      return total + (stage.definition.sections || []).reduce((sectionTotal, section) => sectionTotal + ((section.fields || []).length), 0);
    }, 0);
    const usage = (form.processUsage || []).map(process => process.name || process.key).join(', ');
    return `
      <button class="form-builder-card" type="button" data-edit-form-definition="${escapeHtml(form.key)}">
        <span class="form-builder-card-title">${escapeHtml(form.name || form.key)}</span>
        <span class="request-meta">${escapeHtml(form.key)}</span>
        <span class="form-builder-card-description">${escapeHtml(form.description || (usage ? `Used by ${usage}` : 'Not linked to a process'))}</span>
        <span class="form-builder-card-stats">
          <span>${escapeHtml(String(stages.length))} stages</span>
          <span>${escapeHtml(String(sectionCount))} sections</span>
          <span>${escapeHtml(String(questionCount))} questions</span>
        </span>
        <span class="form-builder-card-action">Open editor</span>
      </button>
    `;
  }

  function renderFormBuilderCreatePanel() {
    return `
      <section class="form-builder-create-panel">
        <h4>Create form</h4>
        <div class="form-builder-create-grid">
          <label class="field">
            ${formBuilderLabel('Form key', 'A permanent internal identifier for this form. Use lowercase letters, numbers, underscores, or hyphens. It is used in URLs and database records, so choose it carefully.')}
            <input type="text" data-new-form-key placeholder="e.g. leave_request" autocomplete="off">
          </label>
          <label class="field">
            ${formBuilderLabel('Display name', 'The friendly name admins and users will see for this form. This can be changed later without changing the form key.')}
            <input type="text" data-new-form-name placeholder="Leave Request">
          </label>
          <button class="button primary" type="button" data-create-form-definition title="Create a new unsaved form definition and open it in the editor.">+ Create draft</button>
        </div>
      </section>
    `;
  }

  function formBuilderLabel(label, help) {
    return `<span class="form-builder-control-label"><span>${escapeHtml(label)}</span>${formBuilderHelp(help)}</span>`;
  }

  function formBuilderHelp(help) {
    const text = String(help || '').trim();
    if (!text) {
      return '';
    }
    return `<span class="form-builder-help" tabindex="0" role="note" aria-label="${escapeHtml(text)}" data-tooltip="${escapeHtml(text)}">?</span>`;
  }

  function formBuilderSummary(label, help) {
    return `${escapeHtml(label)}${formBuilderHelp(help)}`;
  }

  function renderFormBuilderEditor(form, fieldTypes, stageTypes) {
    const definition = form.definition || { forms: {} };
    const stages = formBuilderStages(definition, form.key, stageTypes);
    const conditionFields = formBuilderConditionFields(stages);
    const activeStage = formBuilderActiveStage(stages);
    const usage = (form.processUsage || []).map(process => process.name || process.key).join(', ');
    return `
      <div class="form-builder-editor-shell">
        <div class="form-builder-editor-heading">
          <button class="button secondary" type="button" data-form-builder-back title="Return to the list of form definitions. Unsaved changes on this screen are not saved automatically.">Back to forms</button>
          <div>
            <span class="request-meta">Form editor</span>
            <h4>${escapeHtml(definition.name || form.name || form.key)}</h4>
            <span class="request-meta">${escapeHtml(form.key)}${usage ? ` - ${escapeHtml(usage)}` : ''}</span>

        </div>
        <div class="form-builder-editor-layout">
          <form class="form-builder-editor stack" data-admin-form-builder-form data-definition-key="${escapeHtml(form.key)}" novalidate>

              <label class="field">
                ${formBuilderLabel('Form key', 'Read-only once the form exists. This is the stable internal identifier used by processes and stored requests.')}
                <input type="text" value="${escapeHtml(form.key)}" readonly>
              </label>
              <label class="field">
                ${formBuilderLabel('Display name', 'The friendly form name shown in admin screens.')}
                <input type="text" data-definition-field="name" value="${escapeHtml(definition.name || form.name || '')}">
              </label>
              <label class="field workflow-span-2">
                ${formBuilderLabel('Description', 'A short admin-facing description of what this form is for.')}
                <input type="text" data-definition-field="description" value="${escapeHtml(definition.description || form.description || '')}">
              </label>
            </div>
            <div class="form-builder-workspace">
              <aside class="form-builder-stage-rail" aria-label="Form stages">
                <div class="form-builder-stage-rail-heading">
                  <div>
                    <h5>Stages</h5>
                    <span class="request-meta">${escapeHtml(String(stages.length))} screens</span>
                  </div>
                </div>
                ${renderFormBuilderStageTabs(stages, activeStage, stageTypes)}
                ${renderFormBuilderAddStagePanel(stageTypes)}
              </aside>
              <div class="form-builder-stage-main">
                <div class="form-builder-stage-panels">
                  ${stages.map(stage => renderFormBuilderStagePanel(stage, activeStage, fieldTypes, stageTypes, conditionFields)).join('')}
                </div>
                <div class="actions inline form-builder-save-row">
                  <button class="button primary" type="submit" title="Save this form definition to the database.">Save form definition</button>
                </div>
              </div>
            </div>
          </form>
          ${renderFormBuilderPreview(definition, activeStage, stageTypes)}
        </div>
      </div>
    `;
  }

  function formBuilderStages(definition, definitionKey, stageTypes) {
    const forms = definition.forms || {};
    const configuredStages = Array.isArray(definition.stages) ? definition.stages : [];
    const stageMap = {};
    const stageKeys = [];
    configuredStages.forEach(stage => {
      const key = normalize(stage && stage.key).replace(/\s+/g, '_');
      if (!key || stageMap[key]) {
        return;
      }
      stageMap[key] = stage;
      stageKeys.push(key);
    });
    Object.keys(forms).forEach(stageKey => {
      if (stageKeys.indexOf(stageKey) === -1) {
        stageKeys.push(stageKey);
      }
    });
    if (stageKeys.indexOf('request') === -1) {
      stageKeys.unshift('request');
    }
    return ['request'].concat(stageKeys.filter(stageKey => stageKey !== 'request'))
      .filter((stageKey, index, all) => all.indexOf(stageKey) === index)
      .map(stageKey => {
        const stageDefinition = forms[stageKey] || {
          key: stageKey === 'request' ? definitionKey : `${definitionKey}.${stageKey}`,
          sections: []
        };
        const stageMeta = stageMap[stageKey] || {};
        const runtimeType = stageMeta.runtimeType || formBuilderDefaultStageRuntime(stageKey);
        const triggerMode = stageMeta.triggerMode || formBuilderDefaultStageTriggerMode(runtimeType, stageTypes);
        const label = stageMeta.label || stageDefinition.title || formBuilderStageRuntimeLabel(runtimeType, stageTypes) || stageKey;
        return {
          key: stageKey,
          label,
          runtimeType,
          triggerMode,
          description: stageMeta.description || '',
          triggerSummary: stageMeta.triggerSummary || formBuilderStageTriggerSummary(runtimeType, triggerMode, stageMeta, stageTypes),
          required: stageKey === 'request' || Boolean(stageMeta.required),
          when: stageMeta.when || null,
          unless: stageMeta.unless || null,
          definition: stageDefinition
        };
      });
  }

  function formBuilderStageTypes(stageTypes) {
    return stageTypes && stageTypes.length
      ? stageTypes
      : [
        { key: 'request', label: 'Initial request', description: 'The first form a requester completes.', required: true, defaultTriggerMode: 'initial', triggerSummary: 'Available when a requester starts a new request.' },
        { key: 'actual', label: 'Actual-hours confirmation', description: 'Uses the existing actual-hours flow.', required: false, defaultTriggerMode: 'scheduled', triggerSummary: 'Available when an actual-hours process asks for final hours.' },
        { key: 'checklist', label: 'Checklist follow-up', description: 'Uses the existing checklist flow.', required: false, defaultTriggerMode: 'workflow', triggerSummary: 'Available when a process starts a checklist follow-up.' },
        { key: 'generic', label: 'Generic follow-up', description: 'Stores a configurable stage for future or process-specific runtime integrations.', required: false, defaultTriggerMode: 'workflow', triggerSummary: 'Configured in the database.' }
      ];
  }

  function formBuilderStageType(runtimeType, stageTypes) {
    return formBuilderStageTypes(stageTypes).find(item => item.key === runtimeType) || null;
  }

  function formBuilderDefaultStageRuntime(stageKey) {
    return ['request', 'actual', 'checklist'].indexOf(stageKey) !== -1 ? stageKey : 'generic';
  }

  function formBuilderDefaultStageTriggerMode(runtimeType, stageTypes) {
    const stageType = formBuilderStageType(runtimeType, stageTypes);
    return stageType ? stageType.defaultTriggerMode || 'workflow' : 'workflow';
  }

  function formBuilderStageRuntimeLabel(runtimeType, stageTypes) {
    const stageType = formBuilderStageType(runtimeType, stageTypes);
    return stageType ? stageType.label || stageType.key : runtimeType;
  }

  function formBuilderStageTriggerSummary(runtimeType, triggerMode, stageMeta, stageTypes) {
    const stageType = formBuilderStageType(runtimeType, stageTypes);
    const parts = [];
    if (stageType && stageType.triggerSummary) {
      parts.push(stageType.triggerSummary);
    } else {
      parts.push(formBuilderStageTriggerModeLabel(triggerMode));
    }
    if (stageMeta && (stageMeta.when || stageMeta.unless)) {
      parts.push('Conditions configured.');
    }
    return parts.join(' ');
  }

  function formBuilderStageRuntimeOptions(stageTypes, selected) {
    return formBuilderStageTypes(stageTypes).map(item => {
      const key = item.key || '';
      return `<option value="${escapeHtml(key)}" title="${escapeHtml(item.description || item.triggerSummary || item.label || key)}" ${key === selected ? 'selected' : ''}>${escapeHtml(item.label || key)}</option>`;
    }).join('');
  }

  function formBuilderStageTriggerModeOptions(selected) {
    return formBuilderStageTriggerModes().map(item => {
      return `<option value="${escapeHtml(item.key)}" title="${escapeHtml(item.description)}" ${item.key === selected ? 'selected' : ''}>${escapeHtml(item.label)}</option>`;
    }).join('');
  }

  function formBuilderStageTriggerModes() {
    return [
      { key: 'initial', label: 'Initial request', description: 'Starts when the user creates a new request.' },
      { key: 'workflow', label: 'Workflow follow-up', description: 'Starts from a workflow step or after an approval path completes.' },
      { key: 'scheduled', label: 'Scheduled follow-up', description: 'Starts from a server-side reminder or due-date job.' },
      { key: 'manual', label: 'Manual or future', description: 'Stored for manual handling or a future runtime integration.' }
    ];
  }

  function formBuilderStageTriggerModeLabel(mode) {
    const item = formBuilderStageTriggerModes().find(candidate => candidate.key === mode);
    return item ? item.label : mode;
  }

  function formBuilderStageMetaSummary(stage, sectionCount, questionCount, stageTypes) {
    const parts = [];
    const runtimeLabel = formBuilderStageRuntimeLabel(stage.runtimeType, stageTypes);
    const triggerLabel = formBuilderStageTriggerModeLabel(stage.triggerMode);
    if (runtimeLabel) {
      parts.push(runtimeLabel);
    }
    if (triggerLabel && triggerLabel.toLowerCase() !== String(runtimeLabel || '').toLowerCase()) {
      parts.push(triggerLabel);
    }
    parts.push(`${sectionCount} sections`);
    parts.push(`${questionCount} questions`);
    return parts.join(' - ');
  }

  function formBuilderConditionFields(stages) {
    const fields = [
      { name: 'processType', label: 'Process type', options: [] },
      { name: 'requestId', label: 'Request ID', options: [] },
      { name: 'employeeEmail', label: 'Employee email', options: [] },
      { name: 'requesterEmail', label: 'Requester email', options: [] },
      { name: 'lineManagerEmail', label: 'Line manager email', options: [] }
    ];
    (stages || []).forEach(stage => {
      const group = stage.label || stage.key || '';
      ((stage.definition || {}).sections || []).forEach(section => {
        (section.fields || []).forEach(field => {
          if (!field || !field.name || fields.some(candidate => candidate.name === field.name)) {
            return;
          }
          fields.push({
            name: field.name,
            label: field.validationLabel || field.label || field.name,
            group,
            options: formBuilderConditionOptions(field.options)
          });
        });
      });
    });
    return fields;
  }

  function formBuilderConditionOptions(options) {
    if (!Array.isArray(options)) {
      return [];
    }
    return options.map(option => {
      if (option && typeof option === 'object') {
        return option.value || option.label || option.name || '';
      }
      return String(option || '');
    }).filter(Boolean);
  }

  function formBuilderActiveStage(stages) {
    return (stages.find(stage => stage.key === dashboardState.formBuilderStage) || stages[0] || { key: 'request' }).key;
  }

  function renderFormBuilderStageTabs(stages, activeStage, stageTypes) {
    return `

  }

  function renderFormBuilderStageNavItem(stage, activeStage, stageTypes) {
    const definition = stage.definition || {};

    return `

        ${stage.key === 'request' ? '' : `

            <button class="button secondary form-builder-icon-button" type="button" data-move-form-stage="down" title="Move stage down" aria-label="Move stage down">&darr;</button>
            <button class="button danger form-builder-remove-button" type="button" data-remove-form-stage title="Remove this stage from the form definition. Existing submitted data is not deleted, but future users will not see this stage.">Remove</button>
          </div>

      </div>

  function renderFormBuilderAddStagePanel(stageTypes) {
    return `
      <details class="workflow-optional-panel form-builder-add-stage-panel">

          <button class="button secondary" type="button" data-add-form-stage title="Add this stage to the form definition.">+ Add stage</button>
        </div>

  function renderFormBuilderStagePanel(stage, activeStage, fieldTypes, stageTypes, conditionFields) {

              <input type="text" data-stage-field="title" value="${escapeHtml(definition.title || '')}">

            <label class="field workflow-span-2">

              <input type="text" data-stage-field="description" value="${escapeHtml(definition.description || '')}">

            <label class="field workflow-span-2">
              ${formBuilderLabel('Intro HTML', 'Optional rich introductory content shown before sections. Use only trusted HTML because it is rendered into the page.')}
              <textarea rows="3" data-stage-field="introHtml">${escapeHtml(definition.introHtml || '')}</textarea>
            </label>
            <label class="field">
              ${formBuilderLabel('Submit label', 'Text on the main submit button for this stage, such as Submit request or Submit checklist.')}
              <input type="text" data-stage-field="submitLabel" value="${escapeHtml(definition.submitLabel || '')}">

              <input type="text" data-stage-field="adjustmentFields" value="${escapeHtml((definition.adjustmentFields || []).join(', '))}" placeholder="fieldOne, fieldTwo">
            </label>
          </div>
          <details class="workflow-optional-panel workflow-span-2">

            <div class="workflow-step-grid">
              ${renderConditionBuilder('stageWhen', 'Start when', formBuilderConditionText(stage.when), conditionFields || [], 'No start condition. This stage applies whenever its trigger starts it.')}

        <div class="form-builder-section-list" data-form-section-list>

        <div class="actions inline">
          <button class="button primary" type="button" data-add-form-section title="Add a new section to this stage.">+ Add section</button>
        </div>
      </section>
    `;
  }

  function renderFormBuilderSection(section, index, fieldTypes) {

        <div class="form-builder-field-list" data-form-field-list>

        </div>
        <div class="actions inline">
          <button class="button primary" type="button" data-add-form-field title="Add a new question to this section.">+ Add question</button>
        </div>
      </article>
    `;
  }

  function renderFormBuilderField(field, index, fieldTypes) {
    const type = field.type || 'text';
    const optionsText = formBuilderOptionsText(field.options);
    return `
      <article class="form-builder-field" data-form-field>
        <div class="form-builder-question-row">
          <span class="workflow-step-order" data-field-order>${escapeHtml(String(index + 1))}</span>
          <div class="form-builder-question-main">
            <label class="field">
              ${formBuilderLabel('Question label', 'The question text users will read on the form. Keep this clear and specific.')}
              <input type="text" data-field-prop="label" value="${escapeHtml(field.label || '')}" placeholder="Untitled question">
            </label>
            <span class="request-meta">${escapeHtml(formBuilderFieldTypeLabel(type, fieldTypes))}${field.name ? ` - ${escapeHtml(field.name)}` : ''}</span>
          </div>
          <label class="field form-builder-question-type">
            ${formBuilderLabel('Type', 'Controls how the user answers: text boxes, dates, dropdowns, radio buttons, checklist choices, content blocks, summaries, and specialised calculated/warning blocks.')}
            <select data-field-prop="type" title="${escapeHtml(formBuilderFieldTypeDescription(type, fieldTypes))}">

          <div class="form-builder-row-actions">

          </div>
        </div>
        <details class="workflow-optional-panel form-builder-question-config">
          <summary>${formBuilderSummary('Question settings', 'Common settings for the selected question: internal field name, layout, help text, and whether the question must be answered.')}</summary>
          <div class="form-builder-field-grid">
            <label class="field">
              ${formBuilderLabel('Field name', 'The internal name used to store this answer and reference it in workflows, conditions, emails, exports, and dashboards. Use a short camelCase name and avoid changing it after requests exist.')}
              <input type="text" data-field-prop="name" value="${escapeHtml(field.name || '')}" placeholder="camelCaseName">
            </label>
            <label class="field">
              ${formBuilderLabel('Layout', 'Controls how wide this question appears inside its section. Full width is useful for long text, instructions, or checklist-style questions.')}
              <select data-field-prop="layout">
                ${formBuilderFieldLayoutOptions(field.layout || '')}
              </select>
            </label>
            <label class="field workflow-span-2">
              ${formBuilderLabel('Help text', 'Small guidance shown under the question label on the user-facing form. Use this to explain what answer is expected.')}
              <input type="text" data-field-prop="help" value="${escapeHtml(field.help || '')}">
            </label>
            <label class="check-row">
              <input type="checkbox" data-field-prop="required" ${field.required ? 'checked' : ''}>
              <span>Required ${formBuilderHelp('Users must answer this question before they can submit the stage. For checkbox-style confirmation questions, use Must be checked when the user must tick the box.')}</span>
            </label>
            <label class="check-row">
              <input type="checkbox" data-field-prop="mustBeChecked" ${field.mustBeChecked ? 'checked' : ''}>
              <span>Must be checked ${formBuilderHelp('For checkbox-style questions, the answer must be ticked/affirmative rather than merely present. Useful for acknowledgements and confirmations.')}</span>
            </label>
          </div>
        </details>
        <details class="workflow-optional-panel form-builder-question-config" data-form-field-options-panel ${formBuilderFieldSupportsOptions(type) ? '' : 'hidden'}>
          <summary>${formBuilderSummary('Answer options', 'Choices shown for dropdown, radio, choice-card, and checklist-choice questions.')}</summary>
          <div class="workflow-step-grid">
            <label class="field workflow-span-2">
              ${formBuilderLabel('Options', 'One option per line for simple choices. Advanced options can be JSON objects with value and label properties.')}
              <textarea rows="4" data-field-prop="options" placeholder="One option per line, or JSON for complex options">${escapeHtml(optionsText)}</textarea>
            </label>
          </div>
        </details>
        <details class="workflow-optional-panel form-builder-question-config" data-form-field-content-panel ${formBuilderFieldSupportsContent(type) ? '' : 'hidden'}>
          <summary>${formBuilderSummary('Display content', 'Content shown to the user without collecting an answer. Use for instructions, policy text, or separators that need richer formatting.')}</summary>
          <div class="workflow-step-grid">
            <label class="field workflow-span-2">
              ${formBuilderLabel('Content HTML', 'HTML rendered directly into the form. Use only trusted, simple markup. This field does not collect an answer.')}
              <textarea rows="3" data-field-prop="html">${escapeHtml(field.html || '')}</textarea>
            </label>
          </div>
        </details>
        <details class="workflow-optional-panel form-builder-question-config">
          <summary>${formBuilderSummary('Conditional and advanced settings', 'Less common settings: hidden/default values, conditional visibility/required rules, and raw schema properties not yet exposed as controls.')}</summary>
          <div class="workflow-step-grid">
            <label class="field">
              ${formBuilderLabel('Hidden value', 'Stores a fixed value for hidden fields or specialised calculated flows. Most normal questions should leave this blank.')}
              <input type="text" data-field-prop="hiddenValue" value="${escapeHtml(field.hiddenValue || '')}">
            </label>
            <label class="field">
              ${formBuilderLabel('Default value', 'Initial value shown before the user answers. Use only when a sensible default reduces work without hiding a decision.')}
              <input type="text" data-field-prop="defaultValue" value="${escapeHtml(field.defaultValue || '')}">
            </label>
            <label class="field workflow-span-2">
              ${formBuilderLabel('Visible when JSON', 'Condition JSON that decides when this question appears, for example {"field":"multiDayEvent","equals":"Yes"}. Leave blank when always visible.')}
              <textarea rows="3" data-field-prop="visibleWhen">${escapeHtml(field.visibleWhen ? JSON.stringify(field.visibleWhen, null, 2) : '')}</textarea>
            </label>
            <label class="field workflow-span-2">
              ${formBuilderLabel('Required when JSON', 'Condition JSON that makes this question required only in specific cases. Leave blank when the normal Required checkbox is enough.')}
              <textarea rows="3" data-field-prop="requiredWhen">${escapeHtml(field.requiredWhen ? JSON.stringify(field.requiredWhen, null, 2) : '')}</textarea>
            </label>
            <label class="field workflow-span-2">
              ${formBuilderLabel('Additional properties JSON', 'Raw field-level JSON for supported properties that are not yet represented by visual controls. Invalid JSON will prevent saving.')}
              <textarea rows="4" data-field-extra-json>${escapeHtml(formBuilderExtraJson(field))}</textarea>
            </label>
          </div>
        </details>
      </article>
    `;
  }

  function formBuilderFieldTypeLabel(type, fieldTypes) {
    const item = (fieldTypes || []).find(candidate => candidate.value === type);
    return item ? item.label || item.value : type;
  }

  function formBuilderFieldTypeDescription(type, fieldTypes) {
    const item = (fieldTypes || []).find(candidate => candidate.value === type);
    return item ? item.description || item.label || item.value || '' : '';
  }

  function formBuilderFieldTypeOptions(fieldTypes, selected) {
    return (fieldTypes || []).map(item => {
      const value = item.value || '';
      const label = item.label || value;
      const description = item.description || label;
      return `<option value="${escapeHtml(value)}" title="${escapeHtml(description)}" ${value === selected ? 'selected' : ''}>${escapeHtml(label)}</option>`;
    }).join('');
  }

  function formBuilderFieldSupportsOptions(type) {
    return ['radio', 'select', 'choiceCards', 'checklistChoice'].indexOf(type) !== -1;
  }

  function formBuilderFieldSupportsContent(type) {
    return type === 'content';
  }

  function renderFormBuilderPreview(definition, activeStage, stageTypes) {
    const stages = formBuilderStages(definition || {}, '', stageTypes);
    const stage = stages.find(item => item.key === activeStage) || stages[0] || { key: 'request', definition: { sections: [] } };
    const stageDefinition = stage.definition || {};
    const title = stageDefinition.title || definition.name || stage.label || stage.key;
    return `
      <aside class="form-builder-preview" data-form-builder-preview>
        <div class="form-builder-preview-heading">
          <span>Live preview</span>
          <strong>${escapeHtml(stage.label)} view</strong>
        </div>
        <div class="form-builder-preview-surface">
          <div class="form-builder-preview-form">
            <h4>${escapeHtml(title)}</h4>
            ${stageDefinition.description ? `<p class="muted">${escapeHtml(stageDefinition.description)}</p>` : ''}
            ${stageDefinition.introHtml ? `<div class="form-builder-preview-content">${stageDefinition.introHtml}</div>` : ''}
            ${(stageDefinition.sections || []).map(renderFormBuilderPreviewSection).join('')}
            <button class="button primary form-builder-preview-submit" type="button">${escapeHtml(stageDefinition.submitLabel || 'Submit')}</button>
          </div>
        </div>
      </aside>
    `;
  }

  function renderFormBuilderPreviewSection(section) {
    const layout = section.layout === 'grid-three' ? 'grid-three' : (section.layout === 'stack' ? 'stack' : 'grid');
    return `
      <section class="form-builder-preview-section">
        ${section.title ? `<h5>${escapeHtml(section.title)}</h5>` : ''}
        ${section.description ? `<p class="muted">${escapeHtml(section.description)}</p>` : ''}
        <div class="${escapeHtml(layout)}">
          ${(section.fields || []).map(renderFormBuilderPreviewField).join('')}
        </div>
      </section>
    `;
  }

  function renderFormBuilderPreviewField(field) {
    const type = field.type || 'text';
    if (type === 'hidden') {
      return '';
    }
    if (type === 'divider') {
      return '<hr class="form-builder-preview-divider">';
    }
    if (type === 'content') {
      return `<div class="form-builder-preview-content ${field.layout === 'full' ? 'full' : ''}">${field.html || escapeHtml(field.label || 'Content block')}</div>`;
    }
    if (type === 'requestSummary') {
      return `<div class="form-builder-preview-placeholder ${field.layout === 'full' ? 'full' : ''}">Request summary</div>`;
    }
    if (type === 'mealRules') {
      return `<div class="form-builder-preview-placeholder ${field.layout === 'full' ? 'full' : ''}">Meal break rules</div>`;
    }
    if (type === 'hoursWarning') {
      return `<div class="form-builder-preview-warning ${field.layout === 'full' ? 'full' : ''}">${escapeHtml(field.compareWarningTitle || field.label || 'Hours warning')}</div>`;
    }
    const label = field.label || field.name || 'Untitled question';
    const required = field.required || field.mustBeChecked;
    const fullClass = field.layout === 'full' || type === 'textarea' || type === 'choiceCards' || type === 'checklistChoice' ? ' full' : '';
    return `
      <label class="form-builder-preview-field${fullClass}">
        <span>${escapeHtml(label)}${required ? ' *' : ''}</span>
        ${field.help ? `<small>${escapeHtml(field.help)}</small>` : ''}
        ${renderFormBuilderPreviewControl(field)}
      </label>
    `;
  }

  function renderFormBuilderPreviewControl(field) {
    const type = field.type || 'text';
    const options = field.options || [];
    if (type === 'textarea') {
      return '<textarea rows="3" disabled></textarea>';
    }
    if (type === 'select') {
      return `<select disabled><option>${escapeHtml(formBuilderOptionLabel(options[0]) || 'Select')}</option></select>`;
    }
    if (type === 'radio' || type === 'checklistChoice') {
      const previewOptions = options.length ? options : ['Yes', 'No'];
      return `<div class="form-builder-preview-choice-list">${previewOptions.map(option => `<span><input type="radio" disabled> ${escapeHtml(formBuilderOptionLabel(option))}</span>`).join('')}</div>`;
    }
    if (type === 'choiceCards') {
      const previewOptions = options.length ? options : ['Option'];
      return `<div class="form-builder-preview-choice-cards">${previewOptions.map(option => `<span>${escapeHtml(formBuilderOptionLabel(option))}</span>`).join('')}</div>`;
    }
    if (type === 'checkbox') {
      return '<span class="form-builder-preview-check"><input type="checkbox" disabled> Yes</span>';
    }
    const htmlType = ['email', 'date', 'time', 'number'].indexOf(type) !== -1 ? type : 'text';
    return `<input type="${escapeHtml(htmlType)}" disabled>`;
  }

  function formBuilderOptionLabel(option) {
    if (option && typeof option === 'object') {
      return option.label || option.value || '';
    }
    return String(option || '');
  }

  function formBuilderLayoutOptions(selected) {
    const options = [
      { value: '', label: 'Default', description: 'Use the standard section layout.' },
      { value: 'grid', label: 'grid', description: 'Arrange questions in the normal two-column layout.' },
      { value: 'grid-three', label: 'grid-three', description: 'Arrange short questions across three compact columns.' },
      { value: 'stack', label: 'stack', description: 'Place each question on its own full-width row.' }
    ];
    return options.map(item => `<option value="${escapeHtml(item.value)}" title="${escapeHtml(item.description)}" ${item.value === selected ? 'selected' : ''}>${escapeHtml(item.label)}</option>`).join('');
  }

  function formBuilderFieldLayoutOptions(selected) {
    const options = [
      { value: '', label: 'Default', description: 'Use the normal question width for this section layout.' },
      { value: 'full', label: 'full', description: 'Make this question span the full width of the section.' },
      { value: 'checklist', label: 'checklist', description: 'Use checklist styling for acknowledgement-style questions.' }
    ];
    return options.map(item => `<option value="${escapeHtml(item.value)}" title="${escapeHtml(item.description)}" ${item.value === selected ? 'selected' : ''}>${escapeHtml(item.label)}</option>`).join('');
  }

  function formBuilderOptionsText(options) {
    if (!Array.isArray(options) || !options.length) {
      return '';
    }
    if (options.every(option => typeof option === 'string')) {
      return options.join('\n');
    }
    return JSON.stringify(options, null, 2);
  }

  function formBuilderConditionText(condition) {
    return condition ? JSON.stringify(condition, null, 2) : '';
  }

  function formBuilderExtraJson(field) {
    const extra = {};
    const known = formBuilderKnownFieldKeys();
    Object.keys(field || {}).forEach(key => {
      if (!known[key]) {
        extra[key] = field[key];
      }
    });
    return Object.keys(extra).length ? JSON.stringify(extra, null, 2) : '';
  }

  function formBuilderStageExtraJson(stage) {
    const extra = {};
    const known = ['key', 'title', 'description', 'introHtml', 'submitLabel', 'editSubmitLabel', 'adjustmentFields', 'sections'].reduce((map, key) => {
      map[key] = true;
      return map;
    }, {});
    Object.keys(stage || {}).forEach(key => {
      if (!known[key]) {
        extra[key] = stage[key];
      }
    });
    return Object.keys(extra).length ? JSON.stringify(extra, null, 2) : '';
  }

  function formBuilderKnownFieldKeys() {
    return ['type', 'name', 'label', 'help', 'layout', 'required', 'mustBeChecked', 'options', 'html', 'hiddenValue', 'defaultValue', 'visibleWhen', 'requiredWhen'].reduce((map, key) => {
      map[key] = true;
      return map;
    }, {});
  }

  function renderAdminUserManagement(userManagement) {
    const globalAdmins = userManagement.globalAdmins || [];
    const processes = userManagement.processes || [];
    return `
      <section class="admin-users" data-admin-user-management>
        <div class="admin-users-heading">
          <div>
            <h3>User access</h3>
            <p class="muted">Manage global admins and process dashboard admins.</p>
          </div>
        </div>
        <form class="stack" data-admin-user-form novalidate>
          ${renderAdminAddPanel(processes)}
          ${renderAdminAccessTable(globalAdmins, processes)}
          <div class="actions inline">
            <button class="button primary" type="submit">Save changes</button>
          </div>
        </form>
      </section>
    `;
  }

  function renderAdminAddPanel(processes) {
    const processOptions = (processes || []).map(process => {
      return `<option value="processAdmins::${escapeHtml(process.key)}">${escapeHtml(process.name || process.key)} dashboard</option>`;
    }).join('');
    return `
      <fieldset class="admin-add-panel" data-admin-add-panel>
        <legend>Add admin</legend>
        <div class="admin-add-grid">
          <label class="field">
            <span>Email</span>
            <input type="email" inputmode="email" autocomplete="off" placeholder="name@example.edu" data-admin-email-input>
          </label>
          <label class="field">
            <span>Access</span>
            <select data-admin-scope-select>
              <option value="globalAdmins::global">Global admins</option>
              ${processOptions}
            </select>
          </label>
          <button class="button secondary" type="button" data-add-admin-email>Add admin</button>
        </div>
      </fieldset>
    `;
  }

  function renderAdminAccessTable(globalAdmins, processes) {
    const rows = [
      renderAdminAccessTableRow({
        scope: 'globalAdmins',
        key: 'global',
        title: 'Global admins',
        description: 'All dashboards and user access',
        emails: globalAdmins || []
      })
    ].concat((processes || []).map(process => renderAdminAccessTableRow({
      scope: 'processAdmins',
      key: process.key,
      title: `${process.name || process.key} dashboard`,
      description: process.description || 'Dashboard access',
      emails: process.adminEmails || []
    })));
    return `
      <div class="admin-access-table-wrap">
        <table class="admin-access-table">
          <caption>Admin access</caption>
          <thead>
            <tr>
              <th scope="col">Access</th>
              <th scope="col">Admins</th>
            </tr>
          </thead>
          <tbody>
            ${rows.join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  function renderAdminAccessTableRow(options) {
    const count = (options.emails || []).length;
    return `
      <tr data-admin-access-group>
        <th scope="row">
          <div class="admin-access-label">
            <strong>${escapeHtml(options.title)}</strong>
            <span>${escapeHtml(options.description || '')}</span>
            <span class="admin-access-count" data-admin-count>${escapeHtml(adminCountLabel(count))}</span>
          </div>
        </th>
        <td>
          ${renderAdminEmailList(options.scope, options.key, options.emails || [])}
        </td>
      </tr>
    `;
  }

  function renderAdminEmailList(scope, key, emails) {
    return `
      <div class="admin-user-list" data-admin-list="${escapeHtml(scope)}" data-process-key="${escapeHtml(key || '')}">
        ${(emails || []).map(renderAdminEmailRow).join('')}
        <p class="admin-empty" data-admin-empty ${emails && emails.length ? 'hidden' : ''}>No admins assigned.</p>
      </div>
    `;
  }

  function renderAdminEmailRow(email) {
    return `
      <div class="admin-user-row" data-admin-email="${escapeHtml(email)}">
        <span class="admin-user-email">${escapeHtml(email)}</span>
        <button class="button secondary" type="button" data-remove-admin-email>Remove</button>
      </div>
    `;
  }

  function adminCountLabel(count) {
    return `${count} admin${count === 1 ? '' : 's'}`;
  }

  function renderAdminWorkflowManagement(workflowManagement) {
    const processes = workflowManagement.processes || [];
    if (!processes.length) {
      return '<p class="muted">No enabled processes are available.</p>';
    }

    let selectedKey = dashboardState.workflowProcess;
    if (!processes.some(process => process.key === selectedKey)) {
      selectedKey = processes[0].key;
      dashboardState.workflowProcess = selectedKey;
    }
    const process = processes.find(item => item.key === selectedKey) || processes[0];
    const stages = process.stages && process.stages.length
      ? process.stages
      : [{ key: 'approval', label: 'Approval', steps: [] }];
    const conditionFields = process.conditionFields || [];
    const recipientFields = process.recipientFields || [];
    const formStages = process.formStages || [];
    let activeStage = dashboardState.workflowStage;
    if (!stages.some(stage => stage.key === activeStage)) {
      activeStage = stages[0].key;
      dashboardState.workflowStage = activeStage;
    }

    return `
      <section class="admin-workflows" data-admin-workflow-management>
        <div class="admin-users-heading">
          <div>
            <h3>Approval flows</h3>
            <p class="muted">Configure approval, action, acknowledgement, and notification steps.</p>
          </div>
        </div>
        <form class="workflow-editor stack" data-admin-workflow-form data-process-key="${escapeHtml(process.key)}" novalidate>
          <div class="workflow-editor-toolbar">
            <label class="field workflow-process-field">
              <span>Process</span>
              <select data-workflow-process-select>
                ${processes.map(item => `<option value="${escapeHtml(item.key)}" ${item.key === process.key ? 'selected' : ''}>${escapeHtml(item.name || item.key)}</option>`).join('')}
              </select>
            </label>
            <div class="workflow-editor-meta">
              <strong>${escapeHtml(process.name || process.key)}</strong>
              <span>${escapeHtml(process.description || 'Workflow configuration')}</span>
            </div>
          </div>
          ${renderWorkflowStageTabs(stages, activeStage)}
          <div class="workflow-stage-panels">
            ${stages.map(stage => renderWorkflowStagePanel(stage, activeStage, stages, conditionFields, recipientFields, formStages)).join('')}
          </div>
          <div class="actions inline">
            <button class="button primary" type="submit">Save workflow</button>
          </div>
        </form>
      </section>
    `;
  }

  function renderWorkflowStageTabs(stages, activeStage) {
    return `
      <div class="workflow-stage-tabs" role="tablist" aria-label="Workflow stages">
        ${stages.map(stage => `
          <button class="button secondary ${stage.key === activeStage ? 'active' : ''}" type="button" role="tab" data-workflow-stage-tab="${escapeHtml(stage.key)}" ${stage.key === activeStage ? 'aria-selected="true"' : 'aria-selected="false"'}>
            ${escapeHtml(stage.label || stage.key)}
          </button>
        `).join('')}
      </div>
    `;
  }

  function renderWorkflowStagePanel(stage, activeStage, stages, conditionFields, recipientFields, formStages) {
    const steps = stage.steps || [];
    return `
      <section class="workflow-stage-editor" data-workflow-stage-panel data-workflow-stage="${escapeHtml(stage.key)}" ${stage.key === activeStage ? '' : 'hidden'}>
        <div class="workflow-stage-editor-heading">
          <div>
            <h4>${escapeHtml(stage.label || stage.key)}</h4>
            <p class="muted">${escapeHtml(workflowStageHelp(stage.key))}</p>
          </div>
          <button class="button secondary" type="button" data-add-workflow-step data-stage-key="${escapeHtml(stage.key)}">Add step</button>
        </div>
        <div class="workflow-step-list-editor" data-workflow-step-list>
          ${steps.map((step, index) => renderWorkflowStepEditor(step, index, stages, false, conditionFields, recipientFields, formStages)).join('')}
          <p class="admin-empty" data-workflow-empty ${steps.length ? 'hidden' : ''}>No steps in this stage.</p>
        </div>
      </section>
    `;
  }

  function renderWorkflowStepEditor(step, index, stages, openDetails, conditionFields, recipientFields, formStages) {
    const normalized = step || {};
    const type = normalized.type || 'notification';
    const name = normalized.name || '';
    const order = index + 1;
    const isBlockingStep = isWorkflowEditorBlockingType(type);
    const waitingLabel = isBlockingStep ? (normalized.waitingLabel || workflowDefaultWaitingLabelTemplate()) : '';
    const copyMode = workflowEmailCopyMode(normalized);
    return `
      <article class="workflow-editor-step" data-workflow-step>
        <div class="workflow-step-topline">
          <button class="workflow-drag-handle" type="button" data-workflow-drag-handle draggable="true" title="Drag to reorder" aria-label="Drag step">Drag</button>
          <span class="workflow-step-order" data-step-order>${escapeHtml(String(order))}</span>
          <label class="field workflow-step-name">
            <span>Step name</span>
            <input type="text" data-step-field="name" value="${escapeHtml(name)}" required>
          </label>
          <label class="field workflow-step-type">
            <span>Type</span>
            <select data-step-field="type">
              ${workflowStepTypeOptions(type)}
            </select>
          </label>
          <div class="workflow-step-actions">
            <button class="button secondary" type="button" data-move-workflow-step="up">Up</button>
            <button class="button secondary" type="button" data-move-workflow-step="down">Down</button>
            <button class="button danger" type="button" data-remove-workflow-step>Remove</button>
          </div>
        </div>
        <p class="workflow-step-preview">${escapeHtml(workflowStepPreview(normalized))}</p>
        <details class="workflow-step-details" ${openDetails ? 'open' : ''}>
          <summary>Step settings</summary>
          <div class="workflow-step-editor-body">
            ${renderWorkflowRecipientControls(normalized, type, recipientFields || [])}
            ${renderWorkflowFollowUpControls(normalized, isBlockingStep, formStages || [])}
            <details class="workflow-optional-panel" data-workflow-action-panel ${isBlockingStep ? '' : 'hidden'}>
              <summary>Action requirements</summary>
              <label class="check-row">
                <input type="checkbox" data-step-field="requireComment" value="true" ${normalized.requireComment ? 'checked' : ''}>
                <span>Require notes before this step can be completed</span>
              </label>
              <p class="workflow-condition-note">Use this for verification or action steps where the response needs an audit note.</p>
            </details>
            <details class="workflow-optional-panel" data-workflow-waiting-panel ${isBlockingStep ? '' : 'hidden'}>
              <summary>Dashboard text</summary>
              <div class="workflow-waiting-preview" data-workflow-waiting-preview>
                ${escapeHtml(workflowWaitingLabelPreview(Object.assign({}, normalized, { waitingLabel })))}
              </div>
              <div class="workflow-step-grid">
                <label class="field workflow-span-2">
                  <span>Waiting message</span>
                  <textarea rows="2" data-step-field="waitingLabel" required>${escapeHtml(waitingLabel)}</textarea>
                </label>
              </div>
              <p class="workflow-condition-note">Use placeholders: {Step name}, {Step email}, {Action}, {Employee name}, {Employee email}, {Request ID}.</p>
            </details>
            <details class="workflow-optional-panel" data-workflow-copy-panel>
              <summary>Email copy <span class="workflow-copy-mode">${escapeHtml(copyMode)}</span></summary>
              ${renderWorkflowEmailCopyPreview(normalized)}
              <div class="workflow-step-grid">
                <label class="field">
                  <span>Custom email heading</span>
                  <input type="text" data-step-field="subject" value="${escapeHtml(normalized.subject || '')}" placeholder="${escapeHtml(normalized.defaultSubject || '')}">
                </label>
                <label class="field workflow-span-2">
                  <span>Custom email message</span>
                  <textarea rows="3" data-step-field="message" placeholder="${escapeHtml(normalized.defaultMessage || '')}">${escapeHtml(normalized.message || '')}</textarea>
                </label>
              </div>
            </details>
            <details class="workflow-optional-panel" data-workflow-conditions-panel>
              <summary>Conditions</summary>
              <div class="workflow-step-grid">
                ${renderConditionBuilder('whenJson', 'Run when', normalized.whenJson || '', conditionFields || [])}
                ${renderConditionBuilder('unlessJson', 'Skip when', normalized.unlessJson || '', conditionFields || [])}
              </div>
            </details>
          </div>
        </details>
      </article>
    `;
  }

  function renderWorkflowRecipientControls(step, type, recipientFields) {
    const normalized = step || {};
    const emails = Array.isArray(normalized.emails) ? normalized.emails.join('\n') : String(normalized.emails || '');
    const ccEmails = Array.isArray(normalized.ccEmails) ? normalized.ccEmails.join('\n') : String(normalized.ccEmails || '');

          <label class="field workflow-span-2" data-recipient-panel data-recipient-modes="request-fields advanced">
            <span>Request email fields</span>
            <select multiple size="${Math.min(Math.max((recipientFields || []).length, 3), 6)}" data-step-field="emailFields" data-recipient-field>
              ${workflowRecipientFieldOptions(recipientFields, emailFields)}
            </select>
          </label>
          <label class="field workflow-span-2" data-workflow-notification-cc ${normalizeWorkflowEditorStepType(type) === 'notification' ? '' : 'hidden'}>
            <span>CC email addresses</span>

          </label>
