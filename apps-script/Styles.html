<style>
  @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap');

  :root {
    color-scheme: light;
    --navy: #021d49;
    --navy-2: #192a5e;
    --red: #ce0e2d;
    --red-2: #a90f28;
    --cream: #eadfb5;
    --cream-soft: #f8f4e7;
    --surface: #ffffff;
    --field: #fbfaf5;
    --ink: #162033;
    --muted: #626a76;
    --line: #ded7c7;
    --line-strong: #c8bfa8;
    --success-bg: #f1f5ec;
    --warning-bg: #fff8e4;
    --danger-bg: #fff1f3;
    --focus: #ce0e2d;
  }

  * {
    box-sizing: border-box;
  }

  html {
    min-height: 100%;
    background: var(--cream-soft);
  }

  body {
    margin: 0;
    color: var(--ink);
    font: 15px/1.5 "Open Sans", Arial, Helvetica, sans-serif;
    background:
      linear-gradient(180deg, var(--navy) 0, var(--navy) 124px, var(--cream-soft) 124px, var(--cream-soft) 100%);
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
  }

  a {
    color: var(--red);
  }

  .shell {
    width: min(1180px, calc(100% - 32px));
    margin: 0 auto;
    padding: 20px 0 56px;
  }

  .topbar {
    display: grid;
    grid-template-columns: minmax(260px, 1fr) auto;
    align-items: center;
    gap: 18px;
    margin-bottom: 20px;
    border: 1px solid rgba(255, 255, 255, .18);
    border-bottom: 4px solid var(--red);
    border-radius: 8px;
    background: rgba(2, 29, 73, .96);
    color: #fff;
    padding: 14px 16px;
    box-shadow: 0 18px 36px rgba(2, 29, 73, .20);
  }

  .topbar.sign-in-topbar {
    grid-template-columns: 1fr;
  }

  .brand-lockup {
    display: grid;
    grid-template-columns: 42px minmax(0, 1fr);
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .brand-mark {
    display: block;
    width: 42px;
    height: 64px;
    object-fit: contain;
    border-radius: 0;
    background: transparent;
    filter: drop-shadow(0 2px 2px rgba(0, 0, 0, .18));
  }

  .topnav {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 8px;
  }

  .topnav a,
  .topnav button,
  .tabs button {
    border: 1px solid rgba(234, 223, 181, .55);
    border-radius: 6px;
    background: rgba(255, 255, 255, .08);
    color: #fff;
    padding: 8px 11px;
    text-decoration: none;
    font-weight: 800;
    font-size: 13px;
  }

  .topnav button {
    cursor: pointer;
    font-family: inherit;
  }

  .topnav a:hover,
  .topnav a:focus-visible,
  .topnav button:hover,
  .topnav button:focus-visible {
    border-color: #fff;
    background: rgba(255, 255, 255, .16);
  }

  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tabs button {
    cursor: pointer;
    background: var(--surface);
    color: var(--navy);
    border-color: var(--line);
  }

  .tabs button:hover {
    border-color: var(--red);
    color: var(--red);
  }

  .tabs button.active {
    border-color: var(--red);
    background: var(--red);
    color: #fff;
  }

  .eyebrow {
    margin: 0 0 3px;
    color: var(--cream);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  h1,
  h2,
  h3 {
    margin: 0;
    letter-spacing: 0;
  }

  h1 {
    overflow-wrap: anywhere;
    font-size: clamp(22px, 3vw, 31px);
    line-height: 1.12;
  }

  h2 {
    color: var(--navy);
    font-size: 21px;
    line-height: 1.25;
  }

  h3 {
    color: var(--navy);
    font-size: 15px;
    font-weight: 800;
  }

  h4 {
    margin: 0;
    color: var(--navy);
    font-size: 14px;
    font-weight: 800;
  }

  p {
    margin: 0;
  }

  .global-progress {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: grid;
    place-items: center;
    padding: 24px;
    background: rgba(2, 29, 73, .46);
    backdrop-filter: blur(2px);
    cursor: progress;
    pointer-events: auto;
  }

  .global-progress[hidden] {
    display: none;
  }

  .progress-card {
    display: grid;
    gap: 10px;
    width: min(420px, 100%);
    border: 1px solid var(--line);
    border-top: 4px solid var(--red);
    border-radius: 8px;
    background: rgba(255, 255, 255, .98);
    color: var(--navy);
    padding: 18px;
    box-shadow: 0 22px 54px rgba(2, 29, 73, .28);
  }

  .progress-track {
    height: 8px;
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--cream-soft);
  }

  .progress-bar {
    display: block;
    width: 0;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, var(--red), var(--navy-2));
    transition: width .35s ease;
  }

  .progress-card [data-progress-label] {
    font-size: 16px;
    font-weight: 800;
  }

  .progress-help {
    color: var(--muted);
    font-size: 13px;
  }

  body.is-loading {
    cursor: progress;
  }

  .workspace,
  .stack {
    display: grid;
    gap: 16px;
  }

  .panel {
    position: relative;
    overflow: visible;
    background: var(--surface);
    border: 1px solid var(--line);
    border-top: 4px solid var(--navy-2);
    border-radius: 8px;
    padding: 20px;
    box-shadow: 0 10px 28px rgba(2, 29, 73, .08);
  }

  .panel::after {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    width: 84px;
    height: 4px;
    background: var(--red);
  }

  .sign-in-panel {
    max-width: 520px;
    margin: 48px auto 0;
  }

  .sign-in-copy {
    display: grid;
    gap: 6px;
  }

  .sign-in-copy p {
    color: var(--muted);
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 18px;
  }

  .panel-header p,
  .muted {
    color: var(--muted);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
    align-items: start;
  }

  .grid-three {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
    align-items: start;
  }

  .field {
    display: grid;
    gap: 7px;
    align-content: start;
    min-width: 0;
  }

  .field.full,
  .full {
    grid-column: 1 / -1;
  }

  label,
  .label {
    color: var(--navy);
    font-weight: 800;
  }

  .help {
    color: var(--muted);
    font-size: 13px;
    font-weight: 400;
  }

  input,
  select,
  textarea {
    width: 100%;
    min-height: 42px;
    border: 1px solid var(--line-strong);
    border-radius: 6px;
    background: var(--field);
    color: var(--ink);
    padding: 9px 10px;
  }

  textarea {
    min-height: 110px;
    resize: vertical;
  }

  input:focus,
  select:focus,
  textarea:focus {
    border-color: var(--focus);
    outline: 3px solid rgba(206, 14, 45, .16);
  }

  .date-picker {
    position: relative;
    display: block;
  }

  .date-picker input {
    cursor: pointer;
  }

  .date-popover,
  .time-popover {
    position: absolute;
    z-index: 1000;
    top: calc(100% + 8px);
    left: 0;
    width: min(320px, calc(100vw - 48px));
    border: 1px solid var(--line-strong);
    border-top: 4px solid var(--navy-2);
    border-radius: 8px;
    background: var(--surface);
    padding: 12px;
    box-shadow: 0 18px 40px rgba(2, 29, 73, .18);
  }

  .time-picker {
    position: relative;
    display: block;
  }

  .time-popover {
    width: min(260px, calc(100vw - 48px));
  }

  .calendar-head {
    display: grid;
    grid-template-columns: 36px 1fr 36px;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
  }

  .calendar-head strong {
    text-align: center;
    color: var(--navy);
  }

  .calendar-head button,
  .calendar-day {
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--field);
    color: var(--ink);
    min-height: 34px;
    font-weight: 800;
    cursor: pointer;
  }

  .calendar-head button:hover,
  .calendar-day:hover {
    border-color: var(--red);
    color: var(--red);
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 5px;
  }

  .calendar-weekdays {
    margin-bottom: 6px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
    text-align: center;
  }

  .calendar-day.outside {
    color: #9ca3af;
    background: #f4f1e8;
  }

  .calendar-day.today {
    border-color: var(--navy-2);
  }

  .calendar-day.selected {
    border-color: var(--red);
    background: var(--red);
    color: #fff;
  }

  .time-options {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 5px;
    max-height: 220px;
    overflow: auto;
    padding-right: 3px;
  }

  .time-option {
    min-height: 34px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--field);
    color: var(--ink);
    font-weight: 800;
    cursor: pointer;
  }

  .time-option:hover {
    border-color: var(--red);
    color: var(--red);
  }

  .time-option.selected {
    border-color: var(--red);
    background: var(--red);
    color: #fff;
  }

  .time-popover-actions {
    display: flex;
    justify-content: flex-end;
    border-top: 1px solid var(--line);
    margin-top: 10px;
    padding-top: 10px;
  }

  .time-popover-actions .button {
    min-height: 34px;
    padding: 6px 16px;
  }

  fieldset {
    margin: 0;
    border: 0;
    padding: 0;
  }

  .choice-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .choice-row.compact {
    gap: 7px;
  }

  .choice {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 42px;
    border: 1px solid var(--line-strong);
    border-radius: 6px;
    background: var(--field);
    padding: 8px 10px;
    cursor: pointer;
    font-weight: 700;
  }

  .choice:hover {
    border-color: var(--navy-2);
  }

  .choice input {
    width: 16px;
    min-height: auto;
    accent-color: var(--red);
  }

  .compensation-options {
    display: grid;
    gap: 10px;
  }

  .compensation-option {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 10px;
    align-items: start;
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    background: var(--field);
    padding: 12px;
    cursor: pointer;
  }

  .compensation-option:hover {
    border-color: var(--navy-2);
    background: #fffdf8;
  }

  .compensation-option.selected {
    border-color: #d5c793;
    background: var(--warning-bg);
    box-shadow: inset 4px 0 0 var(--cream);
  }

  .compensation-option label {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    cursor: pointer;
  }

  .compensation-option input {
    width: 17px;
    min-height: auto;
    margin-top: 3px;
    accent-color: var(--red);
  }

  .compensation-option strong,
  .compensation-option small {
    display: block;
  }

  .compensation-option small {
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    margin-top: 3px;
  }

  .compensation-detail {
    grid-column: 1 / -1;
    border-top: 1px solid var(--line);
    padding-top: 10px;
    color: var(--ink);
    cursor: default;
  }

  .compensation-detail ul {
    margin: 0 0 8px;
    padding-left: 20px;
  }

  .compensation-detail li {
    margin: 4px 0;
  }

  .ack {
    display: flex;
    align-items: flex-start;
    gap: 9px;
    border-left: 4px solid var(--red);
    background: var(--warning-bg);
    padding: 12px;
    border-radius: 6px;
  }

  .ack input {
    width: 16px;
    min-height: auto;
    margin-top: 3px;
    accent-color: var(--red);
  }

  .hours-warning {
    display: grid;
    gap: 4px;
    border: 1px solid #ebb6c0;
    border-left: 4px solid var(--red);
    border-radius: 8px;
    background: var(--danger-bg);
    color: #681427;
    margin-top: 12px;
    padding: 11px 12px;
  }

  .hours-warning strong,
  .hours-warning span {
    display: block;
  }

  .hours-warning span {
    color: #681427;
    font-size: 13px;
    font-weight: 500;
  }

  .divider {
    height: 1px;
    background: var(--line);
    margin: 18px 0;
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 18px;
  }

  .actions.inline {
    justify-content: flex-start;
    margin-top: 10px;
  }

  .button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 42px;
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 9px 14px;
    color: inherit;
    text-decoration: none;
    font-weight: 800;
    cursor: pointer;
  }

  .button.primary {
    background: var(--navy-2);
    color: #fff;
  }

  .button.primary:hover {
    background: var(--navy);
  }

  .button.secondary {
    background: var(--cream);
    border-color: #d5c793;
    color: var(--navy);
  }

  .button.secondary:hover {
    border-color: var(--red);
    color: var(--red);
  }

  .button.danger {
    background: var(--red);
    color: #fff;
  }

  .button.danger:hover {
    background: var(--red-2);
  }

  .button[disabled] {
    cursor: not-allowed;
    border-color: #d8dbe2;
    background: #e7e9ee;
    color: #838b99;
    opacity: 1;
  }

  .notice {
    border: 1px solid var(--line);
    border-left: 4px solid var(--navy-2);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 16px;
    background: var(--surface);
    box-shadow: 0 8px 24px rgba(2, 29, 73, .08);
  }

  .notice.error {
    border-color: #ebb6c0;
    border-left-color: var(--red);
    background: var(--danger-bg);
    color: #681427;
  }

  .notice.success {
    border-color: #d4ceb8;
    border-left-color: var(--navy-2);
    background: var(--success-bg);
    color: var(--navy);
  }

  .info-block {
    display: grid;
    gap: 9px;
    border: 1px solid var(--line);
    border-left: 4px solid var(--navy-2);
    border-radius: 8px;
    background: #fffdf8;
    padding: 13px 14px;
  }

  .info-block ul {
    margin: 0;
    padding-left: 20px;
  }

  .info-block li {
    margin: 4px 0;
  }

  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }

  .kpi {
    border: 1px solid var(--line);
    border-top: 3px solid var(--red);
    border-radius: 8px;
    background: var(--surface);
    padding: 13px 14px;
  }

  .kpi strong {
    display: block;
    color: var(--navy);
    font-size: 25px;
    line-height: 1.1;
  }

  .kpi span {
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
  }

  .checklist-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    align-items: start;
  }

  .checklist-item {
    min-height: 100%;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--field);
    padding: 12px;
  }

  .checklist-item .label {
    line-height: 1.35;
  }

  .checklist-item .choice {
    min-height: 34px;
    padding: 6px 8px;
    background: #fff;
  }

  .vtr-offsite-fields {
    margin-top: 14px;
  }


  .process-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 12px;
  }

  .process-card {
    display: grid;
    gap: 8px;
    min-height: 150px;
    align-content: start;
    border: 1px solid var(--line);
    border-top: 4px solid var(--navy-2);
    border-radius: 8px;
    background: var(--surface);
    color: var(--ink);
    padding: 16px;
    text-decoration: none;
  }

  .process-card:hover,
  .process-card:focus-visible {
    border-color: var(--red);
    box-shadow: 0 10px 24px rgba(2, 29, 73, .10);
    outline: none;
  }

  .process-card strong {
    color: var(--navy);
    font-size: 17px;
    line-height: 1.25;
  }

  .process-card span {
    color: var(--muted);
    font-size: 13px;
  }

  .process-card em {
    align-self: end;
    width: fit-content;
    border-radius: 999px;
    background: var(--cream);
    color: var(--navy);
    padding: 4px 10px;
    font-style: normal;
    font-size: 12px;
    font-weight: 800;
  }

  .process-counts {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .process-counts span {
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--cream-soft);
    color: var(--navy);
    padding: 3px 8px;
    font-size: 12px;
    font-weight: 800;
  }

  .feedback-dialog {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: grid;
    place-items: center;
    padding: 20px;
  }

  .feedback-dialog[hidden] {
    display: none;
  }

  .feedback-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(2, 29, 73, .48);
    backdrop-filter: blur(2px);
  }

  .feedback-panel {
    position: relative;
    width: min(620px, 100%);
    max-height: min(720px, calc(100vh - 40px));
    overflow: auto;
    border: 1px solid var(--line);
    border-top: 4px solid var(--red);
    border-radius: 8px;
    background: var(--surface);
    padding: 20px;
    box-shadow: 0 24px 58px rgba(2, 29, 73, .28);
  }

  .dashboard-context {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    border: 1px solid var(--line);
    border-left: 6px solid var(--navy-2);
    border-radius: 8px;
    background: #fffdf8;
    padding: 15px 16px;
  }

  .dashboard-context-copy {
    display: grid;
    gap: 3px;
    min-width: 0;
  }

  .dashboard-context-copy strong,
  .dashboard-context-copy span,
  .dashboard-context-copy em {
    display: block;
  }

  .dashboard-context-copy strong {
    color: var(--navy);
    font-size: 22px;
    font-weight: 800;
    line-height: 1.15;
  }

  .dashboard-context-copy span {
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  .dashboard-context-copy em {
    width: fit-content;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--cream-soft);
    color: var(--navy);
    padding: 3px 8px;
    font-size: 12px;
    font-style: normal;
    font-weight: 800;
  }

  .dashboard-context-actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 10px;
  }

  .database-status {
    color: var(--muted);
    font-size: 12px;
  }

  .database-status summary {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    width: fit-content;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--surface);
    padding: 7px 11px;
    color: var(--navy);
    font-weight: 800;
    cursor: pointer;
    user-select: none;
  }

  .database-status summary::-webkit-details-marker {
    display: none;
  }

  .database-status summary::before {
    content: '+';
    display: inline-grid;
    place-items: center;
    width: 16px;
    height: 16px;
    border-radius: 999px;
    background: var(--cream-soft);
    color: var(--navy);
    font-size: 12px;
    line-height: 1;
  }

  .database-status[open] summary::before {
    content: '-';
  }

  .database-status.warning summary {
    border-color: var(--red);
    background: var(--danger-bg);
    color: var(--red);
  }

  .database-status-content {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    border: 1px solid var(--line);
    border-left: 4px solid var(--navy-2);
    border-radius: 8px;
    background: var(--field);
    padding: 10px 12px;
